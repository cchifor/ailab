# Single source of truth for hosts, IPs, and storage-link identity.
# CONFIRMED + PROVEN by discovery/PoC (scripts/*, 2026-06-14). See docs/discovery-findings.md.
#
# Storage fabric (proven): QNAP bridges both Thunderbolt ports into tbtbr0 (one L2 segment),
# so both TB nodes share 10.55.0.0/24 and reach the QNAP service IP 10.55.0.254 directly.
# node3 is on its own 10.55.1.0/24 (QNAP eth1) and routes to the service IP over that link.
all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    storage_service_ip: "10.55.0.254"   # QNAP NFS service IP (on tbtbr0)

  children:
    # ---- Proxmox VE cluster "ai" (PVE 9.2.2, kernel 7.0.2-6-pve) ----
    pve_nodes:
      vars:
        storage_prefix: 24
        storage_mtu: 1500            # safe default; TB can go jumbo later (~1.4% gain on Strix Halo)
      hosts:
        ai-node1:
          ansible_host: 192.168.0.2
          storage_role: tb           # Thunderbolt -> QNAP (tbtbr0 bridge)
          storage_iface: en05        # renamed from thunderbolt0
          storage_ip: 10.55.0.1
          qnap_peer_ip: 10.55.0.254  # service IP is on-subnet (direct, no route needed)
          tb_pci_path: "pci-0000:c7:00.6"
        ai-node2:
          ansible_host: 192.168.0.3
          storage_role: tb
          storage_iface: en05
          storage_ip: 10.55.0.2
          qnap_peer_ip: 10.55.0.254
          tb_pci_path: "pci-0000:c7:00.6"
        ai-node3:
          ansible_host: 192.168.0.4
          storage_role: eth          # USB->2.5GbE adapter (r8152) -> QNAP eth1 (10GbE)
          storage_iface: enstor      # renamed from enxc0eac367835a
          storage_ip: 10.55.1.9
          qnap_peer_ip: 10.55.1.254  # QNAP eth1; node3 routes to 10.55.0.254 via this
          storage_nic_mac: "c0:ea:c3:67:83:5a"

    # ---- QNAP (reference / read-only; configured via qcli + UI, not these plays) ----
    qnap:
      hosts:
        ai-storage:
          ansible_host: 192.168.1.225
          ansible_user: c4
