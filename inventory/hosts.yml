# Single source of truth for hosts, IPs, and storage-link identity.
# Matches docs/network-plan.md. Confirm physical node <-> mgmt IP <-> cable at discovery.
all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"

  children:
    # ---- Proxmox VE nodes (Debian-based; managed by Ansible) ----
    pve_nodes:
      vars:
        storage_prefix: 30           # /30 point-to-point links
      hosts:
        pve-node1:
          ansible_host: 192.168.0.2
          storage_role: tb           # Thunderbolt/USB4
          storage_iface: en05
          storage_ip: 10.55.0.1
          qnap_peer_ip: 10.55.0.2    # QNAP T2E port 1
          storage_mtu: 4000
        pve-node2:
          ansible_host: 192.168.0.3
          storage_role: tb           # Thunderbolt/USB4 (watch QNAP T2E port-2 bug)
          storage_iface: en05
          storage_ip: 10.55.0.5
          qnap_peer_ip: 10.55.0.6    # QNAP T2E port 2
          storage_mtu: 4000
        pve-node3:
          ansible_host: 192.168.0.4
          storage_role: eth          # 10GbE via temp USB->2.5GbE adapter
          storage_iface: enstor
          storage_ip: 10.55.0.9
          qnap_peer_ip: 10.55.0.10   # QNAP 10GbE
          storage_mtu: 1500          # raise to 9000 once TB->10G adapter + jumbo confirmed

    # ---- QNAP (NOT managed by the generic plays; here for reference / read-only) ----
    qnap:
      hosts:
        ai-storage:
          ansible_host: 192.168.1.225
          ansible_user: admin
          storage_service_ip: 10.55.0.254
