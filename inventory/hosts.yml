# Single source of truth for hosts, IPs, and storage-link identity.
# Values below CONFIRMED by discovery (scripts/discover.py, 2026-06-14). See docs/discovery-findings.md.
all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"

  children:
    # ---- Proxmox VE cluster "ai" (PVE 9.2.2, kernel 7.0.2-6-pve) ----
    pve_nodes:
      vars:
        storage_prefix: 30           # /30 point-to-point links
      hosts:
        ai-node1:
          ansible_host: 192.168.0.2
          storage_role: tb           # Thunderbolt/USB4 -> QNAP (enumerated as host 1-2)
          storage_iface: en05        # renamed from thunderbolt0
          storage_ip: 10.55.0.1
          qnap_peer_ip: 10.55.0.2    # QNAP T2E port A
          storage_mtu: 4000
          tb_pci_path: "pci-0000:c7:00.6"   # USB4 Host Router carrying thunderbolt0 (discovered)
        ai-node2:
          ansible_host: 192.168.0.3
          storage_role: tb
          storage_iface: en05
          storage_ip: 10.55.0.5
          qnap_peer_ip: 10.55.0.6    # QNAP T2E port B
          storage_mtu: 4000
          tb_pci_path: "pci-0000:c7:00.6"
        ai-node3:
          ansible_host: 192.168.0.4
          storage_role: eth          # USB->2.5GbE adapter (r8152) -> QNAP 10GbE
          storage_iface: enstor      # renamed from enxc0eac367835a
          storage_ip: 10.55.0.9
          qnap_peer_ip: 10.55.0.10   # QNAP 10GbE
          storage_mtu: 1500          # raise to 9000 once TB->10G adapter + jumbo confirmed
          storage_nic_mac: "c0:ea:c3:67:83:5a"   # USB-2.5G adapter MAC (discovered)

    # ---- QNAP (NOT managed by the generic plays; here for reference / read-only) ----
    qnap:
      hosts:
        ai-storage:
          ansible_host: 192.168.1.225
          ansible_user: c4
          storage_service_ip: 10.55.0.254
