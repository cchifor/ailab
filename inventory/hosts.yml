# Single source of truth for hosts, IPs, and storage-link identity.
# CONFIRMED + PROVEN by discovery/PoC (scripts/*, 2026-06-14). See docs/discovery-findings.md.
#
# Storage fabric (proven): QNAP bridges both Thunderbolt ports into tbtbr0 (one L2 segment),
# so both TB nodes share 10.55.0.0/24 and reach the QNAP service IP 10.55.0.254 directly.
# node3 is on its own 10.55.1.0/24 (QNAP eth1) and routes to the service IP over that link.
all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    storage_service_ip: "10.55.0.254"   # QNAP NFS service IP (on tbtbr0)

  children:
    # ---- Proxmox VE cluster "ai" (PVE 9.2.2, kernel 7.0.2-6-pve) ----
    pve_nodes:
      vars:
        storage_prefix: 24
        storage_mtu: 1500            # safe default; TB can go jumbo later (~1.4% gain on Strix Halo)
      hosts:
        ai-node1:
          ansible_host: 192.168.0.2
          storage_role: tb           # Thunderbolt -> QNAP (tbtbr0 bridge)
          storage_iface: thunderbolt0  # native TB-net name (one TB device/node -> stable, no rename)
          storage_ip: 10.55.0.1
          qnap_peer_ip: 10.55.0.254  # service IP is on-subnet (direct, no route needed)
        ai-node2:
          ansible_host: 192.168.0.3
          storage_role: tb
          storage_iface: thunderbolt0
          storage_ip: 10.55.0.2
          qnap_peer_ip: 10.55.0.254
        ai-node3:
          ansible_host: 192.168.0.4
          storage_role: eth          # Thunderbolt->10GbE adapter (Ubiquiti UACC, AQC113/atlantic) -> QNAP eth1, DIRECT 10G
          storage_iface: enp99s0     # TB-tunnelled 10G NIC. Needs the TB boot params on this host (docs/runbooks/ai-host-setup.md). NOTE: a PCIe-tunnelled name is tied to the USB4 port; moving the adapter to another port can rename it.
          storage_ip: 10.55.1.9
          qnap_peer_ip: 10.55.1.254  # QNAP eth1; node3 routes to 10.55.0.254 via this (MTU still 1500; bump to 9000 jumbo once QNAP eth1 is set)

    # ---- QNAP (reference / read-only; configured via qcli + UI, not these plays) ----
    qnap:
      hosts:
        ai-storage:
          ansible_host: 192.168.1.225
          ansible_user: c4

    # ---- Self-hosted GitHub Actions runner VMs (Ubuntu 24.04 cloud image) ----
    # Provisioned by tofu (kubernetes/infra/runners), configured by the github_runner role
    # (just runners). Ephemeral pool for cchifor/platform CI (label self-hosted-hv). ansible_user
    # is the cloud-init 'ubuntu' user (sudo) — NOT root like the bare-metal hosts. SSH key inherited
    # from all.vars (the same key tofu seeds into the cloud-init user).
    github_runners:
      vars:
        ansible_user: ubuntu
        ansible_become: true
      hosts:
        gha-runner-1:
          ansible_host: 192.168.0.47
        gha-runner-2:
          ansible_host: 192.168.0.48
        gha-runner-3:
          ansible_host: 192.168.0.49
        gha-runner-4:
          ansible_host: 192.168.0.33
        gha-runner-5:
          ansible_host: 192.168.0.34
        # DEFERRED — node3's 2nd runner; uncomment with the tofu entry once node3 has RAM (ADR 0013):
        # gha-runner-6:
        #   ansible_host: 192.168.0.35

    # ---- Interactive dev-worker VMs (Ubuntu 24.04 cloud image) ----
    # Provisioned by tofu (kubernetes/infra/dev-workers), configured by the dev_worker role
    # (just dev-workers). Run Claude Code + Codex + Docker inside tmux. ansible_user is the
    # cloud-init 'c4' user (sudo) — created on first boot, so first SSH works as c4. SSH key
    # inherited from all.vars. Two workers per node (fault isolation): dw1/4 -> node1, dw2/5 -> node2,
    # dw3/6 -> node3. IPs are consecutive .8-.13 (free statics, no router change). See
    # docs/runbooks/dev-workers.md.
    dev_workers:
      vars:
        ansible_user: c4
        ansible_become: true
      hosts:
        dev-worker-1:
          ansible_host: 192.168.0.8
        dev-worker-2:
          ansible_host: 192.168.0.9
        dev-worker-3:
          ansible_host: 192.168.0.10
        dev-worker-4:
          ansible_host: 192.168.0.11
        dev-worker-5:
          ansible_host: 192.168.0.12
        dev-worker-6:
          ansible_host: 192.168.0.13

    # ---- Private OCI registry LXC (Zot) ----
    # Provisioned by tofu (kubernetes/infra/registry-lxc), configured by the registry_zot role
    # (just registry). registry.chifor.me — anonymous pull + authenticated push. ansible_user is
    # root (LXC, key injected by tofu). IP .36 is free static in the .2-.50 reserve.
    registry:
      hosts:
        ai-registry:
          ansible_host: 192.168.0.36
