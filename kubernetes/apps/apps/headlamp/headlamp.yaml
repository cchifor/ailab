# Headlamp (kubernetes-sigs / CNCF) — live cluster-object explorer. Runs in-cluster and auto-uses
# its pod ServiceAccount (bound to the read-only ClusterRole in rbac.yaml), so the UI works with no
# token prompt and no in-cluster OIDC. It is gated at the edge by Cloudflare Access (k8s.chifor.me).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    fullnameOverride: headlamp
    replicaCount: 1
    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      # The chart defaults this to create=true bound to cluster-admin; left on, it UNIONs with the
      # read-only binding in rbac.yaml and makes the pod SA effectively cluster-admin (RBAC is additive),
      # defeating the read-only design. Disable it so ONLY headlamp-readonly applies.
      create: false
    config:
      # Headlamp is gated by Cloudflare Access (k8s.chifor.me) and uses a READ-ONLY ServiceAccount, so
      # authenticate every (already-Access'd) request AS that pod SA — this skips the token-paste prompt.
      # Flagged "unsafe" only because it drops per-user auth; safe here behind the Access proxy + RO RBAC.
      # NOTE: with the Flux plugin's safe-ops RBAC (rbac-flux.yaml) this SA can now PATCH Flux CRs
      # (reconcile/suspend/resume/force) — see docs/decisions/0015-headlamp-flux-safeops.md.
      unsafeUseServiceAccountToken: true
      # Load plugins (the Flux GitOps plugin) from a writable emptyDir that an initContainer seeds (below).
      # Overriding the default /headlamp/plugins; the bundled static plugins use a separate dir, so this is safe.
      pluginsDir: /build/plugins
    service:
      type: ClusterIP
      port: 80
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    # --- Flux GitOps plugin (headlamp-flux v0.6.0) ------------------------------------------------------
    # Delivered the GitOps way: an initContainer copies the pinned, Zot-mirrored plugin image into a shared
    # emptyDir mounted at config.pluginsDir (/build/plugins) in BOTH containers, so the plugin re-seeds on
    # every restart and always matches the pinned digest. Mirror to Zot FIRST: `just mirror-image` (justfile).
    # The image stores the plugin at /plugins/flux → it lands at /build/plugins/flux/ (a subdir — required).
    # Root copy + chown to Headlamp's uid/gid (100/101) is allowed under this ns's BASELINE PSA (not restricted).
    initContainers:
      - name: flux-plugin
        # ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0 mirrored to registry.chifor.me; pinned by the
        # multi-arch OCI index digest (docker buildx imagetools / skopeo copy preserve it).
        image: registry.chifor.me/headlamp-k8s/headlamp-plugin-flux@sha256:055377b9011dcc73235e8969c488ecd92af5cb70aa5d5df0f66c1cea667fdccb
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build/plugins && chmod -R a+rX /build/plugins
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        volumeMounts:
          - name: flux-plugin
            mountPath: /build/plugins
    # Headlamp (main) container mount — reads the seeded plugins
    volumeMounts:
      - name: flux-plugin
        mountPath: /build/plugins
    # Pod volume — ephemeral; re-seeded from the pinned image each start (no PVC needed at 1 replica)
    volumes:
      - name: flux-plugin
        emptyDir: {}
