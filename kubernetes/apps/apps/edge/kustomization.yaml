apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Edge / internet exposure (both halves live 2026-06-14): Cloudflare Tunnel (public, SSO-gated)
# + Tailscale operator/subnet-router (private mesh). See docs/runbooks/internet-exposure.md.
resources:
  - namespace.yaml
  - limitrange.yaml
  - cloudflared-creds.sops.yaml
  - cloudflared.yaml
  # Second tunnel for the Strive platform (strive.us Cloudflare account).
  - cloudflared-strive-creds.sops.yaml
  - cloudflared-strive.yaml
  - tailscale-oauth.sops.yaml
  - tailscale.yaml
