# Cloudflare Tunnel (locally-managed): egress-only connector that publishes selected services
# under chifor.me with NO open inbound ports. Ingress routes are in git (below); Cloudflare Access
# (SSO) policies are configured in the Zero Trust dashboard. See docs/runbooks/internet-exposure.md.
#
# PENDING the tunnel credentials: set <TUNNEL_ID> below and create the SOPS secret
# `cloudflared-creds` (key credentials.json). Not wired into Flux until then.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: edge
data:
  config.yaml: |
    tunnel: f93d9a6a-5172-43d3-8bef-13460ea7607b
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: home.chifor.me
        service: http://oauth2-proxy.homepage.svc.cluster.local:4180 # Authelia SSO gate -> Homepage
      - hostname: sso.chifor.me
        service: http://authelia.auth.svc.cluster.local:9091
      - hostname: status.chifor.me
        service: http://gatus.gatus.svc.cluster.local:8080
      - hostname: chat.chifor.me
        service: http://open-webui.ai.svc.cluster.local:80
      - hostname: grafana.chifor.me
        service: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80
      - hostname: api.chifor.me
        service: http://litellm.ai.svc.cluster.local:4000
      # Dev-worker web terminals: tunnel -> each VM's Caddy (LAN HTTPS, local-CA self-signed).
      # GATED by Cloudflare Access (kubernetes/infra/cloudflare/access.tf) — a passwordless-sudo shell.
      # Access enforces at the CF edge for ALL paths/methods incl. the ttyd /ws WebSocket upgrade,
      # BEFORE the tunnel — cloudflared + Caddy only ever see authenticated traffic.
      # noTLSVerify: Caddy's cert is local-CA; httpHostHeader: so Caddy matches its IP site block.
      - hostname: dw1.chifor.me
        service: https://192.168.0.37
        originRequest: { noTLSVerify: true, httpHostHeader: "192.168.0.37" }
      - hostname: dw2.chifor.me
        service: https://192.168.0.38
        originRequest: { noTLSVerify: true, httpHostHeader: "192.168.0.38" }
      - hostname: dw3.chifor.me
        service: https://192.168.0.39
        originRequest: { noTLSVerify: true, httpHostHeader: "192.168.0.39" }
      # In-cluster k8s tools: Headlamp (read-only cluster explorer) + Hubble UI (Cilium L3/L4/L7
      # network flows). GATED by Cloudflare Access (kubernetes/infra/cloudflare/access.tf k8s_tools).
      - hostname: k8s.chifor.me
        service: http://headlamp.headlamp.svc.cluster.local:80
      - hostname: hubble.chifor.me
        service: http://hubble-ui.kube-system.svc.cluster.local:80
      # Admin UIs published to the WAN, GATED by Cloudflare Access (access.tf admin_uis). Proxmox +
      # QNAP are LAN hosts with self-signed certs (noTLSVerify); Prometheus + Alertmanager are
      # in-cluster with NO native auth, so Access is the ONLY gate in front of them.
      - hostname: proxmox.chifor.me
        service: https://192.168.0.2:8006
        originRequest: { noTLSVerify: true }
      - hostname: qnap.chifor.me
        service: https://192.168.1.225
        originRequest: { noTLSVerify: true }
      - hostname: prometheus.chifor.me
        service: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      - hostname: alertmanager.chifor.me
        service: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
      # ntfy push notifications — NOT behind Cloudflare Access (the mobile app uses ntfy's own token
      # auth over a persistent connection that the Access browser flow would break). ntfy's deny-all
      # default + the seeded `ailab` user IS the gate.
      - hostname: ntfy.chifor.me
        service: http://ntfy.monitoring.svc.cluster.local:80
      # Gitea — NOT behind Cloudflare Access: git clone/push over HTTPS uses Gitea's own auth/tokens,
      # which an Access browser login would break. Web UI login is Authelia OIDC; registration is off.
      - hostname: git.chifor.me
        service: http://gitea-http.gitea.svc.cluster.local:3000
      # Strive platform (strive.place) -> in-cluster Traefik (path-routes /api/*,
      # /agent, /auth + the gatekeeper ForwardAuth chain). id.strive.place -> Keycloak.
      # Requires the strive.place zone + these CNAMEs on the tunnel (see RUNBOOK).
      - hostname: strive.place
        service: http://traefik.platform-edge.svc.cluster.local:80
      - hostname: id.strive.place
        service: http://traefik.platform-edge.svc.cluster.local:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: edge
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 2 # HA: two tunnel connectors
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
    spec:
      priorityClassName: platform-critical # public ingress path — survive pressure
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest # Docker Hub — heed the mirror follow-up; pin a version
          args: ["tunnel", "--config", "/etc/cloudflared/config/config.yaml", "run"]
          ports:
            - { name: metrics, containerPort: 2000 }
          livenessProbe:
            httpGet: { path: /ready, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: config, mountPath: /etc/cloudflared/config, readOnly: true }
            - { name: creds, mountPath: /etc/cloudflared/creds, readOnly: true }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            runAsNonRoot: true
            runAsUser: 65532
      volumes:
        - name: config
          configMap: { name: cloudflared-config }
        - name: creds
          secret: { secretName: cloudflared-creds } # SOPS: key credentials.json
