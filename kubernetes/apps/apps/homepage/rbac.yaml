# Read-only access for Homepage's kubernetes widget (node/namespace/service listing + status) and
# forward-compat with Ingress-annotation discovery. No write verbs. metrics.k8s.io is included for
# when/if metrics-server is added (today it's absent -> CPU/mem gauges stay blank, harmless).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, nodes, services, endpoints]
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io", "extensions"]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: ["metrics.k8s.io"]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: homepage
