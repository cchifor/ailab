apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Homepage — the lab app dashboard at home.chifor.me (behind Cloudflare Access). Plain manifests
# (matches the ai/edge apps; no HelmRelease pattern here). Config-as-code via the homepage-config CM.
resources:
  - namespace.yaml
  - limitrange.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - oauth2-proxy-secret.sops.yaml # SOPS: oauth2-proxy client + cookie secrets
  - oauth2-proxy.yaml # Authelia SSO gate in front of Homepage
