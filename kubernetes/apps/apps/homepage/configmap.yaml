# Homepage dashboard-as-code (gethomepage.dev). Edit + flux reconcile + `kubectl rollout restart`
# to update (Homepage reads config at boot). siteMonitor URLs are polled from the homepage pod for
# the status dots — kept to in-cluster health endpoints so they're reliable.
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: ailab
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      AI: { style: row, columns: 3 }
      Dev Workers: { style: row, columns: 3 }
      Observability: { style: row, columns: 3 }
      Infrastructure: { style: row, columns: 4 }

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  # Homepage copies skeleton custom.css/custom.js into /app/config on first page render; with the
  # config mounted read-only (ConfigMap) that copy hits EROFS and crashes the app. Provide them empty.
  custom.css: ""
  custom.js: ""

  bookmarks.yaml: |
    - Lab:
        - Repo:
            - abbr: GH
              href: https://github.com/cchifor/ailab
        - Cloudflare:
            - abbr: CF
              href: https://one.dash.cloudflare.com
        - Tailscale:
            - abbr: TS
              href: https://login.tailscale.com/admin

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true # metrics-server is installed -> real CPU/mem gauges
          memory: true
          label: ailab
        nodes:
          show: true
          cpu: true
          memory: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        format: { timeStyle: short, dateStyle: short }

  services.yaml: |
    - AI:
        - Open WebUI:
            href: https://chat.chifor.me
            description: Chat UI (LLMs)
            icon: open-webui.png
            siteMonitor: http://open-webui.ai.svc.cluster.local:80
        - LiteLLM:
            href: https://api.chifor.me
            description: OpenAI-compatible router
            icon: mdi-router-network # litellm.png isn't in the icon CDN -> broken image; use a bundled MDI
            siteMonitor: http://litellm.ai.svc.cluster.local:4000/health/liveliness
    # Interactive dev-worker web terminals (ttyd). Public via the CF tunnel + Cloudflare Access
    # (kubernetes/infra/cloudflare/access.tf gates each dwN.chifor.me to allow_email). No siteMonitor:
    # the origin is Access-gated, so an in-cluster poll would just see the Access login page.
    - Dev Workers:
        - dev-worker-1:
            href: https://dw1.chifor.me
            description: Web terminal · Claude Code + Codex (ai-node1)
            icon: mdi-console
        - dev-worker-2:
            href: https://dw2.chifor.me
            description: Web terminal · Claude Code + Codex (ai-node2)
            icon: mdi-console
        - dev-worker-3:
            href: https://dw3.chifor.me
            description: Web terminal · Claude Code + Codex (ai-node3)
            icon: mdi-console
        - Renovate:
            href: https://github.com/cchifor/ailab/issues?q=is%3Aissue+is%3Aopen+label%3Arenovate
            description: Dependency update PRs · Dashboard
            icon: mdi-robot-outline
    - Observability:
        - Grafana:
            href: https://grafana.chifor.me
            description: Dashboards
            icon: grafana.png
            siteMonitor: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80/api/health
        - Prometheus:
            href: https://prometheus.chifor.me
            description: Metrics · CF Access
            icon: prometheus.png
            siteMonitor: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/-/healthy
            widget:
              type: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        - Alertmanager:
            href: https://alertmanager.chifor.me
            description: Alerts · CF Access
            icon: prometheus.png
            siteMonitor: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093/-/healthy
        - Uptime (Gatus):
            href: https://status.chifor.me
            description: Service status
            icon: gatus.png
            siteMonitor: http://gatus.gatus.svc.cluster.local:8080/health
            widget:
              type: gatus
              url: http://gatus.gatus.svc.cluster.local:8080
        - Loki (Logs):
            href: https://grafana.chifor.me/explore
            description: Logs · query via Grafana Explore
            icon: loki.png
            siteMonitor: http://loki.monitoring.svc.cluster.local:3100/ready
        - Hubble (Network):
            href: https://hubble.chifor.me
            description: Cilium L3/L4/L7 flows · CF Access
            icon: cilium.png
            siteMonitor: http://hubble-ui.kube-system.svc.cluster.local:80
        - ntfy (Alerts):
            href: https://ntfy.chifor.me
            description: Push notifications · Alertmanager
            icon: ntfy.png
            siteMonitor: http://ntfy.monitoring.svc.cluster.local:80/v1/health
        - Trivy (Security):
            href: https://grafana.chifor.me/d/trivy-operator
            description: Vuln + misconfig scans · Grafana
            icon: mdi-shield-search
            siteMonitor: http://trivy-operator.trivy-system.svc.cluster.local:80/metrics
    - Infrastructure:
        - SSO (Authelia):
            href: https://sso.chifor.me
            description: Login
            icon: authelia.png
            siteMonitor: http://authelia.auth.svc.cluster.local:9091/api/health
        - Proxmox:
            href: https://proxmox.chifor.me
            description: ai-node1/2/3 · CF Access
            icon: proxmox.png
        - QNAP:
            href: https://qnap.chifor.me
            description: ai-storage (ZFS) · CF Access
            icon: qnap.png
        - Tailscale:
            href: https://login.tailscale.com/admin
            description: Private mesh
            icon: tailscale.png
        - Registry (Zot):
            href: https://registry.chifor.me
            description: Private OCI images · SSO login
            icon: si-opencontainersinitiative
        - Headlamp (K8s):
            href: https://k8s.chifor.me
            description: Cluster explorer (read-only) · CF Access
            icon: headlamp.png
            siteMonitor: http://headlamp.headlamp.svc.cluster.local:80
        - Gitea:
            href: https://git.chifor.me
            description: Git forge · SSO login
            icon: gitea.png
            siteMonitor: http://gitea-http.gitea.svc.cluster.local:3000/api/healthz
        - Vaultwarden:
            href: https://vault.chifor.me
            description: Password manager · own auth
            icon: vaultwarden.png
            siteMonitor: http://vaultwarden.vaultwarden.svc.cluster.local:80/alive
