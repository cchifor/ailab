# Homepage dashboard-as-code (gethomepage.dev). Edit + flux reconcile + `kubectl rollout restart`
# to update (Homepage reads config at boot). siteMonitor URLs are polled from the homepage pod for
# the status dots — kept to in-cluster health endpoints so they're reliable.
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: ailab
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      AI: { style: row, columns: 3 }
      Dev Workers: { style: row, columns: 3 }
      Observability: { style: row, columns: 3 }
      Infrastructure: { style: row, columns: 4 }

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  # Homepage copies skeleton custom.css/custom.js into /app/config on first page render; with the
  # config mounted read-only (ConfigMap) that copy hits EROFS and crashes the app. Provide them empty.
  custom.css: ""
  custom.js: ""

  bookmarks.yaml: |
    - Lab:
        - Repo:
            - abbr: GH
              href: https://github.com/cchifor/ailab
        - Cloudflare:
            - abbr: CF
              href: https://one.dash.cloudflare.com
        - Tailscale:
            - abbr: TS
              href: https://login.tailscale.com/admin

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true # metrics-server is installed -> real CPU/mem gauges
          memory: true
          label: ailab
        nodes:
          show: true
          cpu: true
          memory: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        format: { timeStyle: short, dateStyle: short }

  services.yaml: |
    - AI:
        - Open WebUI:
            href: https://chat.chifor.me
            description: Chat UI (LLMs)
            icon: open-webui.png
            siteMonitor: http://open-webui.ai.svc.cluster.local:80
        - LiteLLM:
            href: https://api.chifor.me
            description: OpenAI-compatible router
            icon: mdi-router-network # litellm.png isn't in the icon CDN -> broken image; use a bundled MDI
            siteMonitor: http://litellm.ai.svc.cluster.local:4000/health/liveliness
    # Interactive dev-worker web terminals (ttyd behind Caddy local-CA HTTPS). LAN/Tailscale-only —
    # no siteMonitor (LAN tiles, like Proxmox/QNAP). First visit shows a trust-on-first-use cert warning.
    - Dev Workers:
        - dev-worker-1:
            href: https://192.168.0.37/
            description: Web terminal · Claude Code + Codex (ai-node1)
            icon: mdi-console
        - dev-worker-2:
            href: https://192.168.0.38/
            description: Web terminal · Claude Code + Codex (ai-node2)
            icon: mdi-console
        - dev-worker-3:
            href: https://192.168.0.39/
            description: Web terminal · Claude Code + Codex (ai-node3)
            icon: mdi-console
    - Observability:
        - Grafana:
            href: https://grafana.chifor.me
            description: Dashboards
            icon: grafana.png
            siteMonitor: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80/api/health
        - Prometheus:
            href: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            description: Metrics
            icon: prometheus.png
            siteMonitor: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/-/healthy
            widget:
              type: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        - Alertmanager:
            href: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
            description: Alerts
            icon: prometheus.png
            siteMonitor: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093/-/healthy
        - Uptime (Gatus):
            href: https://status.chifor.me
            description: Service status
            icon: gatus.png
            siteMonitor: http://gatus.gatus.svc.cluster.local:8080/health
            widget:
              type: gatus
              url: http://gatus.gatus.svc.cluster.local:8080
    - Infrastructure:
        - SSO (Authelia):
            href: https://sso.chifor.me
            description: Login
            icon: authelia.png
            siteMonitor: http://authelia.auth.svc.cluster.local:9091/api/health
        - Proxmox:
            href: https://192.168.0.2:8006
            description: ai-node1/2/3
            icon: proxmox.png
        - QNAP:
            href: https://192.168.1.225
            description: ai-storage (ZFS)
            icon: qnap.png
        - Tailscale:
            href: https://login.tailscale.com/admin
            description: Private mesh
            icon: tailscale.png
