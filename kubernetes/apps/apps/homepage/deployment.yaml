# Homepage (gethomepage.dev) — the lab's app dashboard at home.chifor.me (behind Authelia SSO via the
# oauth2-proxy in this namespace; cloudflared routes home.chifor.me -> oauth2-proxy -> this Service).
# Config-as-code lives in the homepage-config ConfigMap. Homepage v1.x COPIES skeleton files
# (proxmox.yaml, custom.css/js, ...) into /app/config on render and crashes on EROFS if that dir is a
# read-only ConfigMap mount — so /app/config is a writable emptyDir seeded from the ConfigMap by an
# initContainer. HOMEPAGE_ALLOWED_HOSTS is REQUIRED behind the tunnel (Host-header validation -> 400).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage # read-only, for the kubernetes widget
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      initContainers:
        # Seed the writable /app/config from the ConfigMap so Homepage can also write its own skeletons.
        - name: copy-config
          image: mirror.gcr.io/library/busybox:1.38
          command:
            - sh
            - -c
            - >-
              cp -L /config-src/settings.yaml /config-src/services.yaml /config-src/widgets.yaml
              /config-src/bookmarks.yaml /config-src/kubernetes.yaml /config-src/docker.yaml
              /config-src/custom.css /config-src/custom.js /app/config/ && mkdir -p /app/config/logs &&
              ls -la /app/config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /app/config }
            - { name: config-src, mountPath: /config-src, readOnly: true }
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2
          env:
            - { name: HOMEPAGE_ALLOWED_HOSTS, value: "home.chifor.me" }
            - { name: PORT, value: "3000" }
          ports:
            - { name: http, containerPort: 3000 }
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
              httpHeaders: [{ name: Host, value: home.chifor.me }]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
              httpHeaders: [{ name: Host, value: home.chifor.me }]
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Next.js writes a runtime cache; non-root + caps-dropped is enough
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /app/config } # writable emptyDir (seeded by initContainer)
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: config
          emptyDir: {}
        - name: config-src
          configMap: { name: homepage-config }
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  selector:
    app.kubernetes.io/name: homepage
  ports:
    - { name: http, port: 8080, targetPort: http }
