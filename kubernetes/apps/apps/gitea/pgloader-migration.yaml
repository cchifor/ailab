# One-shot SQLite->Postgres migration for Gitea (2026-07-21). OPERATOR-RUN, deliberately NOT listed in
# kustomization.yaml — a failing Job must never wedge the Flux `apps` layer (cf. the CNPG Database CR
# that wedged `databases` for 5 days, #73).
#
# ############################## THIS JOB IS DESTRUCTIVE ##############################
# `include drop` DROPS the target tables before recreating them. That is correct during the cutover,
# when the target is empty — but AFTER the cutover Gitea is LIVE on Postgres while /data/gitea.db is
# retained as the rollback. From that moment, a stray `kubectl apply -f` of this file would drop Gitea's
# live tables and reload them from a STALE SQLite snapshot: issues, PRs, users, and the GitOps source
# Flux reconciles from. Do not rely on the following to prevent that:
#   * "not in a kustomization" stops Flux, but not a person — and Task 3 hands them this exact command.
#   * RWO does NOT stop it: ReadWriteOnce scopes attachment to a NODE, not a pod. If this Job lands on
#     the node already running Gitea it can mount the PVC alongside it, the more so because it mounts
#     readOnly.
#   * ttlSecondsAfterFinished reaps the completed Job, so there is no "already exists" error either.
#
# THE CONTROL IS THE ARMING SECRET BELOW. `MIGRATION_ARMED` is a REQUIRED secretKeyRef (no
# optional: true) naming a Secret that exists ONLY during the maintenance window and is NEVER committed.
# Absent it, the kubelet fails the pod with CreateContainerConfigError BEFORE the container starts, so
# pgloader never connects. Enforced by Kubernetes, not by shell logic that could be edited out, and it
# cannot be satisfied by anything in Git. It survives retries because the Secret lives for the whole
# window. Task 5 deletes the Secret AND this file.
# #####################################################################################
#
# Run ONLY during the cutover window, with Gitea scaled to 0:
#
#   kubectl --context admin@ai -n gitea create secret generic gitea-pgloader-arm --from-literal=armed=yes
#   kubectl --context admin@ai -n gitea delete job gitea-pgloader --ignore-not-found
#   kubectl --context admin@ai apply -f kubernetes/apps/apps/gitea/pgloader-migration.yaml
#   kubectl --context admin@ai -n gitea wait --for=condition=complete job/gitea-pgloader --timeout=1800s
#
# pgloader READS /data/gitea.db and never writes to it — that is the rollback invariant: on any failure,
# revert the repoint commit and Gitea restarts on SQLite.
#
# `include drop` recreates the target tables, so re-running after a failure is idempotent.
# `quote identifiers` is REQUIRED: Gitea has a table literally named `user`, a reserved word in Postgres.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-pgloader
  namespace: gitea
data:
  # Template, not the final file: __PW__ is substituted at runtime by the Job (see below). pgloader does
  # NOT reliably honour PGPASSWORD for the target, so the password goes in the connection URI itself.
  gitea.load.tmpl: |
    LOAD DATABASE
      FROM sqlite:///data/gitea.db
      INTO postgresql://gitea:__PW__@infra-pg-rw.databases.svc.cluster.local:5432/gitea?sslmode=disable
    WITH include drop, create tables, create indexes, reset sequences,
         quote identifiers, batch rows = 5000, prefetch rows = 5000
    SET work_mem to '128MB', maintenance_work_mem to '512MB'
    ;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-pgloader
  namespace: gitea
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      enableServiceLinks: false
      containers:
        - name: pgloader
          # Pinned to a NAMED RELEASE by digest. A data migration should be reproducible, and `:latest`
          # is a moving master build (different digest from v3.6.7). Re-resolve deliberately, not by drift.
          image: dimitri/pgloader:v3.6.7@sha256:d29ea680cf1aaaf7269690a922dd69167567b91b35e9c48a0b54a99cef96c0ed
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Redundant with the kubelet's enforcement of the required MIGRATION_ARMED secretKeyRef
              # (the pod cannot start without it) — kept as a visible statement of intent.
              [ "${MIGRATION_ARMED:-}" = "yes" ] || { echo "FATAL: not armed; see file header"; exit 1; }
              test -r /data/gitea.db || { echo "FATAL: /data/gitea.db not readable"; exit 1; }
              echo "source: $(ls -l /data/gitea.db)"
              # INVARIANT this sed depends on: DB_PASSWORD contains no characters special to sed's
              # replacement (no | & \ newline). Guaranteed by generating an alphanumeric-only password in
              # Task 1 Step 1 — a property NOT enforced anywhere in this manifest, so assert it here
              # rather than assume it. (A CRLF bug in that same step proved that what you believe landed
              # in a secret and what actually landed can differ.)
              case "$DB_PASSWORD" in
                *[!A-Za-z0-9]*) echo "FATAL: password is not alphanumeric-only; sed substitution unsafe"; exit 1;;
              esac
              sed "s|__PW__|${DB_PASSWORD}|" /cfg/gitea.load.tmpl > /tmp/gitea.load
              pgloader --verbose /tmp/gitea.load
          env:
            # REQUIRED (deliberately not optional): the arming interlock. See the file header.
            - name: MIGRATION_ARMED
              valueFrom:
                secretKeyRef: { name: gitea-pgloader-arm, key: armed }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: gitea-db, key: password }
          volumeMounts:
            - { name: data, mountPath: /data, readOnly: true }
            - { name: cfg, mountPath: /cfg, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-shared-storage
            readOnly: true
        - name: cfg
          configMap: { name: gitea-pgloader }
