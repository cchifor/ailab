# One-shot SQLite->Postgres migration for Gitea (2026-07-21). OPERATOR-RUN, deliberately NOT listed in
# kustomization.yaml — a failing Job must never wedge the Flux `apps` layer (cf. the CNPG Database CR
# that wedged `databases` for 5 days, #73).
#
# Run ONLY during the cutover window, with Gitea scaled to 0. The `/data` PVC is RWO, so this Job can
# only bind it while no Gitea pod holds it. pgloader READS /data/gitea.db and never writes to it — that
# is the rollback invariant: on any failure, revert the repoint commit and Gitea restarts on SQLite.
#
#   kubectl --context admin@ai -n gitea delete job gitea-pgloader --ignore-not-found
#   kubectl --context admin@ai apply -f kubernetes/apps/apps/gitea/pgloader-migration.yaml
#   kubectl --context admin@ai -n gitea wait --for=condition=complete job/gitea-pgloader --timeout=1800s
#
# `include drop` recreates the target tables, so re-running after a failure is idempotent.
# `quote identifiers` is REQUIRED: Gitea has a table literally named `user`, a reserved word in Postgres.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-pgloader
  namespace: gitea
data:
  # Template, not the final file: __PW__ is substituted at runtime by the Job (see below). pgloader does
  # NOT reliably honour PGPASSWORD for the target, so the password goes in the connection URI itself.
  gitea.load.tmpl: |
    LOAD DATABASE
      FROM sqlite:///data/gitea.db
      INTO postgresql://gitea:__PW__@infra-pg-rw.databases.svc.cluster.local:5432/gitea?sslmode=disable
    WITH include drop, create tables, create indexes, reset sequences,
         quote identifiers, batch rows = 5000, prefetch rows = 5000
    SET work_mem to '128MB', maintenance_work_mem to '512MB'
    ;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-pgloader
  namespace: gitea
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      enableServiceLinks: false
      containers:
        - name: pgloader
          # Pinned to a NAMED RELEASE by digest. A data migration should be reproducible, and `:latest`
          # is a moving master build (different digest from v3.6.7). Re-resolve deliberately, not by drift.
          image: dimitri/pgloader:v3.6.7@sha256:d29ea680cf1aaaf7269690a922dd69167567b91b35e9c48a0b54a99cef96c0ed
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              test -r /data/gitea.db || { echo "FATAL: /data/gitea.db not readable"; exit 1; }
              echo "source: $(ls -l /data/gitea.db)"
              # Substitute the password into the load file. The generated password is alphanumeric-only
              # (verified at creation), so it is safe as a sed replacement without escaping.
              sed "s|__PW__|${DB_PASSWORD}|" /cfg/gitea.load.tmpl > /tmp/gitea.load
              pgloader --verbose /tmp/gitea.load
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: gitea-db, key: password }
          volumeMounts:
            - { name: data, mountPath: /data, readOnly: true }
            - { name: cfg, mountPath: /cfg, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-shared-storage
            readOnly: true
        - name: cfg
          configMap: { name: gitea-pgloader }
