# Gitea — self-hosted Git forge at git.chifor.me. Single-instance, lean config:
#   * SQLite on a qnap-iscsi BLOCK PVC (proper file locking — SQLite-on-NFS is unsafe), not the
#     chart's default Postgres-HA + Valkey-cluster (avoids those subcharts + the Bitnami image risk).
#   * Authelia OIDC login (gitea-oauth secret) + a break-glass local admin (gitea-admin secret).
#   * Exposed via the CF tunnel WITHOUT Cloudflare Access (git clone/push over HTTPS uses Gitea's own
#     auth/tokens — an Access login page would break the git CLI). SSH (gitea-ssh) stays in-cluster.
#   * Actions ENABLED (ADR 0017 forge migration). Artifacts + logs offloaded to versitygw S3 on the
#     QNAP (gitea-actions-s3 secret: scoped `gitea` user + gitea-actions bucket) so they don't fill the
#     10Gi PVC; ARTIFACT/LOG_RETENTION_DAYS cap growth. Runners = external act_runner
#     (ansible/roles/gitea_runner), NOT the chart (12.6.0 ships no bundled runner).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 24h
  url: https://dl.gitea.com/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: gitea
      version: "12.6.0"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: gitea
  values:
    fullnameOverride: gitea
    replicaCount: 1
    # RWO iSCSI LUN: terminate the old pod before starting the new one, else the rollout deadlocks on
    # a Multi-Attach error (two pods can't hold the same LUN).
    strategy:
      type: Recreate
    image:
      rootless: true
    # Lean single-instance: no HA subcharts. Gitea falls back to its own defaults (memory cache/
    # session, leveldb queue) set explicitly under gitea.config below.
    postgresql-ha: { enabled: false }
    postgresql: { enabled: false }
    valkey-cluster: { enabled: false }
    valkey: { enabled: false }
    persistence:
      enabled: true
      storageClass: qnap-iscsi
      accessModes: ["ReadWriteOnce"]
      size: 10Gi
    service:
      http: { type: ClusterIP, port: 3000 }
      ssh: { type: ClusterIP, port: 22 }
    ingress: { enabled: false }
    resources:
      # Gitea Actions streams runner logs + task updates in-memory; 1Gi was OOM-killed (exit 137) under
      # a full CI matrix (ADR 0017 validation, 2026-07-09) — the pod crash-looped and 502'd. 3Gi gives
      # headroom for ~4 concurrent host-mode jobs streaming logs. Revisit if the pool/concurrency grows.
      requests: { cpu: 50m, memory: 512Mi }
      limits: { memory: 3Gi }
    gitea:
      # Break-glass local admin; OIDC is the day-to-day login. passwordMode keepUpdated re-syncs the
      # password from the secret on every start.
      admin:
        existingSecret: gitea-admin # keys: username, password
      # Authelia OIDC source (auto-registered). The callback Gitea expects is
      # /user/oauth2/<name>/callback -> /user/oauth2/Authelia/callback (see authelia-config.yaml).
      oauth:
        - name: "Authelia"
          provider: "openidConnect"
          existingSecret: gitea-oauth # keys: key (client id), secret (client secret)
          autoDiscoverUrl: "https://sso.chifor.me/.well-known/openid-configuration"
          scopes: "openid profile email groups"
      # Expose Gitea's own /metrics (gitea_* app metrics: repos/users/orgs/mirrors/issues + Go runtime).
      # enabled=true adds [metrics] ENABLED to app.ini; the TOKEN comes from the gitea-metrics secret via
      # the env override below (keeps it out of git). The chart's own ServiceMonitor can't wire a bearer
      # token, so it stays off — we ship a hand-rolled one (servicemonitor.yaml) with bearerTokenSecret.
      metrics:
        enabled: true
        serviceMonitor:
          enabled: false
      # S3 artifact/log offload (ADR 0017): credentials injected as GITEA__ env overrides, merged into
      # the [storage.actions_s3] section below. Env-to-ini escaping: '.' -> _0X2E_, '__' is the
      # section/key separator, a single '_' is literal (section [storage.actions_s3]). Keys come from
      # the SOPS secret gitea-actions-s3 (versitygw `gitea` user, scoped to the gitea-actions bucket).
      additionalConfigFromEnvs:
        - name: GITEA__storage_0X2E_actions_s3__MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: gitea-actions-s3
              key: access-key
        - name: GITEA__storage_0X2E_actions_s3__MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: gitea-actions-s3
              key: secret-key
        # [metrics] TOKEN — required in the Authorization: Bearer header to read /metrics (the endpoint is
        # internet-reachable via the CF tunnel). The ServiceMonitor sends the same secret value.
        - name: GITEA__metrics__TOKEN
          valueFrom:
            secretKeyRef:
              name: gitea-metrics
              key: token
      config:
        server:
          DOMAIN: git.chifor.me
          ROOT_URL: https://git.chifor.me/
          SSH_DOMAIN: git.chifor.me
        database:
          DB_TYPE: sqlite3
        session:
          PROVIDER: memory
        cache:
          ADAPTER: memory
        queue:
          TYPE: level
        service:
          DISABLE_REGISTRATION: true # no local self-signup; accounts come via Authelia OIDC
          SHOW_REGISTRATION_BUTTON: false
          # Internet-exposed WITHOUT Cloudflare Access: require login to view anything, else the UI,
          # /explore, and the user/repo search API allow anonymous enumeration. OIDC (UI) and
          # PAT/SSH (clone/push) still work for authenticated users.
          REQUIRE_SIGNIN_VIEW: true
        openid:
          ENABLE_OPENID_SIGNIN: false # use the Authelia OIDC button, not generic OpenID
          ENABLE_OPENID_SIGNUP: false
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true # first OIDC login auto-creates the Gitea account
          USERNAME: preferred_username
          ACCOUNT_LINKING: auto # link an OIDC login to a pre-existing account by email (site-admin bootstrap)
        # Gitea refuses webhook delivery to private IPs by default; "external" PRESERVES that default
        # for public targets, the CIDR enables the LAN agentforge receivers (dw1-6 :8700 — ADR 0018).
        webhook:
          ALLOWED_HOST_LIST: "external, 192.168.0.0/24"
        # ── Gitea Actions (forge migration, ADR 0017) ──────────────────────────────────────────────
        repository:
          # Adds repo.actions to the default unit set — NEW repos only. Existing repos (platform,
          # ailab) must enable Actions per-repo (Settings -> Units) — go-gitea #23724 (no retro switch).
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.wiki,repo.projects,repo.packages,repo.actions
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: github # `uses: actions/checkout@vN` resolves from github.com
          ARTIFACT_RETENTION_DAYS: 14 # retention applies to the S3 backend too
          LOG_RETENTION_DAYS: 30 # default is 365; trim storage footprint
        # Named S3 target for Actions ONLY (artifacts + logs) → versitygw on the QNAP (ADR 0010/0017).
        # A global [storage] STORAGE_TYPE=minio would divert attachments/LFS/avatars/packages too — a
        # named section keeps everything else on the 10Gi PVC. SERVE_DIRECT stays off (default) so
        # runners/browsers never reach the LAN-only self-signed endpoint. Creds via the
        # additionalConfigFromEnvs block above (gitea-actions-s3 secret).
        storage.actions_s3:
          STORAGE_TYPE: minio
          MINIO_ENDPOINT: 192.168.1.225:7070 # host:port, NO scheme
          MINIO_BUCKET: gitea-actions
          MINIO_LOCATION: us-east-1
          MINIO_USE_SSL: true
          MINIO_INSECURE_SKIP_VERIFY: true # versitygw self-signed cert
          MINIO_BUCKET_LOOKUP_TYPE: path # path-style addressing (s3ForcePathStyle)
          MINIO_CHECKSUM_ALGORITHM: md5 # versitygw rejects the default CRC32C checksum header (cf. Velero)
        storage.actions_artifacts:
          STORAGE_TYPE: actions_s3 # inherit endpoint/creds/bucket from the named section above
          MINIO_BASE_PATH: actions_artifacts/ # explicit prefix so it can't collide with logs
        storage.actions_log:
          STORAGE_TYPE: actions_s3
          MINIO_BASE_PATH: actions_log/
