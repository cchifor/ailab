# AgentForge CP Postgres DSNs (consumer copy). Two DSNs = the RLS boundary the platform relies on
# (agentforge_platform.settings): AFP_APP_DSN connects as afp_app (RLS-enforced request path,
# NOBYPASSRLS, non-owner); AFP_ADMIN_DSN connects as afp_admin (migrations + audited service path,
# BYPASSRLS, owns the DB). SQLAlchemy async driver (postgresql+asyncpg) against the infra-pg RW svc.
#
# ⚠️ DRIFT COUPLING: each embedded password MUST stay in sync with the matching CNPG managed-role
# secret in databases ns — afp_app pw ↔ infra-pg-afp-app, afp_admin pw ↔ infra-pg-afp-admin. The DB
# role passwords are set from those secrets; the CP connects with these DSNs. Change both together.
