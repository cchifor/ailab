# AgentForge v2 control-plane ServiceAccount + Service (ADR 0019). Split OUT of deployment.yaml so
# these two healthy objects keep reconciling under the wait:true `apps` Kustomization even while the
# Deployment is held back (its image is a placeholder digest until the platform release CI pins the
# real @sha256 — see deployment.yaml's header). The analyzer RBAC (rbac.yaml) binds this SA, and the
# cloudflared ingress + NetworkPolicy reference this Service, so both must exist regardless.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentforge-platform
  namespace: agentforge
---
apiVersion: v1
kind: Service
metadata:
  name: agentforge-platform
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-platform
spec:
  selector:
    app.kubernetes.io/name: agentforge-platform
  ports:
    # Service port == container port (8080) so there is NO DNAT port translation — the worker's
    # rendered egress NetworkPolicy (TCP 8080) then matches under any Cilium mode (socket-LB or
    # legacy). cloudflared (edge/cloudflared.yaml) and AFP_CONTROL_PLANE_INTERNAL_URL both dial :8080.
    - { name: http, port: 8080, targetPort: http }
