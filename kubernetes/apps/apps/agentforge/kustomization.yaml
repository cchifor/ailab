apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# AgentForge v2 self-service control plane at agentforge.chifor.me (ADR 0019). Hosts ONLY the CP;
# per-workspace workers live in tenant namespaces reconciled from the separate cchifor/agentforge-tenants
# repo (clusters/ai/agentforge-tenants*.yaml). SOPS secrets decrypt via the `apps` Flux Kustomization.
resources:
  - namespace.yaml
  - rbac.yaml # tightened read-only ClusterRole for the analyzer (NO secrets) — see the file header
  - rbac-flux.yaml # scoped patch-only nudge on Flux Kustomizations (field-locked by the admission policy)
  - serviceaccount-service.yaml # CP ServiceAccount + Service (healthy; kept reconciling — see below)
  - networkpolicy.yaml # ingress only from the cloudflared tunnel
  - agentforge-oauth.sops.yaml # OIDC client secret (Authelia client 'agentforge')
  - agentforge-db.sops.yaml # platform Postgres DSNs (AFP_APP_DSN + AFP_ADMIN_DSN, consumer copy)
  - agentforge-runtime.sops.yaml # session secret + tenants/bootstrap tokens (AFP_ runtime secrets)
  # deployment.yaml is INTENTIONALLY not listed — its image is a placeholder @sha256 until the platform
  # release CI pins the real digest; under the wait:true `apps` Kustomization it would ImagePullBackOff
  # and wedge the whole apps layer. Re-add `- deployment.yaml` once the digest lands (see its header).
  # The SA+Service were split into serviceaccount-service.yaml (above) so RBAC + ingress stay satisfied.
  # db-migrate.yaml is INTENTIONALLY not listed either — an operator-run one-shot (see its header);
  # under wait:true a failing migration Job would likewise wedge the apps layer.
  - admission # ValidatingAdmissionPolicies: tenant-path allowlist + CP Flux-patch field-lock
