# AgentForge CP infra-bot Gitea token (WS4 subscriptions — broker add/remove via PR-gated GitOps).
#   * AFP_INFRA_BOT_TOKEN — the restricted `agentforge-infra-bot` Gitea user's access token
#     (scope: write:repository). Contract C1: the bot is a READ-only collaborator on cchifor/ailab
#     and opens broker-manifest PRs via the AGit flow (`git push origin HEAD:refs/for/main`) — the
#     write:repository TOKEN scope is REQUIRED for AGit (a read:repository token is 403), while the
#     READ repo permission keeps the bot unable to push branches, push main, approve, or merge
#     (verified live 2026-07-24: direct-branch + main pushes rejected by the pre-receive hook /403;
#     refs/for/main created a PR as the bot). The reviewer agent merges after its codex gate.
#   Minted in-pod (mode-600, value never printed). Stored here as ciphertext AHEAD of its WS4
#   consumer — nothing mounts it yet; wiring into the CP Deployment envFrom lands with WS4.
