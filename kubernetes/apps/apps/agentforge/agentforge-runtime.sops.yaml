# AgentForge CP runtime secrets (AFP_ prefix, agentforge_platform.settings). Three values:
#   * AFP_SESSION_SECRET — signs the session cookie (principal + memberships). build_app() REFUSES to
#     serve without a strong, non-placeholder key (>=32 chars). App-internal, not an operator
#     credential; the value below is a real generated 64-hex random (openssl rand -hex 32).
#   * AFP_TENANTS_BOT_TOKEN — the CP bot's Gitea WRITE token to cchifor/agentforge-tenants. OPERATOR
#     MUST FILL: provisioning is non-functional until a real token replaces the placeholder.
#   * AFP_BOOTSTRAP_TOKEN — workspace-repo label bootstrap token (distinct from the tenants token; must
#     NOT be able to write the tenants repo). OPERATOR MUST FILL; empty/placeholder => bootstrap 501.
