# ValidatingAdmissionPolicy — the SECOND layer boxing in the CP-written tenant path (the first is the
# reconciler SA's minimal RBAC). Native VAP (admissionregistration.k8s.io/v1, GA on this 1.31 cluster;
# no Kyverno in the estate). It fires ONLY for objects applied by the tenant reconciler SA
# (matchConditions on userInfo), so it governs exactly the cchifor/agentforge-tenants path and nothing
# else. It enforces the tenant ALLOWLIST: only a fixed set of namespaced GVKs, no cluster-scoped RBAC,
# no wildcard-verb Roles, and no privileged pods outside sandbox namespaces. Because Flux GVKs
# (kustomize/source.toolkit.fluxcd.io) are NOT in the allowlist, the tenant path also cannot create a
# Flux Kustomization/GitRepository to redirect reconciliation (sourceRef/serviceAccountName escape).
#
# P1 scope = GVK/field allowlist for the tenant path. The full sandbox-POD-SHAPE pinning (runtimeClass
# kata, image-digest allowlist, automountServiceAccountToken:false, no hostPath/host*, required Cilium
# labels, DinD only in the sandbox ns) is P2 — added when the sandbox namespaces + RuntimeClasses land.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: agentforge-tenant-guard
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["*"]
        apiVersions: ["*"]
        operations: ["CREATE", "UPDATE"]
        resources: ["*"]
        scope: "*"
  matchConditions:
    # Only govern what the dedicated tenant reconciler SA applies (the CP-written tenant path).
    - name: only-tenant-reconciler
      expression: "request.userInfo.username == 'system:serviceaccount:flux-system:agentforge-tenants-reconciler'"
  variables:
    - name: nsLabels
      expression: "(namespaceObject != null && has(namespaceObject.metadata) && has(namespaceObject.metadata.labels)) ? namespaceObject.metadata.labels : {}"
    - name: isSandboxNs
      expression: "'ailab.io/agentforge-sandbox' in variables.nsLabels && variables.nsLabels['ailab.io/agentforge-sandbox'] == 'true'"
  validations:
    # (1) GVK allowlist — reject any kind the tenant path is not permitted to create.
    - expression: >-
        (request.kind.group == '' && request.kind.kind in ['Namespace', 'ServiceAccount', 'Service', 'ConfigMap', 'Secret', 'PersistentVolumeClaim']) ||
        (request.kind.group == 'apps' && request.kind.kind == 'Deployment') ||
        (request.kind.group == 'rbac.authorization.k8s.io' && request.kind.kind in ['Role', 'RoleBinding']) ||
        (request.kind.group == 'networking.k8s.io' && request.kind.kind == 'NetworkPolicy') ||
        (request.kind.group == 'cilium.io' && request.kind.kind == 'CiliumNetworkPolicy')
      message: "agentforge tenant path: this GVK is not in the tenant allowlist (no cluster RBAC, no Flux source/Kustomization, no arbitrary kinds)."
    # (2) Explicitly bar cluster-scoped RBAC (clearer message than the allowlist miss).
    - expression: "!(request.kind.group == 'rbac.authorization.k8s.io' && request.kind.kind in ['ClusterRole', 'ClusterRoleBinding'])"
      message: "agentforge tenant path: ClusterRole/ClusterRoleBinding are forbidden (namespaced Role/RoleBinding only)."
    # (3) No wildcard verb/apiGroup/resource in a tenant Role (no '*'-verb escalation).
    - expression: >-
        request.kind.kind != 'Role' || !has(object.rules) ||
        object.rules.all(r, !('*' in r.verbs) && !('*' in r.apiGroups) && !('*' in r.resources))
      message: "agentforge tenant path: Role rules may not use '*' verbs/apiGroups/resources."
    # (4) No privileged containers outside a sandbox namespace (P1: no sandbox ns exists yet, so this
    #     effectively denies privileged; sandbox namespaces get the label in P2).
    - expression: >-
        request.kind.kind != 'Deployment' || variables.isSandboxNs ||
        (object.spec.template.spec.containers + (has(object.spec.template.spec.initContainers) ? object.spec.template.spec.initContainers : [])).all(c,
          !has(c.securityContext) || !has(c.securityContext.privileged) || c.securityContext.privileged != true)
      message: "agentforge tenant path: privileged containers are only allowed in sandbox namespaces (P2)."
    # (5) NAMESPACE PINNING — tenant objects may only land in an af-tenant-* namespace (matches the CP
    #     renderer's NS_PREFIX). Without this, the reconciler's cluster-wide namespaced-write RBAC (a
    #     Role/RoleBinding/Secret/Deployment CREATE anywhere) could target flux-system/kube-system/
    #     databases. A Namespace object itself must be named af-tenant-*; every other (namespaced) kind
    #     must set metadata.namespace to af-tenant-*.
    - expression: >-
        (request.kind.kind == 'Namespace')
          ? object.metadata.name.startsWith('af-tenant-')
          : (has(object.metadata.namespace) && object.metadata.namespace.startsWith('af-tenant-'))
      message: "agentforge tenant path: objects must be an af-tenant-* Namespace or live in one (no writes to system namespaces)."
    # (6) A tenant RoleBinding may only bind a namespaced Role (never a ClusterRole such as
    #     cluster-admin). With (5), the bound Role is a tenant-local, non-wildcard Role → no escalation.
    - expression: "request.kind.kind != 'RoleBinding' || object.roleRef.kind == 'Role'"
      message: "agentforge tenant path: a RoleBinding may only bind a namespaced Role, never a ClusterRole."
    # (7) POD SECURITY — a tenant Namespace MUST enforce at least PSA baseline so every pod in it is
    #     blocked from host escape (hostPath, hostNetwork/PID/IPC, hostPort, privileged). Without this a
    #     Deployment could hostPath-mount the node FS (the privileged-only check in (4) is not enough).
    - expression: >-
        request.kind.kind != 'Namespace' ||
        (has(object.metadata.labels) &&
         'pod-security.kubernetes.io/enforce' in object.metadata.labels &&
         object.metadata.labels['pod-security.kubernetes.io/enforce'] in ['baseline', 'restricted'])
      message: "agentforge tenant path: a tenant Namespace must set pod-security.kubernetes.io/enforce to baseline or restricted."
    # (8) A tenant may NOT self-assign the sandbox label — it exempts (4)'s privileged check and is
    #     operator/P2-controlled. Blocks creating/updating a Namespace with sandbox=true.
    - expression: >-
        request.kind.kind != 'Namespace' || !has(object.metadata.labels) ||
        !('ailab.io/agentforge-sandbox' in object.metadata.labels) ||
        object.metadata.labels['ailab.io/agentforge-sandbox'] != 'true'
      message: "agentforge tenant path: tenant namespaces may not self-assign the sandbox label (P2/operator-only)."
    # (9) No nodeName pinning (PSA does not cover it) — a Deployment must schedule via the pool's
    #     nodeSelector/toleration, never target a specific (e.g. control-plane) node directly.
    - expression: >-
        request.kind.kind != 'Deployment' ||
        !has(object.spec.template.spec.nodeName)
      message: "agentforge tenant path: a tenant Deployment may not set spec.template.spec.nodeName."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: agentforge-tenant-guard
spec:
  policyName: agentforge-tenant-guard
  validationActions: ["Deny"]
