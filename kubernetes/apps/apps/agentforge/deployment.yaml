# AgentForge v2 control plane (agentforge-platform) — FastAPI OIDC RP + webapp + resource analyzer +
# GiteaClient (commits tenant desired state to the SEPARATE cchifor/agentforge-tenants repo) + the
# ConnectedCluster reconciler. Runs on the hub, ns agentforge. Image built + pushed to
# registry.chifor.me by the cchifor/agentforge-platform repo's release CI (anonymous-pull, Talos
# already trusts the registry — no imagePullSecret; precedent: headlamp/cloudflared).
#
# GO-LIVE: this Deployment IS now listed in kustomization.yaml (the image is a real pinned @sha256,
# below). Activation is a transactional switch: the readiness probe is /readyz (the DB SELECT-1
# check), so under the wait:true `apps` Kustomization the pod only reports Ready once the platform DB
# is reachable + MIGRATED — do not merge the go-live change until the DB is created + the migration
# Job has run AND the two bot tokens in agentforge-runtime.sops.yaml are minted+filled (see
# docs/runbooks/agentforge-platform-activation.md). The ServiceAccount + Service live in
# serviceaccount-service.yaml so RBAC + the cloudflared/NetworkPolicy references stay satisfied.
#
# P1: single replica (SSE broadcast state is in-memory; HA is P3). No PDB — a PDB on a singleton
# blocks node drains (the strive-pg-primary lesson). Structure mirrors auth/authelia.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentforge-platform
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentforge-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentforge-platform
    spec:
      serviceAccountName: agentforge-platform
      # The Service is named `agentforge-platform`, so k8s would inject AGENTFORGE_PLATFORM_SERVICE_*
      # env vars; disable service links so they can't collide with the app's own config env.
      enableServiceLinks: false
      # Stateless (no PVC) -> evict fast off an unreachable node (default 300s).
      tolerations:
        - { key: node.kubernetes.io/not-ready, operator: Exists, effect: NoExecute, tolerationSeconds: 60 }
        - { key: node.kubernetes.io/unreachable, operator: Exists, effect: NoExecute, tolerationSeconds: 60 }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: platform
          # Pinned to the immutable @sha256 of the built image. Repo path is `agentforge/agentforge-platform`
          # (matches the platform CI push target + the sibling `agentforge/p1-worker` convention) — NOT
          # `cchifor/…`, which CI never populates. Digest = OCI index of tag `2776074` (agentforge-platform
          # origin/main HEAD 27760744…, feat #8); verified tag→digest equality + linux/amd64 + Entrypoint
          # `[agentforge-platform] serve` + AFP_WEBAPP_DIST set. Re-verify the tag still resolves to this
          # digest before merging the go-live PR; fail closed if it moved.
          image: registry.chifor.me/agentforge/agentforge-platform@sha256:03a1649fbdcf81755148224185a46644ce70cc771ed25857f10947bdd9f90486
          ports:
            - { name: http, containerPort: 8080 }
          # ALL config is env_prefix AFP_ (agentforge_platform.settings.Settings). Non-secrets are plain
          # values here; secrets come from SOPS Secrets via secretKeyRef.
          env:
            # -- OIDC RP against Authelia (client block in auth/authelia-config.yaml) --
            - { name: AFP_OIDC_ISSUER, value: "https://sso.chifor.me" }
            - { name: AFP_OIDC_CLIENT_ID, value: "agentforge" }
            # auth router prefix is /api/auth (main._auth_router), so the callback is /api/auth/callback.
            - { name: AFP_OIDC_REDIRECT_URL, value: "https://agentforge.chifor.me/api/auth/callback" }
            - name: AFP_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: agentforge-oauth, key: AFP_OIDC_CLIENT_SECRET }
            # -- database (RLS boundary): two DSNs. app_dsn = afp_app (RLS-enforced request path);
            #    admin_dsn = afp_admin (migrations + audited service path, BYPASSRLS, DB owner). --
            - name: AFP_APP_DSN
              valueFrom:
                secretKeyRef: { name: agentforge-db, key: AFP_APP_DSN }
            - name: AFP_ADMIN_DSN
              valueFrom:
                secretKeyRef: { name: agentforge-db, key: AFP_ADMIN_DSN }
            # -- sessions: build_app() refuses to serve without a strong, non-placeholder key --
            - name: AFP_SESSION_SECRET
              valueFrom:
                secretKeyRef: { name: agentforge-runtime, key: AFP_SESSION_SECRET }
            # -- SPA: serve the built Vue webapp bundled at /app/webapp in the image --
            - { name: AFP_WEBAPP_DIST, value: "/app/webapp" }
            # -- server-owned worker image the CP renders into tenant Deployments. Provisioning REFUSES
            #    (503) unless this is a pinned digest (repo@sha256:<64hex>) — the p1-worker release CI
            #    fills it. Placeholder here so the CP can start; provisioning is gated until it's real. --
            - { name: AFP_WORKER_IMAGE, value: "registry.chifor.me/agentforge/p1-worker@sha256:c2f10ec6ff74d48532aa01cac34fd5b521f1ea3e5a118af736b316904133c334" }
            # -- workers fetch their config from the CP over this in-cluster URL. The Service exposes
            #    :8080 (== container port, no DNAT port translation — see serviceaccount-service.yaml). --
            - { name: AFP_CONTROL_PLANE_INTERNAL_URL, value: "http://agentforge-platform.agentforge.svc:8080" }
            # -- tenant git push target (the ONLY repo the CP bot may write); explicit for clarity --
            - { name: AFP_TENANTS_GITEA_URL, value: "https://git.chifor.me" }
            - { name: AFP_TENANTS_REPO, value: "cchifor/agentforge-tenants" }
            # CP bot token -> write access to cchifor/agentforge-tenants (operator-filled placeholder).
            - name: AFP_TENANTS_BOT_TOKEN
              valueFrom:
                secretKeyRef: { name: agentforge-runtime, key: AFP_TENANTS_BOT_TOKEN }
            # Workspace-repo label bootstrap token (distinct from the tenants token; operator-filled).
            - name: AFP_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef: { name: agentforge-runtime, key: AFP_BOOTSTRAP_TOKEN }
          # Readiness = /readyz (executes SELECT 1 on the admin DSN) so the pod only joins the Service
          # endpoints once the platform DB is reachable + migrated — under the wait:true `apps`
          # Kustomization this also gates the go-live rollout on a usable DB (avoids /healthz false
          # readiness). Liveness = /healthz (unconditional {"status":"ok"}) so a transient DB blip
          # removes the pod from endpoints without killing the process. failureThreshold widened so a
          # slow first DB connect / brief primary switchover doesn't flap-restart the pod.
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
