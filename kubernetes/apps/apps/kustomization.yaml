apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Application layer (after infrastructure): user-facing workloads + the AI endpoint wiring.
resources:
  - ai
  - auth # Authelia SSO (OIDC provider) — Grafana/Open WebUI clients reference it
  - edge
  - homepage # app dashboard at home.chifor.me
  - gatus # uptime monitoring + status page at status.chifor.me
  - headlamp # live k8s cluster explorer (read-only) at k8s.chifor.me
  - agentforge # AgentForge v2 self-service control plane at agentforge.chifor.me (ADR 0019)
  - gitea # self-hosted Git forge at git.chifor.me (OIDC login, SQLite on iSCSI)
  - vaultwarden # password manager at vault.chifor.me (own auth; /admin behind CF Access)
  - renovate # dependency-update bot (CronJob; opens PRs against this repo)
