# Publishes the off-cluster ai-llm LXCs into the cluster. Each node runs TWO llama-server
# instances: the general daily driver on :8080 and the coder model on :8081. Cilium
# load-balances each across all three LXC backends. LiteLLM (litellm.yaml) fronts both as
# one OpenAI endpoint; these per-model services are its upstreams (and standalone-usable).
#
# Services have NO selector, so Kubernetes doesn't manage their Endpoints — the manual
# Endpoints below are authoritative (mirrored to EndpointSlices for Cilium/CoreDNS).
# Shared label app.kubernetes.io/component=llama-server lets one ServiceMonitor scrape both.
---
apiVersion: v1
kind: Service
metadata:
  name: llm
  namespace: ai
  labels:
    app.kubernetes.io/name: llm
    app.kubernetes.io/component: llama-server
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm
  namespace: ai
  labels:
    app.kubernetes.io/name: llm
subsets:
  - addresses:
      - { ip: 192.168.0.51, hostname: ai-llm-1 }
      - { ip: 192.168.0.52, hostname: ai-llm-2 }
      - { ip: 192.168.0.53, hostname: ai-llm-3 }
    ports:
      - { name: http, port: 8080, protocol: TCP }
---
apiVersion: v1
kind: Service
metadata:
  name: llm-coder
  namespace: ai
  labels:
    app.kubernetes.io/name: llm-coder
    app.kubernetes.io/component: llama-server
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8081, targetPort: 8081, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-coder
  namespace: ai
  labels:
    app.kubernetes.io/name: llm-coder
subsets:
  - addresses:
      - { ip: 192.168.0.51, hostname: ai-llm-1 }
      - { ip: 192.168.0.52, hostname: ai-llm-2 }
      - { ip: 192.168.0.53, hostname: ai-llm-3 }
    ports:
      - { name: http, port: 8081, protocol: TCP }
