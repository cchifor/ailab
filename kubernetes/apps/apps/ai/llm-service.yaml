# Publishes the off-cluster ai-llm LXCs into the cluster. To fit the heavyweights (which each
# fill a node's iGPU), models are pinned per node: node1 (.44) runs qwen3.6-35b-a3b :8080
# (daily driver — coding + image/video vision) + gemma-4-26b-a4b :8082 (on-demand); node2 (.45)
# runs gpt-oss-120b :8080; node3 (.46) runs qwen3.5-122b :8080. LiteLLM (litellm.yaml) fronts them
# as one OpenAI endpoint. Shared label app.kubernetes.io/component=llama-server lets one
# ServiceMonitor scrape them all. Services have no selector → manual Endpoints below.
# (2026-07: qwen3.6 became node1's :8080 daily driver, replacing qwen3-30b-a3b; the separate
#  :8081 instance + its llm-qwen36 Service were removed. gemma-4 is on-demand — see litellm.yaml.)
---
apiVersion: v1
kind: Service
metadata:
  name: llm
  namespace: ai
  labels: { app.kubernetes.io/name: llm, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm
  namespace: ai
  labels: { app.kubernetes.io/name: llm }
subsets:
  - addresses: [{ ip: 192.168.0.44, hostname: ai-llm-1 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gptoss
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gptoss, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gptoss
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gptoss }
subsets:
  - addresses: [{ ip: 192.168.0.45, hostname: ai-llm-2 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-qwen35
  namespace: ai
  labels: { app.kubernetes.io/name: llm-qwen35, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-qwen35
  namespace: ai
  labels: { app.kubernetes.io/name: llm-qwen35 }
subsets:
  - addresses: [{ ip: 192.168.0.46, hostname: ai-llm-3 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
# Gemma-4-26B-A4B (vision, image+video) — 3rd instance on node1 :8082 (replaced qwen3-vl-8b, 2026-06).
apiVersion: v1
kind: Service
metadata:
  name: llm-gemma4
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gemma4, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8082, targetPort: 8082, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gemma4
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gemma4 }
subsets:
  - addresses: [{ ip: 192.168.0.44, hostname: ai-llm-1 }]
    ports: [{ name: http, port: 8082, protocol: TCP }]
