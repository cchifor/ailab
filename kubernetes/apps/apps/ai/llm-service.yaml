# Publishes the off-cluster ai-llm LXCs into the cluster. Topology (2026-07-08, see
# kubernetes/infra/ai-lxc/models.yaml): node1 (.44) + node2 (.45) BOTH run qwen3.6-35b-a3b :8080
# pinned (the daily driver) — so the `llm` Service has TWO endpoints and LiteLLM load-balances /
# fails over across them. node3 (.46) runs llama-swap serving qwen3.5-122b OR gpt-oss-120b on demand,
# so BOTH `llm-qwen35` and `llm-gptoss` point at .46:8080 (llama-swap dispatches by the request's model
# name). LiteLLM (litellm.yaml) fronts them as one OpenAI endpoint. Shared label
# app.kubernetes.io/component=llama-server lets one ServiceMonitor scrape them all. Services have no
# selector → manual Endpoints below. gemma-4 (node1 :8082) is on-demand — see litellm.yaml.
---
apiVersion: v1
kind: Service
metadata:
  name: llm
  namespace: ai
  labels: { app.kubernetes.io/name: llm, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm
  namespace: ai
  labels: { app.kubernetes.io/name: llm }
subsets:
  # qwen3.6-35b-a3b is pinned on BOTH node1 and node2 — the Service round-robins / fails over across them.
  - addresses:
      - { ip: 192.168.0.44, hostname: ai-llm-1 }
      - { ip: 192.168.0.45, hostname: ai-llm-2 }
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gptoss
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gptoss, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gptoss
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gptoss }
subsets:
  # gpt-oss moved node2 -> node3 (.46), served on-demand by node3's llama-swap (shares the iGPU with 122b).
  - addresses: [{ ip: 192.168.0.46, hostname: ai-llm-3 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-qwen35
  namespace: ai
  labels: { app.kubernetes.io/name: llm-qwen35, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-qwen35
  namespace: ai
  labels: { app.kubernetes.io/name: llm-qwen35 }
subsets:
  - addresses: [{ ip: 192.168.0.46, hostname: ai-llm-3 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
# Gemma-4-26B-A4B (vision, image+video) — 3rd instance on node1 :8082 (replaced qwen3-vl-8b, 2026-06).
apiVersion: v1
kind: Service
metadata:
  name: llm-gemma4
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gemma4, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8082, targetPort: 8082, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gemma4
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gemma4 }
subsets:
  - addresses: [{ ip: 192.168.0.44, hostname: ai-llm-1 }]
    ports: [{ name: http, port: 8082, protocol: TCP }]
