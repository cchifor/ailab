# Publishes the off-cluster ai-llm LXCs into the cluster. To fit the heavyweights (which each
# fill a node's iGPU), models are pinned per node: node1 (.51) runs general :8080 + coder :8081;
# node2 (.52) runs gpt-oss-120b :8080; node3 (.53) runs qwen3.5-122b :8080. LiteLLM (litellm.yaml)
# fronts all four as one OpenAI endpoint. Shared label app.kubernetes.io/component=llama-server
# lets one ServiceMonitor scrape them all. Services have no selector → manual Endpoints below.
---
apiVersion: v1
kind: Service
metadata:
  name: llm
  namespace: ai
  labels: { app.kubernetes.io/name: llm, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm
  namespace: ai
  labels: { app.kubernetes.io/name: llm }
subsets:
  - addresses: [{ ip: 192.168.0.51, hostname: ai-llm-1 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-coder
  namespace: ai
  labels: { app.kubernetes.io/name: llm-coder, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8081, targetPort: 8081, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-coder
  namespace: ai
  labels: { app.kubernetes.io/name: llm-coder }
subsets:
  - addresses: [{ ip: 192.168.0.51, hostname: ai-llm-1 }]
    ports: [{ name: http, port: 8081, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gptoss
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gptoss, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gptoss
  namespace: ai
  labels: { app.kubernetes.io/name: llm-gptoss }
subsets:
  - addresses: [{ ip: 192.168.0.52, hostname: ai-llm-2 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-qwen35
  namespace: ai
  labels: { app.kubernetes.io/name: llm-qwen35, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-qwen35
  namespace: ai
  labels: { app.kubernetes.io/name: llm-qwen35 }
subsets:
  - addresses: [{ ip: 192.168.0.53, hostname: ai-llm-3 }]
    ports: [{ name: http, port: 8080, protocol: TCP }]
---
# Vision/VL model (Qwen3-VL-8B + mmproj) — 3rd instance on node1 :8082.
apiVersion: v1
kind: Service
metadata:
  name: llm-vision
  namespace: ai
  labels: { app.kubernetes.io/name: llm-vision, app.kubernetes.io/component: llama-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8082, targetPort: 8082, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-vision
  namespace: ai
  labels: { app.kubernetes.io/name: llm-vision }
subsets:
  - addresses: [{ ip: 192.168.0.51, hostname: ai-llm-1 }]
    ports: [{ name: http, port: 8082, protocol: TCP }]
