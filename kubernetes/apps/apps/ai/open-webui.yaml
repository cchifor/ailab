# Open WebUI — chat UI in front of the LiteLLM router. Persists chats/config on the NFS
# default StorageClass. Single replica (Recreate) to keep its SQLite store consistent.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: ai
spec:
  accessModes: ["ReadWriteMany"] # nfs-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai
  labels:
    app.kubernetes.io/name: open-webui
spec:
  # 2 replicas for HA + real concurrency, now that state lives in Postgres (not single-writer SQLite-on-NFS)
  # and websockets are Redis-backed. A 2026-07-09 load test showed the single replica serialized every chat
  # (lockstep latencies) and a busy /health got it liveness-killed.
  replicas: 2
  strategy:
    # maxUnavailable:0 + maxSurge:1 also brings pods up ONE at a time, so the first new pod runs the
    # Alembic schema migration on the fresh Postgres alone before the second starts (no migration race).
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - { name: http, containerPort: 8080 }
          env:
            # Point at the LiteLLM router; key is ignored (LiteLLM runs open internally).
            - { name: OPENAI_API_BASE_URL, value: "http://litellm.ai.svc.cluster.local:4000/v1" }
            - name: OPENAI_API_KEY # the LiteLLM master key (LiteLLM now requires it)
              valueFrom:
                secretKeyRef: { name: litellm-secret, key: master-key }
            - { name: ENABLE_OLLAMA_API, value: "False" } # we only use the OpenAI endpoint
            # Match LiteLLM request_timeout (900s) + llama-swap healthCheckTimeout (900s). A qwen3.5-122b
            # cold-load + long reasoning turn can run minutes; OWUI's aiohttp client would otherwise abort
            # the streamed response at its ~300s default and surface as "loading failed" in the browser
            # while the backend is still generating. See docs/runbooks/ai-model-swap.md.
            - { name: AIOHTTP_CLIENT_TIMEOUT, value: "900" }
            - { name: WEBUI_NAME, value: "ailab AI" }
            # SSO via Authelia OIDC (ADR 0012). Local login stays as break-glass; OAuth sign-up on.
            - { name: WEBUI_URL, value: "https://chat.chifor.me" }
            - { name: ENABLE_OAUTH_SIGNUP, value: "true" }
            - { name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL, value: "true" }
            - { name: OAUTH_PROVIDER_NAME, value: "Authelia" }
            - { name: OPENID_PROVIDER_URL, value: "https://sso.chifor.me/.well-known/openid-configuration" }
            - { name: OAUTH_CLIENT_ID, value: "open-webui" }
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: open-webui-oauth, key: OAUTH_CLIENT_SECRET }
            - { name: OAUTH_SCOPES, value: "openid email profile groups" }
            - { name: OAUTH_CODE_CHALLENGE_METHOD, value: "S256" }
            - { name: ENABLE_OAUTH_ROLE_MANAGEMENT, value: "true" }
            - { name: OAUTH_ROLES_CLAIM, value: "groups" }
            - { name: OAUTH_ALLOWED_ROLES, value: "openwebui,openwebui-admin" }
            - { name: OAUTH_ADMIN_ROLES, value: "openwebui-admin" }
            # --- Multi-replica state (replaces single-writer SQLite-on-NFS) ---
            # Relational store -> infra-pg Postgres (ADR 0016 pattern, alongside grafana/authelia). The old
            # webui.db + chroma.sqlite3 stay on the PVC as a reversible backup (unused while DATABASE_URL is set).
            - name: DATABASE_URL # postgresql://openwebui:***@infra-pg-rw.databases.svc:5432/openwebui
              valueFrom:
                secretKeyRef: { name: open-webui-db, key: DATABASE_URL }
            # RAG vectors -> pgvector (shared, multi-replica-safe). The default file-based Chroma on the RWX
            # PVC would be corrupted by 2 replicas writing concurrently. Reuses the same Postgres DB.
            - { name: VECTOR_DB, value: "pgvector" }
            - name: PGVECTOR_DB_URL
              valueFrom:
                secretKeyRef: { name: open-webui-db, key: DATABASE_URL }
            # Socket.IO backplane: an event produced on one replica must reach a client connected to another,
            # or streaming breaks across replicas. Dedicated owui-valkey (db 0 = websockets, db 1 = app cache).
            - { name: ENABLE_WEBSOCKET_SUPPORT, value: "true" }
            - { name: WEBSOCKET_MANAGER, value: "redis" }
            - { name: WEBSOCKET_REDIS_URL, value: "redis://owui-valkey.ai.svc.cluster.local:6379/0" }
            - { name: REDIS_URL, value: "redis://owui-valkey.ai.svc.cluster.local:6379/1" }
          volumeMounts:
            - { name: data, mountPath: /app/backend/data }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5 # default 1s is too tight — the single worker can't answer /health mid-stream
            failureThreshold: 30 # first start downloads an embedding model
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 180
            periodSeconds: 30
            # OWUI is a SINGLE replica / single uvicorn worker: while it streams several concurrent chats its
            # event loop can briefly miss the /health probe. A concurrent-load test (2026-07-09) showed the
            # DEFAULT probe (timeoutSeconds 1, failureThreshold 3) killing OWUI mid-chat — kubelet SIGKILL,
            # exit 137, Reason=Error (NOT an OOM: memory held ~0.7/2Gi) — which orphaned every in-flight
            # stream and failed all active sessions. Give the busy loop slack: 5s per check, and ~3min
            # (6×30s) of SUSTAINED failure before a restart. Real fix for the serialization is multi-replica
            # OWUI on Postgres (off SQLite-on-NFS) — tracked separately.
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ai
  labels:
    app.kubernetes.io/name: open-webui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: open-webui
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
---
# Keep at least one OWUI pod during voluntary disruptions (node drain, rollout) now that it is HA.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: open-webui
  namespace: ai
  labels:
    app.kubernetes.io/name: open-webui
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
