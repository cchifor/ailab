# Open WebUI — chat UI in front of the LiteLLM router. Persists chats/config on the NFS
# default StorageClass. Single replica (Recreate) to keep its SQLite store consistent.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: ai
spec:
  accessModes: ["ReadWriteMany"] # nfs-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai
  labels:
    app.kubernetes.io/name: open-webui
spec:
  replicas: 1
  strategy:
    type: Recreate # one writer for the SQLite data dir
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - { name: http, containerPort: 8080 }
          env:
            # Point at the LiteLLM router; key is ignored (LiteLLM runs open internally).
            - { name: OPENAI_API_BASE_URL, value: "http://litellm.ai.svc.cluster.local:4000/v1" }
            - name: OPENAI_API_KEY # the LiteLLM master key (LiteLLM now requires it)
              valueFrom:
                secretKeyRef: { name: litellm-secret, key: master-key }
            - { name: ENABLE_OLLAMA_API, value: "False" } # we only use the OpenAI endpoint
            # Match LiteLLM request_timeout (900s) + llama-swap healthCheckTimeout (900s). A qwen3.5-122b
            # cold-load + long reasoning turn can run minutes; OWUI's aiohttp client would otherwise abort
            # the streamed response at its ~300s default and surface as "loading failed" in the browser
            # while the backend is still generating. See docs/runbooks/ai-model-swap.md.
            - { name: AIOHTTP_CLIENT_TIMEOUT, value: "900" }
            # Open WebUI fires up to ~4 requests PER message (main + title + tags + follow-up), all to the
            # chat model. On the reasoning daily-driver qwen3.6 (--parallel 1 per node → one request at a
            # time) that fan-out head-of-line-blocked the single slot — measured 4 deferred requests and
            # multi-minute "delays" that looked like the model being evicted. Disable the per-message task
            # generations so 1 chat message = exactly 1 backend request. TASK_MODEL_EXTERNAL keeps the rare
            # search/RAG query-gen (only fires with web-search/knowledge) on a fast cloud model, off qwen3.6.
            # NOTE: these are Open WebUI PersistentConfig — on an EXISTING install the DB value (set live via
            # the admin Settings/API) WINS and these env vars only SEED a fresh PVC. Keep them in sync.
            - { name: ENABLE_TITLE_GENERATION, value: "False" }
            - { name: ENABLE_TAGS_GENERATION, value: "False" }
            - { name: ENABLE_FOLLOW_UP_GENERATION, value: "False" }
            - { name: TASK_MODEL_EXTERNAL, value: "gpt-4.1-mini" }
            - { name: WEBUI_NAME, value: "ailab AI" }
            # SSO via Authelia OIDC (ADR 0012). Local login stays as break-glass; OAuth sign-up on.
            - { name: WEBUI_URL, value: "https://chat.chifor.me" }
            - { name: ENABLE_OAUTH_SIGNUP, value: "true" }
            - { name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL, value: "true" }
            - { name: OAUTH_PROVIDER_NAME, value: "Authelia" }
            - { name: OPENID_PROVIDER_URL, value: "https://sso.chifor.me/.well-known/openid-configuration" }
            - { name: OAUTH_CLIENT_ID, value: "open-webui" }
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: open-webui-oauth, key: OAUTH_CLIENT_SECRET }
            - { name: OAUTH_SCOPES, value: "openid email profile groups" }
            - { name: OAUTH_CODE_CHALLENGE_METHOD, value: "S256" }
            - { name: ENABLE_OAUTH_ROLE_MANAGEMENT, value: "true" }
            - { name: OAUTH_ROLES_CLAIM, value: "groups" }
            - { name: OAUTH_ALLOWED_ROLES, value: "openwebui,openwebui-admin" }
            - { name: OAUTH_ADMIN_ROLES, value: "openwebui-admin" }
          volumeMounts:
            - { name: data, mountPath: /app/backend/data }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30 # first start downloads an embedding model
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 180
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ai
  labels:
    app.kubernetes.io/name: open-webui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: open-webui
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
