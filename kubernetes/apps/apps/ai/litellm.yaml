# LiteLLM proxy: one OpenAI-compatible endpoint (litellm.ai.svc:4000/v1) that routes by
# model name to the per-node llama-server backends. node3 (llama-swap) now serves ONLY qwen3.5-122b —
# the sole local heavyweight — which loads on first request (multi-minute cold start covered by
# request_timeout below) and idle-unloads after its ttl. gpt-oss-120b is retired locally (it thrashed
# node3's single iGPU against qwen3.5-122b) and its model_name is shimmed to the pinned qwen3.6 (below).
# See kubernetes/infra/ai-lxc + docs/runbooks/ai-model-swap.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  config.yaml: |
    model_list:
      # max_input_tokens = the per-request context window the llama-server
      # actually serves (n_ctx / --parallel), with output headroom. LiteLLM
      # fails fast with a clean ContextWindowExceededError above this instead of
      # forwarding a doomed request; the deepagent codes it as a friendly
      # context_window_exceeded (platform PR #636). KEEP IN SYNC with the host
      # launch args in docs/runbooks/ai-host-setup.md.
      # qwen3.6-35b-a3b — the daily driver, PINNED on node1 (.44) AND node2 (.45). Registered as TWO
      # deployments (llm-node1 / llm-node2) so the LiteLLM router health-aware load-balances the pair:
      # on failure it retries the OTHER node and parks the bad one (router_settings below), instead of
      # kube-proxy's readiness-blind round-robin over the `llm` Service. Replaced qwen3-30b-a3b (2026-07-01).
      # host CTX=262144 (native n_ctx_train) PARALLEL=1, q8_0 K/V cache; ~16K output headroom — Qwen3.6 is a
      # REASONING model (emits a <think> trace in reasoning_content), so keep max_input_tokens generous.
      # supports_vision: multimodal (image + video); also replaced gemma-4 for vision.
      - model_name: qwen3.6-35b-a3b
        litellm_params:
          model: openai/qwen3.6-35b-a3b
          api_base: http://llm-node1.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info: { supports_vision: true, max_input_tokens: 245760 }
      - model_name: qwen3.6-35b-a3b
        litellm_params:
          model: openai/qwen3.6-35b-a3b
          api_base: http://llm-node2.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info: { supports_vision: true, max_input_tokens: 245760 }
      # gpt-oss-120b RETIRED as a LOCAL model (2026-07-08): node3 now serves ONLY qwen3.5-122b. Reason —
      # qwen3.5-122b and gpt-oss-120b (both ~60-71 GiB) cannot co-reside in node3's single 96 GiB iGPU
      # LXC, so when interactive traffic (qwen3.5-122b) and the deepagent platform (gpt-oss) interleave,
      # llama-swap evicted+cold-reloaded on nearly EVERY request (measured ~55-82s reload per crossover,
      # 4/4). Removing this route is what ends the thrash: no traffic reaches node3's gpt-oss anymore.
      # The model_name is KEPT and SHIMMED to the always-warm, local, zero-cost qwen3.6 daily driver so
      # existing callers that request "gpt-oss-120b" keep working (the chosen "falls back to qwen3.6"
      # path). To serve a real gpt-oss-class model instead, point model/api_key at gpt-5.4 (mind the
      # global max_budget) — or delete this entry to hard-retire the name. See docs/runbooks/ai-model-swap.md.
      # Shimmed to qwen3.6, and (like qwen3.6) registered on BOTH nodes so the shim path is load-balanced too.
      - model_name: gpt-oss-120b
        litellm_params:
          model: openai/qwen3.6-35b-a3b
          api_base: http://llm-node1.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info: { supports_vision: true, max_input_tokens: 245760 }
      - model_name: gpt-oss-120b
        litellm_params:
          model: openai/qwen3.6-35b-a3b
          api_base: http://llm-node2.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info: { supports_vision: true, max_input_tokens: 245760 }
      - model_name: qwen3.5-122b
        litellm_params:
          model: openai/qwen3.5-122b
          api_base: http://llm-qwen35.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info:
          max_input_tokens: 7000 # host CTX=8192
      # gemma-4-26b-a4b is now ON-DEMAND (unlisted so the router never advertises a down backend,
      # matching the heavyweight policy). It was stopped on node1 :8082 to free ~15 GiB VRAM for
      # Qwen3.6's extended context; Qwen3.6 covers image+video, so no steady-state vision is lost.
      # To bring it back: re-provision node1 :8082 (see ai-host-setup.md) and uncomment this block.
      # - model_name: gemma-4-26b-a4b
      #   litellm_params:
      #     model: openai/gemma-4-26b-a4b
      #     api_base: http://llm-gemma4.ai.svc.cluster.local:8082/v1
      #     api_key: "sk-noauth"
      #   model_info:
      #     supports_vision: true
      #     max_input_tokens: 15000 # host CTX=16384 PARALLEL=1
      # Cloud models (real OpenAI/Anthropic) for the Strive platform's model
      # dropdown. Keys come from the litellm-cloud-keys Secret (SOPS), referenced
      # via os.environ/ so they never appear in this ConfigMap.
      - model_name: gpt-4.1
        litellm_params:
          model: openai/gpt-4.1
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-4.1-mini
        litellm_params:
          model: openai/gpt-4.1-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
      # Sonnet 5 — the platform catalog's current Claude id (replaces 4-6 there).
      # Kept alongside 4-6 during the deploy transition: the currently-running
      # deepagent still requests claude-sonnet-4-6 until the image digest bump.
      - model_name: claude-sonnet-5
        litellm_params:
          model: anthropic/claude-sonnet-5
          api_key: os.environ/ANTHROPIC_API_KEY
      # GPT-5.x flagship tier — completes the Strive platform's 8 "online" catalog
      # ids. Bare model_name = exactly what pydantic-ai sends over the wire; no
      # api_base (direct to api.openai.com) reusing the same litellm-cloud-keys key.
      - model_name: gpt-5.4
        litellm_params:
          model: openai/gpt-5.4
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5.4-mini
        litellm_params:
          model: openai/gpt-5.4-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5.4-nano
        litellm_params:
          model: openai/gpt-5.4-nano
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5
        litellm_params:
          model: openai/gpt-5
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5-mini
        litellm_params:
          model: openai/gpt-5-mini
          api_key: os.environ/OPENAI_API_KEY
    litellm_settings:
      drop_params: true
      # 900s to cover a llama-swap COLD START: the first request to an idle-unloaded heavyweight
      # (gpt-oss ~1.5-4 min, qwen3.5-122b ~4-5 min over NFS) must not time out before the model loads.
      # Matches llama-swap's healthCheckTimeout (kubernetes/infra/ai-lxc/provision.sh SWAP mode).
      request_timeout: 900
      # Spend guard: hard ceiling on third-party (OpenAI/Anthropic) cost so a LITELLM_MASTER_KEY leak on
      # the (soon-public) api.chifor.me can't run up unbounded cloud spend. Global across all models/keys;
      # tune to comfort. For finer control, move cloud models behind a separate virtual key with its own budget.
      max_budget: 50 # USD
      budget_duration: 30d
    # Router (all proxy traffic flows through it): health-aware load-balancing across a model's
    # deployments. qwen3.6-35b-a3b (and the gpt-oss shim) have TWO deployments (llm-node1/llm-node2);
    # on a failed call the router retries the OTHER node and, after allowed_fails, parks the bad one for
    # cooldown_time — so a down/restarting daily-driver node degrades gracefully instead of ~50% errors.
    # (Single-deployment models like qwen3.5-122b/cloud still benefit from num_retries on transient 5xx.)
    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      allowed_fails: 2
      cooldown_time: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai
  labels:
    app.kubernetes.io/name: litellm
spec:
  # 2 replicas so a single-pod OOMKill (LiteLLM main-stable grows unbounded under sustained agentic
  # load) no longer blanks the WHOLE gateway — the surviving replica keeps serving every model while
  # the OOMed one restarts. LiteLLM is stateless here (STORE_MODEL_IN_DB=False) so replicas are safe.
  # NOTE: max_budget is tracked IN-MEMORY PER REPLICA, so the $50/30d cloud guard is now ~2x and resets
  # on any restart — for a hard cloud-cost cap use a DB/Redis-backed virtual-key budget instead.
  replicas: 2
  strategy:
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } # never drop below 2 healthy during a rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
      annotations:
        # Rolls the pod when config.yaml changes — LiteLLM reads the mounted
        # ConfigMap only at startup and there is no Reloader in-cluster, so a
        # ConfigMap-only edit would otherwise be a silent no-op. Recompute on
        # every model_list change with EXACTLY:
        #   yq -r 'select(.kind=="ConfigMap" and .metadata.name=="litellm-config") | .data."config.yaml"' \
        #     kubernetes/apps/apps/ai/litellm.yaml | sha256sum | cut -c1-12
        checksum/config: "60bbc9ec4db2"
    spec:
      # Spread the two replicas across nodes so one node going down (or an OOM storm on it) can't take
      # both gateway pods at once. Preferred (not required) — the 3-node cluster must still schedule both.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector: { matchLabels: { app.kubernetes.io/name: litellm } }
                topologyKey: kubernetes.io/hostname
      containers:
        - name: litellm
          # Pinned by DIGEST (main-stable is a MOVING tag → silent, unreviewed upgrades). This digest =
          # ghcr.io/berriai/litellm:main-stable as of 2026-07-08. Bump deliberately: pull main-stable,
          # read `docker inspect --format '{{index .RepoDigests 0}}'`, update here, review, merge.
          image: ghcr.io/berriai/litellm@sha256:078f96272f0c84da383e6a1f197478390b5204a86dcf00a181bcfe02a00e5dfa
          command: ["litellm"]
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "1"]
          ports:
            - { name: http, containerPort: 4000 }
          env:
            - { name: STORE_MODEL_IN_DB, value: "False" }
            - { name: LITELLM_LOG, value: "INFO" }
            # Auth for the (soon public) api.chifor.me. Internal callers (Open WebUI) send this too.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef: { name: litellm-secret, key: master-key }
            # Real cloud-provider keys (SOPS, litellm-cloud-keys) for the
            # gpt-4.1 / gpt-4.1-mini / claude-sonnet-4-6 models registered above.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-cloud-keys, key: OPENAI_API_KEY }
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-cloud-keys, key: ANTHROPIC_API_KEY }
          volumeMounts:
            - { name: config, mountPath: /etc/litellm, readOnly: true }
          readinessProbe:
            httpGet: { path: /health/liveliness, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/liveliness, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 1Gi }
            # LiteLLM loads heavy Python deps/tokenizers; <1Gi OOMs at startup.
            # 2Gi OOMKills mid-request under heavy agentic load (long qwen
            # reasoning turns via the router_orchestrator profile stream large
            # bodies + connection-pool buffers through the proxy) — the drop
            # surfaces to callers as "incomplete chunked read" / connection
            # errors. 6Gi gives headroom for concurrent streamed completions.
            limits: { memory: 6Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: litellm-config }
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai
  labels:
    app.kubernetes.io/name: litellm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - { name: http, port: 4000, targetPort: http, protocol: TCP }
---
# Keep at least one gateway pod during VOLUNTARY disruptions (node drain, rollout) so a maintenance
# action can't take the whole LiteLLM gateway down. (Does not guard involuntary OOMKills — replicas:2
# + anti-affinity cover those.)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: litellm
  namespace: ai
  labels:
    app.kubernetes.io/name: litellm
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
