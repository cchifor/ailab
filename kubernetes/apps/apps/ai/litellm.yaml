# LiteLLM proxy: one OpenAI-compatible endpoint (litellm.ai.svc:4000/v1) that routes by
# model name to the per-node llama-server backends. The heavyweights (gpt-oss-120b, qwen3.5-122b) ARE
# listed: their nodes now run llama-swap (kubernetes/infra/ai-lxc, docs/runbooks/ai-model-swap.md), so
# the :8080 backend always answers and loads the model on first request — no "down backend" window.
# The first request after idle pays a multi-minute cold start, which request_timeout (below) covers.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  config.yaml: |
    model_list:
      # max_input_tokens = the per-request context window the llama-server
      # actually serves (n_ctx / --parallel), with output headroom. LiteLLM
      # fails fast with a clean ContextWindowExceededError above this instead of
      # forwarding a doomed request; the deepagent codes it as a friendly
      # context_window_exceeded (platform PR #636). KEEP IN SYNC with the host
      # launch args in docs/runbooks/ai-host-setup.md.
      # qwen3.6-35b-a3b is node1's daily driver on :8080 (the `llm` Service). It replaced
      # qwen3-30b-a3b (removed 2026-07-01) — a strict upgrade (coding + image/video vision).
      - model_name: qwen3.6-35b-a3b
        litellm_params:
          model: openai/qwen3.6-35b-a3b
          api_base: http://llm.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info:
          supports_vision: true # Qwen3.6 is multimodal (image + video); also replaced gemma-4 for vision
          # host CTX=262144 (native n_ctx_train) PARALLEL=1, q8_0 K/V cache. Extended from 32768 for
          # agentic tool loops. ~16K reserved for output: Qwen3.6 is a REASONING model (emits a <think>
          # trace in reasoning_content before the answer/tool-call), so output budget must stay generous.
          max_input_tokens: 245760
      - model_name: gpt-oss-120b
        litellm_params:
          model: openai/gpt-oss-120b
          api_base: http://llm-gptoss.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info:
          max_input_tokens: 7000 # host CTX=8192
      - model_name: qwen3.5-122b
        litellm_params:
          model: openai/qwen3.5-122b
          api_base: http://llm-qwen35.ai.svc.cluster.local:8080/v1
          api_key: "sk-noauth"
        model_info:
          max_input_tokens: 7000 # host CTX=8192
      # gemma-4-26b-a4b is now ON-DEMAND (unlisted so the router never advertises a down backend,
      # matching the heavyweight policy). It was stopped on node1 :8082 to free ~15 GiB VRAM for
      # Qwen3.6's extended context; Qwen3.6 covers image+video, so no steady-state vision is lost.
      # To bring it back: re-provision node1 :8082 (see ai-host-setup.md) and uncomment this block.
      # - model_name: gemma-4-26b-a4b
      #   litellm_params:
      #     model: openai/gemma-4-26b-a4b
      #     api_base: http://llm-gemma4.ai.svc.cluster.local:8082/v1
      #     api_key: "sk-noauth"
      #   model_info:
      #     supports_vision: true
      #     max_input_tokens: 15000 # host CTX=16384 PARALLEL=1
      # Cloud models (real OpenAI/Anthropic) for the Strive platform's model
      # dropdown. Keys come from the litellm-cloud-keys Secret (SOPS), referenced
      # via os.environ/ so they never appear in this ConfigMap.
      - model_name: gpt-4.1
        litellm_params:
          model: openai/gpt-4.1
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-4.1-mini
        litellm_params:
          model: openai/gpt-4.1-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
      # Sonnet 5 — the platform catalog's current Claude id (replaces 4-6 there).
      # Kept alongside 4-6 during the deploy transition: the currently-running
      # deepagent still requests claude-sonnet-4-6 until the image digest bump.
      - model_name: claude-sonnet-5
        litellm_params:
          model: anthropic/claude-sonnet-5
          api_key: os.environ/ANTHROPIC_API_KEY
      # GPT-5.x flagship tier — completes the Strive platform's 8 "online" catalog
      # ids. Bare model_name = exactly what pydantic-ai sends over the wire; no
      # api_base (direct to api.openai.com) reusing the same litellm-cloud-keys key.
      - model_name: gpt-5.4
        litellm_params:
          model: openai/gpt-5.4
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5.4-mini
        litellm_params:
          model: openai/gpt-5.4-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5.4-nano
        litellm_params:
          model: openai/gpt-5.4-nano
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5
        litellm_params:
          model: openai/gpt-5
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-5-mini
        litellm_params:
          model: openai/gpt-5-mini
          api_key: os.environ/OPENAI_API_KEY
    litellm_settings:
      drop_params: true
      # 900s to cover a llama-swap COLD START: the first request to an idle-unloaded heavyweight
      # (gpt-oss ~1.5-4 min, qwen3.5-122b ~4-5 min over NFS) must not time out before the model loads.
      # Matches llama-swap's healthCheckTimeout (kubernetes/infra/ai-lxc/provision.sh SWAP mode).
      request_timeout: 900
      # Spend guard: hard ceiling on third-party (OpenAI/Anthropic) cost so a LITELLM_MASTER_KEY leak on
      # the (soon-public) api.chifor.me can't run up unbounded cloud spend. Global across all models/keys;
      # tune to comfort. For finer control, move cloud models behind a separate virtual key with its own budget.
      max_budget: 50 # USD
      budget_duration: 30d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai
  labels:
    app.kubernetes.io/name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
      annotations:
        # Rolls the pod when config.yaml changes — LiteLLM reads the mounted
        # ConfigMap only at startup and there is no Reloader in-cluster, so a
        # ConfigMap-only edit would otherwise be a silent no-op. Recompute on
        # every model_list change with EXACTLY:
        #   yq -r 'select(.kind=="ConfigMap" and .metadata.name=="litellm-config") | .data."config.yaml"' \
        #     kubernetes/apps/apps/ai/litellm.yaml | sha256sum | cut -c1-12
        checksum/config: "ac946730b5df"
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          command: ["litellm"]
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "1"]
          ports:
            - { name: http, containerPort: 4000 }
          env:
            - { name: STORE_MODEL_IN_DB, value: "False" }
            - { name: LITELLM_LOG, value: "INFO" }
            # Auth for the (soon public) api.chifor.me. Internal callers (Open WebUI) send this too.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef: { name: litellm-secret, key: master-key }
            # Real cloud-provider keys (SOPS, litellm-cloud-keys) for the
            # gpt-4.1 / gpt-4.1-mini / claude-sonnet-4-6 models registered above.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-cloud-keys, key: OPENAI_API_KEY }
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-cloud-keys, key: ANTHROPIC_API_KEY }
          volumeMounts:
            - { name: config, mountPath: /etc/litellm, readOnly: true }
          readinessProbe:
            httpGet: { path: /health/liveliness, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/liveliness, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 2Gi } # LiteLLM loads heavy Python deps/tokenizers; <1Gi OOMs at startup
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: litellm-config }
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai
  labels:
    app.kubernetes.io/name: litellm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - { name: http, port: 4000, targetPort: http, protocol: TCP }
