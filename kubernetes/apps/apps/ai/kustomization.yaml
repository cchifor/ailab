apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# AI endpoint: surfaces the off-cluster ai-llm LXCs (llama.cpp on the Strix Halo iGPUs)
# as an in-cluster OpenAI-compatible service + Prometheus scrape targets.
resources:
  - namespace.yaml
  - limitrange.yaml
  - litellm-secret.sops.yaml
  - litellm-cloud-keys.sops.yaml # real OpenAI/Anthropic keys for the cloud models in litellm-config
  - open-webui-oauth.sops.yaml # Authelia OIDC client secret for Open WebUI
  - llm-service.yaml
  - monitoring.yaml
  - litellm.yaml
  - open-webui.yaml
