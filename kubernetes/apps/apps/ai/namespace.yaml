apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    app.kubernetes.io/part-of: ai-llm
    # LiteLLM + Open WebUI run here. baseline allows root containers (Open WebUI) while
    # still blocking host namespaces/privileged/hostPath. The off-cluster llama-servers
    # are surfaced via the Endpoints below (no pods).
    pod-security.kubernetes.io/enforce: baseline
