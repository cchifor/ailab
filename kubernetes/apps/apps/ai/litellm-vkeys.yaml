# Per-tenant LiteLLM virtual keys + per-org budget caps for the litellm-local gateway (P3, plan Risk 3).
#
# WHAT THIS GIVES YOU: external tenants each get their OWN virtual key (an sk- token) that (a) is capped at
# a per-org monthly budget, (b) is rate-limited (rpm/tpm), and (c) can reach ONLY the local qwen models —
# never a cloud model (enforced three ways: the litellm-local pod has no cloud creds, its model_list is
# local-only, AND each key carries an explicit `models` whitelist). Subscription OAuth (cloud models) stays
# tenant-zero-only on the separate `litellm` gateway; this local-only gateway is what external tenants use.
#
# HOW IT WORKS: orgs.json below is the declarative source of truth (budget + limits + model whitelist per
# org). The key VALUES live SOPS-encrypted in litellm-vkeys-secret.sops.yaml (env VKEY_<ORG>). The seeding
# Job UPSERTs each org into LiteLLM's DB-backed key store via the admin API using the master key: it probes
# GET /key/info to decide create (/key/generate) vs reconcile (/key/update) — existence is a real read, not
# a parsed write-error string — so this file is idempotent and re-runnable.
#
# BUDGET ENFORCEMENT: LiteLLM meters each key's spend in its Postgres store (litellm-local-db) using the
# SYNTHETIC per-token costs set in litellm-local.yaml (1e-6/token => 1 budget unit ~= 1M tokens). When a
# key's rolling 30d spend crosses max_budget, LiteLLM rejects further requests on that key with a budget
# error until the window rolls — a HARD per-tenant cap, consistent across restarts (DB-backed, not the
# in-memory-per-replica drift called out in litellm.yaml).
#
# OPERATOR-RUN, NOT Flux-applied (deliberately absent from kustomization.yaml — a tenant-provisioning Job
# under the wait:true `apps` Kustomization would wedge the whole apps layer; same rationale as
# apps/agentforge/db-migrate.yaml). Run it by hand:
#
#   # 0. The `litellm` role+DB are now created automatically by Flux — managed.roles (infra-pg.yaml)
#   #    reconciles the ROLE, and the CNPG Database resource (databases/infra-pg-litellm-database.yaml)
#   #    creates the DATABASE; litellm-local waits on it (its wait-for-db initContainer) then migrates its
#   #    OWN schema at boot. No manual DB-create step is required. (databases/litellm-db-bootstrap.yaml is
#   #    retained only as a DR/imperative fallback for a pre-1.24 CNPG operator.)
#   # 1. Define orgs: edit orgs.json (below) + add VKEY_<ORG> to litellm-vkeys-secret.sops.yaml.
#   # 2. Apply the spec + key values, then run the seeding Job:
#   kubectl --context admin@ai apply -f kubernetes/apps/apps/ai/litellm-vkeys-secret.sops.yaml   # decrypt via sops first
#   kubectl --context admin@ai apply -f kubernetes/apps/apps/ai/litellm-vkeys.yaml
#   kubectl --context admin@ai -n ai wait --for=condition=complete job/litellm-seed-vkeys
#   kubectl --context admin@ai -n ai logs job/litellm-seed-vkeys   # shows created/reconciled per org
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-vkeys-spec
  namespace: ai
data:
  # Declarative per-org virtual-key spec. models MUST be a subset of litellm-local's local-only model_list
  # (qwen3.6-35b-a3b, qwen3.5-122b) — NEVER a cloud model. max_budget is in synthetic credit units
  # (1 ~= 1M tokens; see litellm-local.yaml). key_env names the VKEY_ var in the litellm-vkeys Secret.
  orgs.json: |
    [
      {
        "org": "example",
        "key_env": "VKEY_EXAMPLE",
        "models": ["qwen3.6-35b-a3b", "qwen3.5-122b"],
        "max_budget": 20,
        "budget_duration": "30d",
        "rpm_limit": 60,
        "tpm_limit": 200000
      }
    ]
  seed.py: |
    #!/usr/bin/env python3
    """Idempotently UPSERT per-tenant LiteLLM virtual keys from orgs.json.

    Create-or-reconcile each org's key with its budget + rate limits + local-only model whitelist, via the
    LiteLLM admin API using the master key. Re-runnable: a second run reconciles (never duplicates) keys.

    Idempotency is decided by a dedicated READ endpoint (GET /key/info), NOT by parsing a write endpoint's
    error string: a 200 from /key/info means the key already exists -> reconcile via /key/update; otherwise
    create via /key/generate. A final self-heal swaps the endpoint if the create/check race loses (key
    created between our read and write), so the run is robust without brittle message matching.
    """
    import json, os, sys, urllib.parse, urllib.request, urllib.error

    BASE = os.environ["LITELLM_BASE"].rstrip("/")
    MASTER = os.environ["LITELLM_MASTER_KEY"]
    SPEC = "/spec/orgs.json"
    PLACEHOLDER = "0" * 40  # the template value in litellm-vkeys-secret.sops.yaml - skip, not a real tenant

    def request(method, path, body=None):
        data = json.dumps(body).encode() if body is not None else None
        req = urllib.request.Request(
            f"{BASE}{path}",
            data=data,
            headers={"Authorization": f"Bearer {MASTER}", "Content-Type": "application/json"},
            method=method,
        )
        try:
            with urllib.request.urlopen(req, timeout=30) as r:
                return r.status, r.read().decode()
        except urllib.error.HTTPError as e:
            return e.code, e.read().decode()

    def key_exists(key):
        # Existence via the dedicated READ endpoint (/key/info returns 200 for a known key, 4xx otherwise).
        # This is the robust idempotency signal — we never string-match a create/update error body.
        status, _ = request("GET", "/key/info?key=" + urllib.parse.quote(key, safe=""))
        return status == 200

    orgs = json.load(open(SPEC))
    failed = False
    for o in orgs:
        org = o["org"]
        key = os.environ.get(o["key_env"], "")
        if not key or key.endswith(PLACEHOLDER):
            print(f"[skip] {org}: {o['key_env']} is unset/placeholder - not a real tenant")
            continue
        params = {
            "key": key,
            "key_alias": f"tenant-{org}",
            "models": o["models"],                    # local-only whitelist - a cloud model here would 400
            "max_budget": o["max_budget"],
            "budget_duration": o["budget_duration"],
            "rpm_limit": o.get("rpm_limit"),
            "tpm_limit": o.get("tpm_limit"),
            "metadata": {"org": org, "managed_by": "litellm-vkeys.yaml"},
        }
        if key_exists(key):
            path, action = "/key/update", "reconciled"  # reconcile budget/limits/models on the existing key
        else:
            path, action = "/key/generate", "created"
        status, body = request("POST", path, params)
        if status != 200:
            # Self-heal the check/write race (or a stale read): retry on the OTHER endpoint. Endpoint swap,
            # not message parsing — /key/generate <-> /key/update. If it still fails, it's a real error.
            alt = "/key/generate" if path == "/key/update" else "/key/update"
            alt_action = "created" if alt == "/key/generate" else "reconciled"
            status, body = request("POST", alt, params)
            action = alt_action
        if status == 200:
            print(f"[{action}] {org}: alias=tenant-{org} budget={o['max_budget']} models={o['models']}")
        else:
            print(f"[ERROR] {org}: {status} {body}", file=sys.stderr)
            failed = True
    sys.exit(1 if failed else 0)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-seed-vkeys
  namespace: ai
  labels:
    app.kubernetes.io/name: litellm-local
    app.kubernetes.io/component: seed-vkeys
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600 # auto-clean an hour after completion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-local
        app.kubernetes.io/component: seed-vkeys
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      containers:
        - name: seed
          # Reuse the pinned litellm image (has python3) — no new image dependency. Same digest as the
          # litellm-local Deployment; bump together with it.
          image: ghcr.io/berriai/litellm@sha256:078f96272f0c84da383e6a1f197478390b5204a86dcf00a181bcfe02a00e5dfa
          command: ["python3", "/spec/seed.py"]
          env:
            # In-cluster ClusterIP of the litellm-lan Service (a NodePort also has a ClusterIP).
            - { name: LITELLM_BASE, value: "http://litellm-lan.ai.svc.cluster.local:4000" }
            # Master key = the /key/* admin credential (same Secret the gateway uses as its parent key).
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef: { name: litellm-local-secret, key: master-key }
          # Pulls every VKEY_<ORG> tenant key value into the environment for seed.py.
          envFrom:
            - secretRef: { name: litellm-vkeys }
          volumeMounts:
            - { name: spec, mountPath: /spec, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: spec
          configMap: { name: litellm-vkeys-spec }
