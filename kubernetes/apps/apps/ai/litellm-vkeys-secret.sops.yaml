# Per-tenant LiteLLM virtual-key VALUES (P3, plan Risk 3). One env var per org, VKEY_<ORG_UPPER>, whose
# value is the sk- token that org authenticates with against the litellm-local gateway. Stored SOPS-
# encrypted in git for the SAME reason (and blast radius) as litellm-local-secret.sops.yaml: these keys
# reach ONLY the local qwen models (zero cloud cost, LAN-only), so a leak spends free local tokens, never
# cloud dollars. The seeding Job (litellm-vkeys.yaml) UPSERTs these keys into LiteLLM with the budget +
# model whitelist declared in the litellm-vkeys-spec ConfigMap.
#
# Add a tenant: (1) add VKEY_<ORG>=sk-tenant-<org>-<40 random hex> here (openssl rand -hex 20), (2) add a
# matching entry to orgs.json in litellm-vkeys.yaml, (3) re-run the seeding Job. Deliver the sk- value to
# the tenant out-of-band. Rotate by changing the value here + re-running (the Job updates in place by alias).
#
# NB: deliberately NOT in kustomization.yaml — applied by the operator alongside the one-shot seeding Job
# (see litellm-vkeys.yaml header), so Flux never health-gates a tenant-provisioning step on the apps layer.
