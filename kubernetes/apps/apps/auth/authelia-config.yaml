apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: auth
data:
  configuration.yml: |
    theme: 'light'
    server:
      address: 'tcp://0.0.0.0:9091'
    log:
      level: 'info'
      format: 'text'
    # The pod has no external NTP egress (UDP/123); that startup check is fatal by default — skip it
    # (the host/kubelet clock is authoritative). Validated 2026-06-15.
    ntp:
      disable_startup_check: true
    totp:
      issuer: 'chifor.me'
    identity_validation:
      reset_password:
        jwt_lifespan: '5 minutes'
    authentication_backend:
      password_reset:
        disable: false
      file:
        path: '/secrets/users_database.yml'
        watch: false
        password:
          algorithm: 'argon2'
    access_control:
      default_policy: 'one_factor'
    session:
      cookies:
        - domain: 'chifor.me'
          authelia_url: 'https://sso.chifor.me'
          default_redirection_url: 'https://home.chifor.me'
          name: 'authelia_session'
          same_site: 'lax'
          expiration: '1 hour'
          inactivity: '5 minutes'
          remember_me: '1 month'
    regulation:
      max_retries: 3
      find_time: '2 minutes'
      ban_time: '5 minutes'
    storage:
      local:
        path: '/data/db.sqlite3'
    notifier:
      filesystem:
        filename: '/data/notification.txt'
    identity_providers:
      oidc:
        # jwks (RSA issuer key) + the *_secret values are merged from /secrets (SOPS) + *_FILE env.
        clients:
          - client_id: 'grafana'
            client_name: 'Grafana'
            client_secret: '$pbkdf2-sha512$310000$CMKUlWypPN6vZwlMlBZLaA$2mUFKRsGnbaII062DHL0Nz9QMZ2qVIL52tTJaAyG6Mop6A6e6CYG6UOIBe9cQ6lRoIIoQYv.yBxjMaDUCSYI5g'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://grafana.chifor.me/login/generic_oauth'
            scopes: ['openid', 'profile', 'groups', 'email']
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'open-webui'
            client_name: 'Open WebUI'
            client_secret: '$pbkdf2-sha512$310000$IWCIzzFvd6QBYU4P1Lp5qg$JCPWbxrDtzr7F/9YDvp0L6ARp5U8YqsfR5eebVD571xcFDQAjlSdJKXZE26UTRRJKb0FidZUB4SoHpFRI1hnKg'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://chat.chifor.me/oauth/oidc/callback'
            scopes: ['openid', 'profile', 'groups', 'email']
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'homepage'
            client_name: 'Homepage'
            # oauth2-proxy gates home.chifor.me (Homepage has no native auth). Secret hash only here;
            # plaintext is in the SOPS secret oauth2-proxy-homepage (homepage ns).
            client_secret: '$pbkdf2-sha512$310000$E0TyCO.pOHUf1f7/qGL0IQ$MfA8SKebk4E.zU5LmVQ.tWFOWUwctQVgYgHO4i0A8YXYqZeUtppo1E7p4yF1GqXyKaJoKqiOjDs/S2.K8NF9qw'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://home.chifor.me/oauth2/callback'
            scopes: ['openid', 'profile', 'groups', 'email']
            token_endpoint_auth_method: 'client_secret_basic'
