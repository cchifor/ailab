apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: auth
data:
  configuration.yml: |
    theme: 'light'
    server:
      address: 'tcp://0.0.0.0:9091'
    log:
      level: 'info'
      format: 'text'
    # The pod has no external NTP egress (UDP/123); that startup check is fatal by default — skip it
    # (the host/kubelet clock is authoritative). Validated 2026-06-15.
    ntp:
      disable_startup_check: true
    totp:
      issuer: 'chifor.me'
    identity_validation:
      reset_password:
        jwt_lifespan: '5 minutes'
    authentication_backend:
      password_reset:
        disable: false
      file:
        path: '/secrets/users_database.yml'
        watch: false
        password:
          algorithm: 'argon2'
    access_control:
      default_policy: 'one_factor'
    session:
      # Shared session store (ADR 0016): both authelia replicas see the same sessions. Password via
      # AUTHELIA_SESSION_REDIS_PASSWORD_FILE env. auth-valkey is accepted-ephemeral — a bounce means
      # one estate-wide re-login.
      redis:
        host: 'auth-valkey.auth.svc.cluster.local'
        port: 6379
      cookies:
        - domain: 'chifor.me'
          authelia_url: 'https://sso.chifor.me'
          default_redirection_url: 'https://home.chifor.me'
          name: 'authelia_session'
          same_site: 'lax'
          expiration: '1 hour'
          inactivity: '5 minutes'
          remember_me: '1 month'
    regulation:
      max_retries: 3
      find_time: '2 minutes'
      ban_time: '5 minutes'
    storage:
      # infra-pg (databases ns, ADR 0016) — replaces local SQLite so 2 replicas can share state
      # (TOTP/WebAuthn credentials, OIDC consents, regulation records). Password via
      # AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE env; schema migrates automatically on first start
      # (same storage_encryption_key as before).
      postgres:
        address: 'tcp://infra-pg-rw.databases.svc.cluster.local:5432'
        database: 'authelia'
        username: 'authelia'
        timeout: '5s'
    notifier:
      # Per-pod emptyDir now (no SMTP relay in the estate): a password-reset notification lands on
      # whichever replica served the request — `kubectl exec` into BOTH pods to find it.
      filesystem:
        filename: '/data/notification.txt'
    identity_providers:
      oidc:
        # jwks (RSA issuer key) + the *_secret values are merged from /secrets (SOPS) + *_FILE env.
        clients:
          - client_id: 'grafana'
            client_name: 'Grafana'
            client_secret: '$pbkdf2-sha512$310000$CMKUlWypPN6vZwlMlBZLaA$2mUFKRsGnbaII062DHL0Nz9QMZ2qVIL52tTJaAyG6Mop6A6e6CYG6UOIBe9cQ6lRoIIoQYv.yBxjMaDUCSYI5g'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://grafana.chifor.me/login/generic_oauth'
            scopes: ['openid', 'profile', 'groups', 'email']
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'open-webui'
            client_name: 'Open WebUI'
            client_secret: '$pbkdf2-sha512$310000$IWCIzzFvd6QBYU4P1Lp5qg$JCPWbxrDtzr7F/9YDvp0L6ARp5U8YqsfR5eebVD571xcFDQAjlSdJKXZE26UTRRJKb0FidZUB4SoHpFRI1hnKg'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://chat.chifor.me/oauth/oidc/callback'
            scopes: ['openid', 'profile', 'groups', 'email']
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'homepage'
            client_name: 'Homepage'
            # oauth2-proxy gates home.chifor.me (Homepage has no native auth). Secret hash only here;
            # plaintext is in the SOPS secret oauth2-proxy-homepage (homepage ns).
            client_secret: '$pbkdf2-sha512$310000$E0TyCO.pOHUf1f7/qGL0IQ$MfA8SKebk4E.zU5LmVQ.tWFOWUwctQVgYgHO4i0A8YXYqZeUtppo1E7p4yF1GqXyKaJoKqiOjDs/S2.K8NF9qw'
            public: false
            authorization_policy: 'one_factor'
            consent_mode: 'implicit' # first-party app: auto-grant consent (no prompt) for seamless SSO
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://home.chifor.me/oauth2/callback'
            scopes: ['openid', 'profile', 'groups', 'email']
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'registry'
            client_name: 'Container Registry'
            # zot web-UI login via Authelia. zot does NOT use PKCE (require_pkce: false, unlike the
            # others). Secret HASH only here; plaintext is in ansible/secrets/registry.sops.yaml
            # (registry_oidc_client_secret), consumed by the registry_zot role -> zot
            # http.auth.openid. Docker push (ci/htpasswd) + anonymous pull (Talos) are unaffected.
            client_secret: '$pbkdf2-sha512$310000$qq/PKAlfJkUAEttvKgwY3A$wEzLVupv9Wtgxw3uxsIiGk2RWL.qxZoXcbz.o1CddtC84NQGawI6XXnD.n.6SRO7rMncrQygfWrrP64rLUwqFA'
            public: false
            authorization_policy: 'one_factor'
            consent_mode: 'implicit'
            require_pkce: false
            redirect_uris:
              - 'https://registry.chifor.me/zot/auth/callback/oidc'
            scopes: ['openid', 'profile', 'groups', 'email']
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'gitea'
            client_name: 'Gitea'
            # Gitea OIDC login source "Authelia" (gitea.yaml gitea.oauth). Secret HASH only here;
            # plaintext is in kubernetes/apps/apps/gitea/gitea-oauth.sops.yaml (key=gitea, secret=...).
            # Gitea authenticates with client_secret_basic and may omit PKCE -> require_pkce: false
            # (still accepted if sent). Callback is /user/oauth2/<source-name>/callback.
            client_secret: '$pbkdf2-sha512$310000$Rps1dyu9CKic1A0/rELDHQ$aiXVmLHemqcPCgpZ6IlMxcf5JGSH3eUvDZqptQIcGoH/6OQKrW73PToKeWcCtlJljk3x7frjoxM8AU.GhAfxjg'
            public: false
            authorization_policy: 'one_factor'
            consent_mode: 'implicit'
            require_pkce: false
            redirect_uris:
              - 'https://git.chifor.me/user/oauth2/Authelia/callback'
            scopes: ['openid', 'profile', 'groups', 'email']
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'agentforge'
            client_name: 'AgentForge'
            # AgentForge v2 control plane (FastAPI OIDC RP) at agentforge.chifor.me (ADR 0019). Secret
            # HASH only here (pbkdf2-sha512, 310000 iters — matches the other clients); plaintext is in
            # kubernetes/apps/apps/agentforge/agentforge-oauth.sops.yaml (ns agentforge, key
            # OIDC_CLIENT_SECRET). The CP reads the `groups` claim for org RBAC. Regenerate the pair with:
            #   authelia crypto hash generate pbkdf2 --variant sha512 --iterations 310000 --random \
            #            --random.length 72 --random.charset rfc3986
            client_secret: '$pbkdf2-sha512$310000$zrkLDIixE/Cgd..skMs.AA$9qg5GdRSlahtbsovzdg4VwIngaVH3NY6ju/UGGZQPwFDlKOr9llUfBfyuMXUus/b.BH65Ehl8P3rLXQWnrNTlQ'
            public: false
            authorization_policy: 'one_factor'
            consent_mode: 'implicit' # first-party app: auto-grant consent (no prompt) for seamless SSO
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://agentforge.chifor.me/auth/callback'
            scopes: ['openid', 'profile', 'groups', 'email']
            token_endpoint_auth_method: 'client_secret_basic'
