apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Authelia — self-hosted OIDC SSO provider (ADR 0012). Grafana + Open WebUI are OIDC clients;
# Cloudflare Access stays as the outer edge gate. Issuer published at sso.chifor.me (cloudflared).
resources:
  - namespace.yaml
  - limitrange.yaml
  - authelia-secret.sops.yaml
  - authelia-config.yaml
  - authelia.yaml
  - valkey.yaml # auth-valkey: shared (ephemeral) session store enabling authelia x2 (ADR 0016)
