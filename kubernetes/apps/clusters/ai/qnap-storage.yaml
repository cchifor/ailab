apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qnap-storage
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  # Applies the QNAP backend + StorageClass only after `infrastructure` (the qnap-trident
  # HelmRelease) is ready, so the trident.qnap.io CRD exists before the TridentBackendConfig.
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/qnap-storage
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
