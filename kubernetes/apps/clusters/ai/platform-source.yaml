# Strive platform repo — source for the platform deployment.
# The platform's deploy/ tree (Flux components + gitops DAG + Helm umbrella) is
# reconciled from here by the platform Kustomization (platform.yaml).
#
# cchifor/platform is PRIVATE, so this clones over SSH with a read-only deploy
# key. The key Secret (platform-deploy-key, flux-system) is SOPS-encrypted under
# kubernetes/apps/platform-bootstrap and applied by the platform-git-auth
# Kustomization. Pin ref.branch to a tag/sha for immutable deploys once stabilized.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  ref:
    branch: main
  secretRef:
    name: platform-deploy-key
  url: ssh://git@github.com/cchifor/platform
