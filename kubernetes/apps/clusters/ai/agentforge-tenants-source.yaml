# Flux source for the SEPARATE cchifor/agentforge-tenants repo — the ONLY repo the AgentForge CP bot
# can write (Gitea repo-level permission enforces this server-side; the bot has NO write to
# cchifor/ailab, where this GitRepository, the tenant Kustomization, and the admission policy live).
# The CP commits per-workspace desired state to tenants/<org>/<workspace>/ there; this pulls it back.
#
# Clones over SSH with a READ-ONLY Gitea deploy key (scoped to this one repo). The key Secret
# (agentforge-tenants-deploy-key, flux-system) is SOPS-encrypted under
# kubernetes/apps/agentforge-tenants-bootstrap and applied by the agentforge-tenants-git-auth
# Kustomization (the bootstrap-generated flux-system sweep of clusters/ai has NO decryption, so the
# ciphertext Secret can't live here — same split as platform-source/platform-git-auth).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agentforge-tenants
  namespace: flux-system
spec:
  interval: 5m
  ref:
    branch: main
  secretRef:
    name: agentforge-tenants-deploy-key
  url: ssh://git@gitea-ssh.gitea.svc.cluster.local:22/cchifor/agentforge-tenants.git
