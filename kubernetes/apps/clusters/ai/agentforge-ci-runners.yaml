apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentforge-ci-runners
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  # Its OWN path/Kustomization (NOT a line in apps/ or infrastructure/kustomization.yaml) so the
  # operator-owned CI-runner boundary does not collide with the P1 agentforge admission (apps layer) or
  # the concurrent P2 operators editing infrastructure/{security,autoscaling}. Mirrors the
  # agentforge-workers wiring. dependsOn:
  #   * infrastructure — Cilium/ServiceMonitor CRDs (CiliumNetworkPolicy) + the base layer.
  #   * external-secrets — installs the external-secrets.io/v1 CRDs (SecretStore/ExternalSecret) this tree's
  #     externalsecret-regtoken.yaml applies; without it a bootstrap/rebuild could apply those CRs before
  #     the CRDs exist.
  #   * keda — installs the keda.sh/v1alpha1 ScaledJob + TriggerAuthentication CRDs (needed once
  #     scaledjob.yaml is un-gated; the ci-guard VAP + ns/SA/ESO/CNP reconcile without it meanwhile).
  dependsOn:
    - name: infrastructure
    - name: external-secrets
    - name: keda
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/infrastructure/agentforge-ci-runners
  prune: true
  # wait:false so a not-yet-Ready ESO ExternalSecret (ci-runner-registration NotReady until the operator
  # provisions OpenBao) — or the not-yet-un-gated ScaledJob — can never wedge this or any dependent Flux
  # Kustomization; the ns/VAP/SA/CNP still apply immediately.
  wait: false
  # decryption (SOPS) retained for any future SOPS-encrypted operator Secret in this tree — currently none
  # (the reg token is ESO-synced from OpenBao, not SOPS).
  decryption:
    provider: sops
    secretRef:
      name: sops-age
