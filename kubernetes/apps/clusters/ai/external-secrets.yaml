# External Secrets Operator (AgentForge v2 P2 — ADR 0019). DEDICATED Flux Kustomization so it can
# dependsOn `openbao` (vault reconciled first). wait:true — ESO becomes Ready on its own (it does not
# need OpenBao pods running to install; the CP's SecretStores that consume the vault are another
# stream and retry). dependsOn also on infrastructure for the `external-secrets` HelmRepository.
# NOTE: `openbao` runs wait:false, so this dependsOn guarantees openbao's manifests are APPLIED first,
# not that the vault is unsealed — sufficient for install ordering; runtime SecretStores reconcile later.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  dependsOn:
    - name: infrastructure
    - name: openbao
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/infrastructure/security/external-secrets
  prune: true
  wait: true
