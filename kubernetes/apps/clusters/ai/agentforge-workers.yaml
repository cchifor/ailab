apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentforge-workers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  # Its OWN path/Kustomization (NOT a line in apps/ or infrastructure/kustomization.yaml) so the
  # operator-owned worker-autoscaling boundary does not collide with the P1 agentforge admission (apps
  # layer) or the concurrent P2 operators work under infrastructure/{security,autoscaling}. Mirrors the
  # agentforge-broker wiring. dependsOn infrastructure (ESO/Cilium/ServiceMonitor CRDs + PriorityClasses)
  # AND keda (the ScaledObject CRD) — deliberately NOT `apps`/`databases`, so the SA/ESO/Service/SM/CNP/
  # ScaledObject keep reconciling even if those layers are unhealthy.
  dependsOn:
    - name: infrastructure
    - name: keda
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/infrastructure/agentforge-workers
  prune: true
  # wait:false so a not-yet-Ready ESO ExternalSecret (dispatcher-forge NotReady until the operator
  # provisions OpenBao), a not-yet-pinned image (once the Deployments are re-added), or the ScaledObject's
  # not-yet-present target can never wedge this or any dependent Flux Kustomization; the SA/Service/SM/CNP/
  # ScaledObject still apply immediately.
  wait: false
  # decryption (SOPS) retained for any future SOPS-encrypted operator Secret in this tree — currently none
  # (dispatcher creds are ESO-synced from OpenBao, not SOPS).
  decryption:
    provider: sops
    secretRef:
      name: sops-age
