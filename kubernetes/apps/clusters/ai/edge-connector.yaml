apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: edge-connector
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  # Applies the Tailscale subnet-router Connector only after `apps` is Ready — i.e. after the
  # tailscale-operator HelmRelease has installed the connectors.tailscale.com CRD.
  dependsOn:
    - name: apps
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/edge-connector
  prune: true
  wait: true
