# Strive platform — root entrypoint. Points the ailab cluster's Flux at the
# platform repo's per-cluster DAG, which fans out the component + app
# Kustomizations/HelmReleases (sources → secrets/edge/data → app →
# identity/workers). SOPS decryption (sops-age) covers deploy/secrets/ailab.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./deploy/gitops/flux/clusters/ailab
  prune: true
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
