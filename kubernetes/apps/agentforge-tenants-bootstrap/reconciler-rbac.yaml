# Minimal-RBAC identity Flux impersonates when reconciling the CP-written cchifor/agentforge-tenants
# repo (spec.serviceAccountName on the agentforge-tenants Kustomization). This is the FIRST of the two
# layers that box in the tenant path (the ValidatingAdmissionPolicy in
# kubernetes/apps/apps/agentforge/admission/ is the second, field/shape gate). It grants ONLY the
# namespaced GVKs a per-workspace tenant manifest needs — deliberately NO clusterroles/-bindings, NO
# wildcard verbs, NO Flux source/Kustomization objects. So a malicious manifest in the tenant repo
# can at most create objects of these kinds, and admission rejects the dangerous shapes among them.
#
# NOTE: these grants are CLUSTER-WIDE (ClusterRole+ClusterRoleBinding) by necessity — the per-workspace
# af-tenant-* namespaces are created dynamically, so the Roles cannot be pre-bound per-namespace. The
# namespace CONFINEMENT is enforced at admission (agentforge-tenant-guard validation 5 pins every tenant
# object to an af-tenant-* namespace, and validation 6 bars RoleBinding->ClusterRole), so this SA cannot
# actually write a Secret/Deployment/RoleBinding into flux-system/kube-system/databases.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentforge-tenants-reconciler
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentforge-tenants-reconciler
rules:
  # Namespaces are cluster-scoped: the reconciler creates the per-workspace af-* namespaces.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaced workspace objects (hand-authored tenant manifests: ns/SA/Deployment/RBAC/NetworkPolicy
  # + the per-workspace SOPS token Secret). NO secrets-elsewhere risk — the SA has no cluster RBAC.
  - apiGroups: [""]
    resources: ["serviceaccounts", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaced RBAC ONLY (Role/RoleBinding) — NEVER ClusterRole/ClusterRoleBinding (admission also
  # rejects those, and wildcard-verb Roles).
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Cilium is the CNI: workspace egress isolation is a CiliumNetworkPolicy.
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ESO (External Secrets Operator): the CP renderer emits, per tenant ns, a NAMESPACED SecretStore
  # (OpenBao/vault via k8s-auth) + the orchestrator-creds ExternalSecret that materialises the per-tenant
  # OpenBao path into an ns-local Secret (F1a). NAMESPACED kinds only — NO clustersecretstores (admission
  # also rejects ClusterSecretStore, mirroring the Role/ClusterRole split).
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores", "externalsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Flux writes events for the objects it applies as this identity.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentforge-tenants-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentforge-tenants-reconciler
subjects:
  - kind: ServiceAccount
    name: agentforge-tenants-reconciler
    namespace: flux-system
