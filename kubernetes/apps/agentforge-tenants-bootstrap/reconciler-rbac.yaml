# Minimal-RBAC identity Flux impersonates when reconciling the CP-written cchifor/agentforge-tenants
# repo (spec.serviceAccountName on the agentforge-tenants Kustomization). This is the FIRST of the two
# layers that box in the tenant path (the ValidatingAdmissionPolicy in
# kubernetes/apps/apps/agentforge/admission/ is the second, field/shape gate). It grants ONLY the
# namespaced GVKs a per-workspace tenant manifest needs — deliberately NO clusterroles/-bindings, NO
# wildcard verbs, NO Flux source/Kustomization objects. So a malicious manifest in the tenant repo
# can at most create objects of these kinds, and admission rejects the dangerous shapes among them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentforge-tenants-reconciler
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentforge-tenants-reconciler
rules:
  # Namespaces are cluster-scoped: the reconciler creates the per-workspace af-* namespaces.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaced workspace objects (hand-authored tenant manifests: ns/SA/Deployment/RBAC/NetworkPolicy
  # + the per-workspace SOPS token Secret). NO secrets-elsewhere risk — the SA has no cluster RBAC.
  - apiGroups: [""]
    resources: ["serviceaccounts", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaced RBAC ONLY (Role/RoleBinding) — NEVER ClusterRole/ClusterRoleBinding (admission also
  # rejects those, and wildcard-verb Roles).
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Cilium is the CNI: workspace egress isolation is a CiliumNetworkPolicy.
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Flux writes events for the objects it applies as this identity.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentforge-tenants-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentforge-tenants-reconciler
subjects:
  - kind: ServiceAccount
    name: agentforge-tenants-reconciler
    namespace: flux-system
