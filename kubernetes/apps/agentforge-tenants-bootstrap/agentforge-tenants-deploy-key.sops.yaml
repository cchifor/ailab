# Read-only SSH deploy key the agentforge-tenants GitRepository clones cchifor/agentforge-tenants
# with. Flux SSH auth Secret shape: identity (private key), identity.pub, known_hosts.
#
# OPERATOR (real values are a follow-up — these are PLACEHOLDERS):
#   1. On Gitea, add a READ-ONLY deploy key to the cchifor/agentforge-tenants repo (Settings -> Deploy
#      Keys; leave "Enable Write Access" OFF). Generate the pair: ssh-keygen -t ed25519 -N '' -f af_tenants
#   2. Capture the in-cluster gitea-ssh host key for known_hosts, e.g.:
#      kubectl --context admin@ai -n gitea exec deploy/gitea -- sh -c \
#        'ssh-keyscan -p 22 gitea-ssh.gitea.svc.cluster.local' 2>/dev/null
#   3. Put the private key in `identity`, the .pub in `identity.pub`, the keyscan line in `known_hosts`,
#      then re-encrypt: sops -e -i kubernetes/apps/agentforge-tenants-bootstrap/agentforge-tenants-deploy-key.sops.yaml
