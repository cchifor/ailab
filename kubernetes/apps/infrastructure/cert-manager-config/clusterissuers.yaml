# ClusterIssuers — applied by the cert-manager-config Flux Kustomization (dependsOn cert-manager) so
# they aren't rejected by the webhook before it's Ready. Nothing consumes these yet (the Traefik
# wildcard *.chifor.me cert lands in a later workstream); installed as enabling infrastructure.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: chifor@gmail.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: chifor@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
# Internal CA for in-cluster mTLS / private services (bootstrapped by the selfsigned issuer).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ailab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: ailab-root-ca
  secretName: ailab-root-ca
  duration: 87600h # 10y
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ailab-ca
spec:
  ca:
    secretName: ailab-root-ca # resolved in cert-manager's --cluster-resource-namespace (= cert-manager)
