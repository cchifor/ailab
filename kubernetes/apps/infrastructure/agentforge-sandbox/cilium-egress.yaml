# Cilium egress boundary for the sandbox trust classes (Cilium is the CNI).
#
# R-1 (ACTIVE): trust-class=test/setup gets ZERO egress. The namespace default-deny (networkpolicy.yaml)
# already denies all egress, but this adds an EXPLICIT high-priority egressDeny to ALL entities so that
# when the R-2 agent-allow policy lands (which opens egress for trust-class=agent), a mislabeled or
# hostile pod claiming trust-class=test can NEVER egress — deny always wins over allow in Cilium. This
# is the property the R-1 boundary proof checks: a test job cannot reach kube-dns, the broker, a
# direct IP, the metadata service, a cluster service, or the node.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandbox-test-zero-egress
  namespace: agentforge-sandbox
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  endpointSelector:
    matchLabels:
      agentforge.io/trust-class: test
  # Explicit deny to every entity (world + cluster + host + remote-node + kube-apiserver + …). Cilium
  # evaluates *Deny rules with precedence over any allow, so this is an absolute egress cut for test.
  egressDeny:
    - toEntities:
        - all
---
# R-2 (design §8) — the agent-profile egress allow-list. trust-class=agent may egress to ONLY (a) the
# pool broker (its ClusterIP endpoint on 8700) and (b) kube-dns, with DNS L7 restricted to the broker's
# EXACT name (no arbitrary query names → no DNS tunneling; alternate resolvers denied by omission). A
# SEPARATE object from the test zero-egress above so it can NEVER widen test's egress; and the
# egressDeny below (deny wins over any allow in Cilium) makes direct-IP/IPv6/metadata/node-local
# absolute. The namespace default-deny (networkpolicy.yaml) is the baseline; this union-adds the two
# agent flows. The broker ingress (agentforge-broker CNP) admits ONLY matching-pool/org/workspace agent
# pods, so pool-matching is enforced on the broker side; the source-IP TOFU + session binding is the
# broker's APP-layer anti-replay (Cilium hands no per-job identity).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandbox-agent-egress
  namespace: agentforge-sandbox
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  endpointSelector:
    matchLabels:
      agentforge.io/trust-class: agent
  egress:
    # (a) kube-dns, L7-restricted to the broker's EXACT name — the agent can resolve NOTHING else (no
    #     DNS tunneling / no alternate name). matchName is exact; a different query name is refused.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              # EXACT names for the real per-account broker Services (no matchPattern → no DNS
              # tunneling). One broker Deployment per (provider, account); the agent resolves the
              # ONE whose aud it was minted for. There is no `agentforge-broker` Service — that was
              # a placeholder that refused every real query and hung the agent before its first call.
              - matchName: "broker-anthropic-max1.agentforge-broker.svc.cluster.local"
              - matchName: "broker-anthropic-max2.agentforge-broker.svc.cluster.local"
              - matchName: "broker-openai-codex.agentforge-broker.svc.cluster.local"
    # (b) the pool broker — allowed to EXACTLY the broker Service's backend endpoints via toServices,
    #     restricted to the http data port 8700 (NOT metrics 9464). NOTE (codex Phase B): Cilium L3
    #     policy allows destinations by ENDPOINT IDENTITY — toServices resolves the Service to its READY
    #     backend pods and allows those, so it does NOT (and cannot) force VIP-only routing; a packet
    #     addressed to a broker PodIP:8700 is the SAME allowed destination (the broker), not an escape.
    #     This is sufficient by design: the security property is destination-CONFINEMENT (the agent may
    #     reach ONLY the broker + kube-dns; everything else is default-deny + egressDeny). The design's
    #     source-IP TOFU requirement (§3 "DIRECT ClusterIP, no Cilium handoff → the broker sees the peer
    #     IP") is MET regardless of VIP-vs-PodIP: Cilium does not SNAT pod-to-pod, so the broker sees the
    #     agent's real pod IP either way; and replica choice is harmless because session state lives in
    #     the SHARED Postgres ledger (no per-replica affinity). toServices is preferred over a static
    #     endpoint selector because it tracks the Service's READY endpoints. The broker ingress CNP still
    #     admits ONLY the matching-pool agent identity.
    - toServices:
        - k8sService:
            serviceName: broker-anthropic-max1
            namespace: agentforge-broker
        - k8sService:
            serviceName: broker-anthropic-max2
            namespace: agentforge-broker
        - k8sService:
            serviceName: broker-openai-codex
            namespace: agentforge-broker
      toPorts:
        - ports:
            - { port: "8700", protocol: TCP }
    # (c) DIRECT broker ClusterIP allow — REQUIRED for Kata sandbox pods. A Kata pod runs inside a
    #     microVM whose guest kernel is NOT on Cilium's socket-LB (bpf-lb-sock) path, so the broker
    #     ClusterIP is NOT translated to a backend PodIP BEFORE network policy is evaluated. Cilium
    #     therefore classifies the service-CIDR ClusterIP as `world`, and the egressDeny `world` belt
    #     (deny wins over allow) dropped the agent's HTTP at its own veth — the broker saw ZERO inbound
    #     even though DNS resolved (DNS rides the L7 DNS proxy, which never needs ClusterIP L3 xlate).
    #     Allowing the EXACT broker ClusterIP /32s here lets policy PASS; the same bpf datapath then
    #     DNATs ClusterIP->broker PodIP and forwards (the toServices rule above already admits the
    #     post-DNAT broker identity). The /32s are pinned (the broker Services carry explicit
    #     spec.clusterIP), port 8700 only. Still DESTINATION-CONFINED: default-deny plus the retained
    #     host/remote-node + metadata/link-local/IPv6 denies block everything except broker + kube-dns.
    - toCIDR:
        - 10.108.137.32/32   # broker-anthropic-max1
        - 10.109.144.42/32   # broker-anthropic-max2
        - 10.108.162.59/32   # broker-openai-codex
      toPorts:
        - ports:
            - { port: "8700", protocol: TCP }
  egressDeny:
    # No node-local / metadata-via-node. host/remote-node = the nodes themselves. Pod-to-pod
    # (broker/kube-dns) is identity-based, so these never block (a)/(b). `world` is NOT denied here:
    # a Kata pod sees the broker ClusterIP as `world` (no pre-policy socket-LB xlate in the microVM),
    # so a `world` deny would drop the broker HTTP (deny wins over the (c) allow). Confinement is
    # preserved by DEFAULT-DENY — the `egress` allow-list above is exhaustive (kube-dns L7 + the three
    # broker ClusterIP /32s), so any other destination (incl. real internet IPs) is already denied by
    # omission; the metadata/link-local/IPv6 toCIDR belt below stays as an explicit direct-IP cut.
    - toEntities:
        - host
        - remote-node
    # metadata (169.254.169.254), link-local, and ALL IPv6 — explicit direct-IP belt.
    - toCIDR:
        - 169.254.169.254/32
        - 169.254.0.0/16
        - ::/0
