# Cilium egress boundary for the sandbox trust classes (Cilium is the CNI).
#
# R-1 (ACTIVE): trust-class=test/setup gets ZERO egress. The namespace default-deny (networkpolicy.yaml)
# already denies all egress, but this adds an EXPLICIT high-priority egressDeny to ALL entities so that
# when the R-2 agent-allow policy lands (which opens egress for trust-class=agent), a mislabeled or
# hostile pod claiming trust-class=test can NEVER egress — deny always wins over allow in Cilium. This
# is the property the R-1 boundary proof checks: a test job cannot reach kube-dns, the broker, a
# direct IP, the metadata service, a cluster service, or the node.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandbox-test-zero-egress
  namespace: agentforge-sandbox
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  endpointSelector:
    matchLabels:
      agentforge.io/trust-class: test
  # Explicit deny to every entity (world + cluster + host + remote-node + kube-apiserver + …). Cilium
  # evaluates *Deny rules with precedence over any allow, so this is an absolute egress cut for test.
  egressDeny:
    - toEntities:
        - all
---
# R-2 (design §8) — the agent-profile egress allow-list. trust-class=agent may egress to ONLY (a) the
# broker PODS (by endpoint identity: component=broker on 8700 — the orchestrator hands the agent a
# broker POD IP, not a ClusterIP, since a Kata pod can't reach a ClusterIP) and (b) kube-dns, DNS L7
# restricted to the broker EXACT names (no arbitrary query names → no DNS tunneling). A SEPARATE object
# from the test zero-egress above so it can NEVER widen test's egress; and the egressDeny below (deny
# wins over any allow in Cilium) makes world/direct-IP/IPv6/metadata/node-local absolute. The namespace
# default-deny (networkpolicy.yaml) is the baseline; this union-adds the two agent flows, confining the
# agent to {broker pods, kube-dns}.
#   PER-ACCOUNT scope (codex): this egress admits ALL brokers (component=broker), and the broker ingress
#   CNPs admit the SAME trust-class/pool/org/workspace — so egress+ingress form a BROKER-TIER boundary,
#   NOT a per-account one. The per-ACCOUNT discriminator is the capability `aud`: a broker rejects a
#   capability minted for another provider/account, and the agent is only ever handed ITS aud's broker
#   pod IP. Cilium hands no per-job identity, so the source-IP TOFU + session binding is the broker's
#   APP-layer anti-replay.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandbox-agent-egress
  namespace: agentforge-sandbox
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  endpointSelector:
    matchLabels:
      agentforge.io/trust-class: agent
  egress:
    # (a) kube-dns, L7-restricted to the broker's EXACT name — the agent can resolve NOTHING else (no
    #     DNS tunneling / no alternate name). matchName is exact; a different query name is refused.
    #     RETAINED although the agent is IP-direct (the executor hands it a broker POD IP, so it makes
    #     zero DNS queries — Hubble-verified): kept as a minimal, L7-locked (broker-names-only) belt so
    #     an incidental CLI DNS lookup (telemetry/update-check) can't hang the run, and as defense in
    #     depth. It is NOT arbitrary DNS or internet — only the 3 broker FQDNs resolve.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              # EXACT names for the real per-account broker Services (no matchPattern → no DNS
              # tunneling). One broker Deployment per (provider, account); the agent resolves the
              # ONE whose aud it was minted for. There is no `agentforge-broker` Service — that was
              # a placeholder that refused every real query and hung the agent before its first call.
              - matchName: "broker-anthropic-max1.agentforge-broker.svc.cluster.local"
              - matchName: "broker-anthropic-max2.agentforge-broker.svc.cluster.local"
              - matchName: "broker-openai-codex.agentforge-broker.svc.cluster.local"
    # (b) the per-account brokers — allowed by ENDPOINT IDENTITY (toEndpoints matchLabels), the ONLY
    #     policy form that works for a Kata sandbox pod. The agent reaches the broker by POD IP: the
    #     orchestrator resolves the broker Service to a live ready endpoint pod IP at Job creation and
    #     sets ANTHROPIC_BASE_URL/AF_BROKER_URL to http://<podIP>:8700 (a Kata microVM is off Cilium's
    #     socket-LB path, so it sees a ClusterIP as `world` and CANNOT reach a broker by ClusterIP —
    #     neither `toServices` nor a `toCIDR` /32 produces an allow for a DIRECT pod-IP connection, both
    #     Hubble-verified EGRESS DENIED). A broker POD IP DOES carry the broker's Cilium endpoint
    #     identity, so this matchLabels rule admits it. Restricted to the http data port 8700 (NOT
    #     metrics 9464) and to component=broker in agentforge-broker, so the agent may reach ONLY the
    #     brokers (destination-confinement). Per-ACCOUNT scoping is enforced by the capability `aud` (a
    #     broker rejects a capability minted for another account) + the broker ingress CNP (admits only
    #     the matching trust-class/pool); the agent only ever holds ITS aud's broker pod IP, never the
    #     others'.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: agentforge-broker
            app.kubernetes.io/component: broker
      toPorts:
        - ports:
            - { port: "8700", protocol: TCP }
  egressDeny:
    # No direct internet / node-local / metadata-via-node. world = any non-cluster IP; host/remote-node
    # = the nodes themselves. Both (a) kube-dns and (b) the brokers are allowed by ENDPOINT IDENTITY
    # (pod-to-pod), so `world` never blocks them — which is why `world` is RESTORED here now that the
    # broker is reached by pod IP (endpoint identity), not by a ClusterIP a Kata pod would see as
    # `world`. (The earlier ClusterIP workaround had to drop `world`; the pod-IP path does not, so this
    # is the tighter original belt.) Confinement is DEFAULT-DENY + this explicit deny — the only
    # reachable destinations are kube-dns and the broker pods.
    - toEntities:
        - world
        - host
        - remote-node
    # metadata (169.254.169.254), link-local, and ALL IPv6 — explicit direct-IP belt.
    - toCIDR:
        - 169.254.169.254/32
        - 169.254.0.0/16
        - ::/0
