# Per-WORKSPACE RWX staging volume for the tenant-zero shadow — SANDBOX side (codex R-1 #1).
#
# PVCs are namespace-scoped, so a dynamic PVC in agentforge-sandbox could NOT be shared with the
# orchestrator (tenant ns) or the reaper (agentforge ns). R-1 therefore uses a genuinely-shared NFS
# backing: ONE operator-created export dir `10.55.0.254:/pve-nfs/agentforge-sandbox` (chmod 0777 so
# uid 65532 (sandbox) AND the orchestrator/reaper uids all read+write — this also sidesteps the
# NFS-ignores-fsGroup caveat), fronted by a STATIC PV per consumer, all pointing at that SAME
# server:path. This file is the sandbox consumer:
#   * PV  af-sbx-ws-playground (cluster-scoped) — pre-bound (claimRef) to the PVC below.
#   * PVC af-sbx-ws-playground (agentforge-sandbox ns) — the sandbox Jobs mount it at /workspace with
#     subPath: <job-id> (sandbox-guard pins subPath == the pod's job-id label), so job X sees only
#     <export>/<jobX>. The lease lives at <export>/.leases/<jobX> — OUTSIDE any job subPath, so a
#     hostile job cannot mount, read, delete, or forge its own owner-lease (codex R-1 #5).
#
# The sibling PVs af-sbx-stage-<ws> (staging-pv.yaml; the operator PROVIDES the PV, the CP renders the
# tenant-ns PVC) and af-sbx-reaper (reaper-storage.yaml) point at the SAME export, so a file the
# orchestrator writes to <staging_root>/<jobX>/ is the exact byte the sandbox reads at /workspace and
# the reaper reclaims. storageClassName:"" + volumeName bind statically (NOT the dynamic nfs-csi
# default); reclaim Retain so operator data is never auto-deleted. mountOptions mirror storageclass-nfs.
# To onboard another workspace sharing this ns, clone this file as af-sbx-ws-<slug> (+ the staging PV,
# + the orchestrator RoleBinding subject).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: af-sbx-ws-playground
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
    agentforge.io/workspace: playground
    agentforge.io/role: sandbox-workspace
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  storageClassName: "" # static bind — do NOT let the nfs-csi default class provision this
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.0 # QuTS hero NFS rejects 4.1; 4.0 is single-port + NAT-friendly (matches storageclass-nfs)
    - hard
    - nconnect=4
  nfs:
    server: 10.55.0.254 # QNAP storage-fabric IP (host router + SNAT over Thunderbolt)
    path: /pve-nfs/agentforge-sandbox # the ONE shared export; same server:path on all three PVs
  # Pre-bind to exactly this PVC so no other claim can grab the PV (cross-consumer safety).
  claimRef:
    namespace: agentforge-sandbox
    name: af-sbx-ws-playground
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: af-sbx-ws-playground
  namespace: agentforge-sandbox
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
    agentforge.io/workspace: playground
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: "" # bind to the static PV below, not the dynamic default
  volumeName: af-sbx-ws-playground
  resources:
    requests:
      storage: 5Gi
