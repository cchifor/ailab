apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# AgentForge v2 P2 R-1 — the OPERATOR-OWNED, CP-UNWRITABLE sandbox boundary (ADR 0019, plans/
# 2026-07-12-p2-sandbox-redesign-v2.md). Its OWN directory + a dedicated Flux Kustomization
# (clusters/ai/agentforge-sandbox.yaml) rather than a line in a shared aggregator index — the P1
# agentforge admission lives under apps/agentforge/admission (the `apps` Kustomization) and the P2
# operators concurrently edit infrastructure/{security,autoscaling}; keeping this self-contained (the
# runtimeclasses precedent) avoids colliding with either. NO shared aggregator index is edited.
resources:
  - namespace.yaml # agentforge-sandbox ns (restricted PSA, pinned v1.31) + tokenless SA
  - sandbox-guard.yaml # VAP: pins the sandbox POD shape (fail-closed) on Pod CREATE/UPDATE
  - sandbox-job-guard.yaml # VAP: pins Job knobs + MIRRORS the full pod shape (fail-closed) on Job CREATE/UPDATE
  - orchestrator-rbac.yaml # Jobs-only Role + RoleBinding for the tenant-zero shadow orchestrator SA
  - networkpolicy.yaml # namespace default-deny (ingress + egress)
  - cilium-egress.yaml # trust-class=test ZERO egress (R-1) + the R-2 agent-allow stub (documented)
  - resource-limits.yaml # namespace ResourceQuota + LimitRange (node-DoS ceiling)
  # --- Genuinely-shared NFS backing (10.55.0.254:/pve-nfs/agentforge-sandbox), one static PV per consumer ---
  - workspace-pvc.yaml # SANDBOX ns: af-sbx-ws-playground static PV + PVC (Jobs mount subPath <job-id>)
  - staging-pv.yaml # TENANT ns: af-sbx-stage-playground static PV ONLY (operator-owned; CP renders the PVC)
  # --- Reaper: TRUSTED `agentforge` ns (moved out of agentforge-sandbox), cross-ns RBAC into the sandbox ns ---
  - reaper-rbac.yaml # reaper SA (agentforge ns) + Jobs/Pods GC Role + cross-ns RoleBinding (pre-staged, active)
  - reaper-storage.yaml # af-sbx-reaper static PV + PVC (agentforge ns) -> same shared export (pre-staged)
  - reaper-netpol.yaml # reaper egress CiliumNetworkPolicy (agentforge ns): kube-apiserver + DNS only
  # reaper-lease.yaml (af-eso-reaper SecretStore + af-sbx-lease ExternalSecret, agentforge ns) +
  # reaper-deployment.yaml are INTENTIONALLY not listed yet — the reaper image is a PLACEHOLDER @sha256
  # (unpullable). The single authoritative lease source is OpenBao `af/sandbox/lease-hmac` (ESO, not a
  # per-ns SOPS copy): the reaper ExternalSecret here and the CP's tenant af-sbx-lease ExternalSecret
  # both extract AF_LEASE_HMAC_KEY from that ONE path. Re-add BOTH once the p1-worker digest is pinned
  # and OpenBao af/sandbox/lease-hmac is seeded (see reaper-deployment.yaml + reaper-lease.yaml headers).
  # - reaper-lease.yaml
  # - reaper-deployment.yaml
