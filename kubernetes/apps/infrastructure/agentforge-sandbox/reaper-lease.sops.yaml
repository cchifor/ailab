# Shared owner-lease HMAC key `af-sbx-lease` (codex R-1 #4/#5). The reaper (in the trusted `agentforge`
# ns) verifies each sandbox job's .leases/<job-id> with this key; the ORCHESTRATOR (CP-rendered, tenant
# ns) signs leases with the SAME key. R-1 delivery mechanism (single logical source, per-ns SOPS copy):
# this operator SOPS Secret in `agentforge` is the reaper's copy; the CP commits the IDENTICAL plaintext
# — SOPS-encrypted to the same age recipient — into an `af-sbx-lease` Secret in the tenant ns, which the
# orchestrator reads via `secretKeyRef: {name: af-sbx-lease, key: AF_LEASE_HMAC_KEY}`. Same plaintext =>
# leases verify on both sides. A real random 64-hex value (openssl rand -hex 32), like agentforge-runtime
# AFP_SESSION_SECRET — app-internal, not an operator credential; rotate by replacing the plaintext in
# BOTH repos + restarting reaper & orchestrator. Gated with reaper-deployment.yaml (both commented out of
# kustomization.yaml until the image digest lands). SOPS/age; the sandbox Flux Kustomization decrypts.
apiVersion: v1
kind: Secret
metadata:
    name: af-sbx-lease
    namespace: agentforge
    labels:
        app.kubernetes.io/managed-by: agentforge-operator
        app.kubernetes.io/part-of: agentforge
type: Opaque
stringData:
    AF_LEASE_HMAC_KEY: ENC[AES256_GCM,data:DJpWROD/VmUFzVl54xVhlwXtvmGUetlTfz5srkeRdVlnokC+Ql0d97TSHn4IK6cJwtBfS8fQYQORsAYU4vOHcw==,iv:1QXbSX77aY2N9ywqZwTckqu20UGFCacBhhL03SoJXxU=,tag:hDO6Bu187eosJ0MbwdSX9Q==,type:str]
