# Shared owner-lease HMAC key. The reaper verifies each sandbox job dir's .af-owner-lease with this
# key; the ORCHESTRATOR signs leases with the SAME key (set AF_LEASE_HMAC_KEY to this value on the
# tenant worker). A real random 64-hex value (openssl rand -hex 32), like agentforge-runtime's
# AFP_SESSION_SECRET — app-internal, not an operator credential; rotate by replacing + restarting both.
# Gated with reaper-deployment.yaml (both commented out of kustomization.yaml until the image digest
# lands). SOPS/age encrypted; the sandbox Flux Kustomization decrypts with the sops-age key.
apiVersion: v1
kind: Secret
metadata:
    name: agentforge-sandbox-lease
    namespace: agentforge-sandbox
    labels:
        app.kubernetes.io/managed-by: agentforge-operator
        app.kubernetes.io/part-of: agentforge
type: Opaque
stringData:
