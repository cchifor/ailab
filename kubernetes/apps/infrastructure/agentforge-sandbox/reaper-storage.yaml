# REAPER PV+PVC — the reaper's view of the shared NFS export, in the reaper's TRUSTED home namespace
# `agentforge` (codex R-1 #1/#5). The reaper was moved OUT of agentforge-sandbox (where the
# sandbox-guard VAP + the zero-egress default-deny would reject it) into `agentforge`; PVCs are
# ns-scoped, so it needs its own PVC there, pointing at the SAME per-org/ws export subdir as the
# workspace/staging PVs. P2 R-2 §C org-qualifies this pair (af-sbx-reaper-<org>-<ws>) and scopes its
# nfs.path to that org/ws subdir, so the reaper PV can never reach another org's tree.
#
# The reaper mounts this PVC at AF_SANDBOX_STAGING_ROOT=/workspace/agentforge/sandbox, so it scans for
# orphan <staging_root>/<job-id>/ dirs and rmtree's the ones it reclaims — the exact same NFS bytes the
# orchestrator staged and the sandbox mounted. (Ownership itself is a k8s Lease, not an NFS file; the
# reaper only rmtree's a dir AFTER winning that Lease's CAS.)
#
# Pre-staged ACTIVE (a bound PV+PVC is harmless without the gated reaper Deployment) so enabling the
# reaper is just pinning the image digest + re-adding the Deployment to kustomization.yaml.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: af-sbx-reaper-tenant-zero-playground
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
    agentforge.io/org: tenant-zero
    agentforge.io/workspace: playground
    agentforge.io/role: sandbox-reaper
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.0
    - hard
    - nconnect=4
  nfs:
    server: 10.55.0.254
    path: /pve-nfs/agentforge-sandbox/tenant-zero/playground # SAME per-org/ws subdir as af-sbx-ws-* + af-sbx-stage-*
  claimRef:
    namespace: agentforge
    name: af-sbx-reaper-tenant-zero-playground
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: af-sbx-reaper-tenant-zero-playground
  namespace: agentforge # the reaper's trusted home (NOT agentforge-sandbox)
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
    agentforge.io/org: tenant-zero
    agentforge.io/workspace: playground
    agentforge.io/role: sandbox-reaper
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: af-sbx-reaper-tenant-zero-playground
  resources:
    requests:
      storage: 5Gi
