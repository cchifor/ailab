# Reaper Deployment — `agentforge reaper` (the SAME orchestrator/p1-worker image). Leader-elected GC of
# leaked sandbox Jobs/Pods/dirs by owner-lease. Lives in the TRUSTED `agentforge` namespace
# (codex R-1 #5): agentforge-sandbox would reject it (sandbox-guard demands a Kata `sandbox` container +
# sandbox SA) and deny its API egress (zero-egress default-deny). Here it runs under baseline PSA, its
# cross-ns RBAC (reaper-rbac.yaml) lets it reap Jobs/Pods + CAS-acquire the per-job Lease in
# agentforge-sandbox, and its egress policy (reaper-netpol.yaml) allows the kube-apiserver + DNS.
# replicas:1 is REQUIRED — the shipped elector (SingleReplicaElector) is an always-leader stub safe ONLY
# at one replica; strategy Recreate so a rollout never briefly runs two reapers. Mounts the
# af-sbx-reaper-tenant-zero-playground PVC (SAME per-org/ws NFS subdir as the workspace/staging PVs) at
# the staging root to scan for orphan <job-id> dirs
# and rmtree reclaimed ones AFTER winning the Lease.
#
# The owner-lease is a coordination.k8s.io/v1 Lease `af-sbx-<job-id>` (agentforge-sandbox ns), NOT an NFS
# file or a shared HMAC: the apiserver's resourceVersion CAS + this RBAC are the integrity boundary, and
# the tokenless sandbox pod has NO API access so it can never touch it. The reaper reclaims only by
# CAS-acquiring an absent/expired Lease (a conflict = the orchestrator renewed → back off).
#
# ⚠️ DELIBERATELY NOT LISTED in kustomization.yaml (mirrors the CP deployment.yaml precedent). The
# image below is a PLACEHOLDER @sha256:0000… — unpullable. TO ENABLE THE REAPER:
#   1. pin the immutable @sha256 of the built p1-worker image (registry.chifor.me/agentforge/p1-worker,
#      from the cchifor/agentforge release CI — same digest the CP's AFP_WORKER_IMAGE gets);
#   2. add `- reaper-deployment.yaml` back to kustomization.yaml (no lease Secret to seed — the Lease is
#      RBAC-gated, granted by reaper-rbac.yaml which is already active). The ORCHESTRATOR must set
#      AF_SANDBOX_STAGING_ROOT (same value below), AF_SANDBOX_NAMESPACE=agentforge-sandbox,
#      AF_SANDBOX_ORG=tenant-zero, AF_SANDBOX_WORKSPACE=playground,
#      AF_SANDBOX_WORKSPACE_PVC=af-sbx-ws-tenant-zero-playground (the VAP rejects any pod whose workspace
#      PVC name != 'af-sbx-ws-' + its org label + '-' + its workspace label).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentforge-reaper
  namespace: agentforge # trusted home; NOT agentforge-sandbox
  labels:
    app.kubernetes.io/name: agentforge-reaper
    app.kubernetes.io/component: reaper
    app.kubernetes.io/part-of: agentforge
spec:
  replicas: 1 # single-leader; do NOT raise without a real coordination-lease elector
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agentforge-reaper
  template:
    metadata:
      labels:
        # app.kubernetes.io/name: agentforge-reaper is also the reaper-netpol.yaml egress selector.
        app.kubernetes.io/name: agentforge-reaper
        app.kubernetes.io/component: reaper
        app.kubernetes.io/part-of: agentforge
    spec:
      serviceAccountName: agentforge-reaper
      enableServiceLinks: false
      # Run on the dedicated agent pool alongside the sandbox jobs it reaps.
      nodeSelector:
        ailab.io/agent-pool: "true"
      tolerations:
        - { key: dedicated, operator: Equal, value: agent, effect: NoSchedule }
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # the p1-worker image's unified nonroot USER (== orchestrator + sandbox; F1b)
        runAsGroup: 65532
        fsGroup: 65532 # so the reaper can rmtree the 65532-owned job dirs on the shared NFS export
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: reaper
          # PLACEHOLDER digest — pin the real p1-worker @sha256 (see header) before enabling.
          image: registry.chifor.me/agentforge/p1-worker@sha256:8eb3fc6f161014a9bcb33f670632ed91c065d43a582f79d19657ba9f995e1e14
          # ENTRYPOINT is ["tini","--"] and the console script is `agentforge`, so
          # the args must be the full argv `agentforge reaper` (not a bare `reaper`,
          # which has no executable → tini crash-loops). Composes to: tini -- agentforge reaper.
          args: ["agentforge", "reaper"]
          env:
            # Settings (env_prefix AF_) requires these two even though the reaper path ignores them.
            - { name: AF_WORKER_NAME, value: "agentforge-reaper" }
            - { name: AF_GITEA_URL, value: "https://git.chifor.me" }
            - { name: AF_SANDBOX_NAMESPACE, value: "agentforge-sandbox" }
            # MUST equal the orchestrator's staging root + the reaper PVC mountPath below, so
            # <staging_root>/<job-id> resolves to the shared export for orphan-scan + rmtree.
            - { name: AF_SANDBOX_STAGING_ROOT, value: "/workspace/agentforge/sandbox" }
            - { name: AF_REAPER_INTERVAL_S, value: "60" }
            # P2 R-2 §5 CLOSE AUTHORITY (forward-looking; activated with the broker/ledger): the reaper's
            # close-only ledger DSN (agentforge_reaper — EXECUTE close_session only, never any table). From
            # the ESO-synced Secret (reaper-ledger.yaml); carries a password, so secretKeyRef, never a
            # ConfigMap. On a Job's terminal state the reaper stamps closed_at (idempotent, fail-closed to
            # the session `exp`) so a copied capability is dead before import/publish.
            - name: AF_REAPER_LEDGER_DSN
              valueFrom:
                secretKeyRef:
                  name: agentforge-reaper-ledger
                  key: AF_REAPER_LEDGER_DSN
                  optional: false # FAIL-CLOSED: the reaper must NOT start without its close-only ledger
                  # credential (a fail-OPEN reaper would run GC without close authority). Safe: the
                  # Deployment is gated/unlisted, so this binds only at activation — where the Secret is
                  # Ready by construction (OpenBao/ledger provisioned before the image is pinned + listed).
          volumeMounts:
            # The af-sbx-reaper-tenant-zero-playground PVC (same per-org/ws NFS subdir) at the staging root: scans for orphan <job-id> dirs
            # and rmtree's reclaimed <root>/<job-id>/ dirs AFTER a successful Lease CAS-acquire.
            - name: staging
              mountPath: /workspace/agentforge/sandbox
          resources:
            requests: { cpu: 25m, memory: 64Mi, ephemeral-storage: 64Mi }
            limits: { cpu: 250m, memory: 128Mi, ephemeral-storage: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: staging
          persistentVolumeClaim:
            claimName: af-sbx-reaper-tenant-zero-playground # agentforge-ns PVC -> per-org/ws NFS subdir
