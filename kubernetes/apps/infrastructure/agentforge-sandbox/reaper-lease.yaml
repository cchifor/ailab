# Reaper owner-lease HMAC via ExternalSecret (codex R-1 #4/#5, F1a). Replaces the old per-ns SOPS copy
# (reaper-lease.sops.yaml) with ONE authoritative source: OpenBao `af/sandbox/lease-hmac`. The reaper (in
# the trusted `agentforge` ns) verifies each sandbox job's .leases/<job-id> with AF_LEASE_HMAC_KEY; every
# tenant ORCHESTRATOR signs leases with the SAME key. Both sides now pull that key from the IDENTICAL
# OpenBao path: the CP renders a matching `af-sbx-lease` ExternalSecret (creationPolicy Owner) into each
# tenant ns from the same path (agentforge-platform renderer.py::_render_sandbox_eso), and this manifest
# renders the reaper's copy into `agentforge`. Same source => leases verify on both sides; no lease
# plaintext lives in git (the old SOPS copy is retired).
#
# The path is deliberately NOT per-tenant (no <org>/<workspace>): ONE reaper verifies EVERY tenant's
# leases, so the HMAC is shared — and orchestrators are trusted, so sharing is sound. The OpenBao entry
# must carry the value under a field named AF_LEASE_HMAC_KEY (the reaper's secretKeyRef, and the extracted
# Secret's key, are both AF_LEASE_HMAC_KEY). The reaper's OpenBao k8s-auth role (af-reaper) must be
# granted read on af/sandbox/lease-hmac.
#
# Structurally consistent with the platform tenant render (external-secrets.io/v1, OpenBao/vault via
# k8s-auth, namespaced SecretStore authenticating as a dedicated eso-auth SA, KV v2 mount `af`). The
# endpoint scheme/address + auth mount here match the OpenBao helmrelease bootstrap (../security/openbao)
# and the platform SecretStore defaults (https, `kubernetes` auth mount).
#
# ⚠️ GATED — commented out of kustomization.yaml alongside reaper-deployment.yaml (SAME image gate: the
# reaper image is still an unbuilt @sha256:0000… placeholder). TO ENABLE: seed OpenBao
# af/sandbox/lease-hmac + grant the af-reaper role read on it, then re-add `- reaper-lease.yaml` +
# `- reaper-deployment.yaml` to kustomization.yaml with the pinned p1-worker image digest.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-eso-reaper # dedicated eso-auth SA — NOT the reaper SA, NOT the sandbox SA
  namespace: agentforge # trusted home; NOT agentforge-sandbox
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/component: reaper
    app.kubernetes.io/part-of: agentforge
automountServiceAccountToken: false # ESO mints a short-TTL token for it (serviceaccounts/token)
---
# Namespaced SecretStore (NOT ClusterSecretStore) — OpenBao/vault via k8s auth, authenticating as the
# af-eso-reaper SA against the af-reaper OpenBao role, KV v2 mount `af`.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: af-eso-reaper
  namespace: agentforge
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/component: reaper
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: "af" # KV v2 mount; the shared lease lives at af/sandbox/lease-hmac
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes" # the k8s-auth backend mount (openbao helmrelease bootstrap)
          role: "af-reaper" # OpenBao role bound to this ns+SA, read on af/sandbox/lease-hmac
          serviceAccountRef:
            name: af-eso-reaper
---
# ExternalSecret: materialize ONLY the shared lease-HMAC (creationPolicy Owner) from the cluster-constant
# OpenBao path into the `af-sbx-lease` Secret the reaper Deployment references via secretKeyRef
# (name af-sbx-lease, key AF_LEASE_HMAC_KEY). IDENTICAL source/target shape to the platform tenant copy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: af-sbx-lease
  namespace: agentforge
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/component: reaper
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: af-eso-reaper
    kind: SecretStore
  target:
    name: af-sbx-lease
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: af/sandbox/lease-hmac # shared, cluster-constant; carries field AF_LEASE_HMAC_KEY
