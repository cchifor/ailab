apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    # ESO controller/webhook/cert-controller run non-root with a restricted-compliant securityContext.
    # baseline enforce + restricted warn matches the estate's conservative posture (cf. trivy-system).
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
