apiVersion: v1
kind: Namespace
metadata:
  name: openbao
  labels:
    # baseline is sufficient: the raft server runs non-root (uid 100 / fsGroup 1000) and the chart's
    # default raft config sets `disable_mlock = true`, so no IPC_LOCK capability is added (which
    # baseline/restricted would otherwise reject). warn=restricted surfaces any remaining gaps.
    # If a future config re-enables mlock, either keep disable_mlock=true or relax this to privileged.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
