# OpenBao auto-UNSEAL loop (plan §B "Unsealer openbao-unsealer Deployment"). Runs
# `agentforge openbao-unseal --loop --interval 15`: every 15s GET seal-status and, if sealed && initialised,
# unseal from Secret openbao-keys (unseal_key). This is what makes pod restarts self-heal WITHOUT manual
# `bao operator unseal` — the homelab's stand-in for transit/KMS auto-unseal (accepted residual: the unseal
# key sits in an in-cluster Secret; see the activation runbook). Its RBAC reads the UNSEAL KEY ONLY — never
# the root/bootstrap token. Errors back off + redact. HA (replicas>1) would need per-pod discovery.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-unsealer
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-unsealer
    app.kubernetes.io/component: unsealer
    app.kubernetes.io/part-of: agentforge
spec:
  replicas: 1 # single-node raft (replicas:1); a per-pod unsealer set is the HA path
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao-unsealer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao-unsealer
        app.kubernetes.io/component: unsealer
        app.kubernetes.io/part-of: agentforge
    spec:
      serviceAccountName: openbao-unsealer
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: unsealer
          # CHANGEME digest — pinned by `just pin-bootstrap` before merge (plan Stage 0).
          image: registry.chifor.me/agentforge/orchestrator@sha256:88bfbdd32c6e3a848c7859dcd57a03c703aeb75519f713ca0b5f885a852f9a27
          args: ["agentforge", "openbao-unseal", "--loop", "--interval", "15"]
          env:
            - { name: AF_OB_ADDR, value: "https://openbao-0.openbao-internal.openbao.svc.cluster.local:8200" }
            - { name: AF_OB_CACERT, value: "/tls/ca.crt" }
            - { name: AF_OB_K8S_NAMESPACE, value: "openbao" }
            - { name: AF_OB_KEYS_SECRET, value: "openbao-keys" }
            # Unbuffered stdout: on the incident above the container was SIGKILLed (OOM) and every buffered
            # log line died with it, leaving `kubectl logs` empty for both current AND previous containers.
            - { name: PYTHONUNBUFFERED, value: "1" }
          volumeMounts:
            - { name: tls, mountPath: /tls, readOnly: true }
          resources:
            # 64Mi OOMKilled this container (exit 137) — the orchestrator image imports the full agentforge
            # package + hvac + the k8s client, which sits just above that ceiling. Observed 11 restarts and,
            # because Python's stdout buffer is lost on SIGKILL, ZERO logs to diagnose from. 128Mi gives real
            # headroom for a loop that is otherwise idle.
            requests: { cpu: 10m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: tls
          secret:
            secretName: openbao-tls
            items:
              - { key: ca.crt, path: ca.crt }
---
# Default-deny egress boundary for the unsealer (plan §B: "OpenBao + kube-apiserver + DNS only"). Cilium is
# the CNI; selecting the endpoint for egress puts it into egress default-deny, so this allow-list is its
# COMPLETE reach: (1) DNS, (2) kube-apiserver (read the openbao-keys Secret), (3) OpenBao :8200 (same ns).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openbao-unsealer
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-unsealer
    app.kubernetes.io/part-of: agentforge
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao-unsealer
  egress:
    # (1) DNS -> kube-dns (resolve openbao-0.openbao-internal + the kubernetes API name).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    # (2) kube-apiserver (Talos CP VIP) — read the openbao-keys Secret via the k8s API.
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
    # (3) OpenBao API — same namespace; the only :8200 listener in the openbao ns is OpenBao itself.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: openbao
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
  egressDeny:
    # NOTE: `host`/`remote-node` were REMOVED — same fix (and same root cause) as provisioner-deploy.yaml.
    # The kube-apiserver runs ON the control-plane nodes, so its Cilium identity is COMPOSITE:
    #   ID 1 = reserved:host + reserved:kube-apiserver   ID 7 = reserved:kube-apiserver + reserved:remote-node
    # egressDeny OVERRIDES egress allow, so denying host/remote-node shadowed the kube-apiserver:6443 allow
    # above and blackholed the Secret read (socket wedged in SYN_SENT to 192.168.0.41:6443).
    # This was LATENT for 7 days: run_unseal() only reads the openbao-keys Secret when the vault is SEALED
    # (bootstrap.py) — while unsealed it returns "already unsealed" and never touches the API. The Path-2
    # re-bootstrap made the vault sealed, so the unsealer hung on its FIRST pass, emitting zero logs (the
    # log line comes after run_unseal returns) and leaving the vault sealed → ESO + codex-refresh all failed.
    # The `egress` allowlist above already default-denies everything not listed, so this deny was redundant
    # AND breaking. Keep only the link-local/metadata CIDR deny (defence in depth).
    - toEntities:
        - world
    - toCIDR:
        - 169.254.169.254/32
        - 169.254.0.0/16
        - ::/0
