# Stage-1 canary (plan §B / Stage 1: "the canary SecretStore reports Ready — proves the k8s-auth login
# end-to-end, not just an unsealed vault"). A NAMESPACED ESO SecretStore in the openbao ns that logs in via
# the OpenBao `kubernetes` auth backend (authenticating as the openbao-canary SA under role
# `af-operator-canary`) and reads the seed path af/data/operator/canary that the provision Job writes,
# materialising Secret `openbao-canary`. Its Ready status is the Stage-1 gate: NotReady until the provision
# Job has enabled the af mount + k8s auth + TokenReview + the canary policy/role + the seed.
#
# caProvider resolves the openbao-tls CA IN THIS NAMESPACE (same ns as the cert Secret — the clean case; no
# cross-ns caProvider needed here), so TLS verification of the OpenBao server cert succeeds.
#
# CHANGEME (image-side): the provision subcommand MUST create k8s-auth role `af-operator-canary` bound to
# (ns openbao, SA openbao-canary) with a policy granting read on af/data/operator/canary, and seed that KV
# path. These names are the contract between this manifest and `agentforge openbao-provision`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-canary
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-canary
    app.kubernetes.io/component: eso-auth
    app.kubernetes.io/part-of: agentforge
# ESO mints a short-TTL token for this SA (TokenRequest); no pod runs as it, so keep its token unmounted.
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-canary
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-canary
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc.cluster.local:8200"
      path: "af" # KV v2 mount
      version: "v2"
      # openbao-tls CA in THIS namespace (openbao) — verifies the server cert. Same-ns, so no namespace field.
      caProvider:
        type: Secret
        name: openbao-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "af-operator-canary"
          serviceAccountRef:
            name: openbao-canary
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-canary
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-canary
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-canary
    kind: SecretStore
  target:
    name: openbao-canary
    creationPolicy: Owner
  data:
    - secretKey: canary
      remoteRef:
        key: operator/canary
        property: canary
