apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - csi-driver-nfs.yaml
  - storageclass-nfs.yaml
  - local-path-provisioner.yaml
  - qnap-csi.yaml
  - snapshot-controller # external-snapshotter v8 (CRDs + controller) — enables the VolumeSnapshot API
  - velero # Velero CSI data-movement backup -> versitygw S3 on the QNAP (ADR 0010)
  - talos-backup # daily age-encrypted etcd snapshot -> versitygw (control-plane DR)
  # - backup-offsite # ENABLE once the user provisions the Google Drive OAuth token (rclone authorize).
  #   Until the rclone.conf SOPS secret has real Drive creds, keep this out so the CronJob can't fail.
