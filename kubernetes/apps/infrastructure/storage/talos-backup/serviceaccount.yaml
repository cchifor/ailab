# Talos ServiceAccount (NOT a core k8s SA). The kubernetesTalosAPIAccess feature enabled in
# controlplane.yaml.tftpl (allowedKubernetesNamespaces: [talos-backup], allowedRoles: [os:etcd:backup])
# makes Talos mint a scoped talosconfig into a Secret named `talos-backup-secrets` in THIS namespace,
# which the CronJob mounts at /var/run/secrets/talos.dev. No host talosconfig secret, no cross-node :50000.
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: talos-backup-secrets
  namespace: talos-backup
spec:
  roles:
    - os:etcd:backup
