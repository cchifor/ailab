apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-csi
  annotations:
    # Default for now (RWX). Flip to the QNAP iSCSI class once that's added (RWO block + snapshots).
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.55.0.254 # QNAP storage-fabric IP — reached via the host router+SNAT over Thunderbolt (WS2)
  share: /pve-nfs
  mountPermissions: "0777"
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - nfsvers=4.1 # v4.1 (single-port, NAT-friendly) + session trunking pairs better with nconnect
  - hard
  - nconnect=4
