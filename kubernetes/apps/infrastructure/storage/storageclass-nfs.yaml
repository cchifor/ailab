apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-csi
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.1.225 # QNAP mgmt IP (Talos VMs reach the QNAP over the mgmt LAN)
  share: /pve-nfs
  mountPermissions: "0777"
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - nfsvers=4.0
  - hard
  - nconnect=4
