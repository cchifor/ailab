apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - versitygw-ca.yaml # versitygw self-signed CA (combined with system CAs in the CronJob)
  - rclone-config.sops.yaml # SOPS: rclone.conf (garage-velero/garage-talos + gdrive + gdrive-crypt)
  - rclone-cronjob.yaml # nightly encrypted sync of the versitygw buckets -> Google Drive
