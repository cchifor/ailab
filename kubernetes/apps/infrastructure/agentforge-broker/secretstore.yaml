# SHARED ESO auth SA + operator SecretStore for ALL per-account brokers (design §6). Extracted out of the
# old single-broker externalsecret-oauth.yaml when the broker fanned out to one Deployment per (provider,
# account): the SA + SecretStore are account-INDEPENDENT (one namespaced OpenBao role + auth path serves
# every account's ExternalSecrets), so they live here once and every per-account broker-*.yaml ExternalSecret
# references this same `agentforge-broker-store`.
#
# The durable subscription OAuth / kid-registry / ledger DSN all sit under the operator-owned OpenBao prefix
# `af/data/operator/broker/<provider>/<account>/{oauth,kids,ledger}` behind this SEPARATE operator-owned
# SecretStore + auth role that NO `tenants/*` role can read (the tenant role is scoped to
# `af/data/tenants/<org>/<workspace>/*`, which cannot name any `af/data/operator/*` key — the reserved-prefix
# split that closes the R-1 ESO wildcard escape). Reconciled by the ESO CONTROLLER (out-of-band), NOT by the
# broker: every broker has token-automount off, NO OpenBao/ESO egress, and only READS the mounted Secrets.
#
# ⚠ ACTIVATION: the OpenBao role `af-operator-broker` (bound to ns agentforge-broker + SA af-broker-eso) and
# the KV data at `af/data/operator/broker/<provider>/<account>/{oauth,kids,ledger}` are OPERATOR-provisioned
# (the isolated OpenBao provisioner, design §7 — the broker role is OPERATOR-FIXED, never synthesized from
# tenant inputs). Until then the per-account ExternalSecrets report NotReady (harmless: the broker Deployments
# are pinned/gated + the Flux Kustomization is wait:false).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-broker-eso
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/component: eso-auth
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
# The ESO controller mints a short-TTL token for this SA (TokenRequest); no pod runs as it, so keep its
# token unmounted. OpenBao's `af-operator-broker` role is bound to exactly this ns + SA.
automountServiceAccountToken: false
---
# Operator-owned namespaced SecretStore (NOT ClusterSecretStore) — OpenBao/vault via kubernetes auth,
# authenticating as the af-broker-eso SA under the OPERATOR-FIXED role. Same provider shape the tenant
# SecretStore uses, but a DISJOINT role/path the tenant policy can never reach (§6). Shared by every
# per-account broker ExternalSecret.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: agentforge-broker-store
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: "af"        # KV v2 mount
      version: "v2"
      # caProvider sweep (plan §B): verify OpenBao's cert-manager TLS cert (openbao-tls, ailab-ca) instead
      # of failing TLS. NOTE: a NAMESPACED SecretStore resolves caProvider IN ITS OWN namespace
      # (agentforge-broker) — ESO ignores a cross-ns `namespace:` here — so Secret `openbao-tls` (ca.crt)
      # MUST be present in THIS namespace (distribute the ailab-ca cert via a per-ns cert-manager Certificate
      # or trust-manager). Until then this store stays NotReady (harmless: Deployment gated + wait:false).
      caProvider:
        type: Secret
        name: openbao-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "af-operator-broker"   # operator-fixed; unreachable via any tenant SecretStore
          serviceAccountRef:
            name: af-broker-eso
