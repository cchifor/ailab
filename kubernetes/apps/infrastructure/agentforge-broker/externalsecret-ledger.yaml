# broker-ledger (design §5) — the broker's transactional-ledger DB credential (full DSN with auth). The
# broker OPENS sessions (TOFU-binds the source IP on first use) + RESERVEs/RECONCILEs spend/concurrency/
# rate in the shared Postgres ledger on infra-pg. The DB login is `agentforge_broker`, granted
# open/reserve/reconcile ONLY (SELECT/INSERT/UPDATE on sessions/requests/rate_buckets — BROKER_GRANTS_SQL
# in agentforge broker/ledger.py) and NEVER `close`: the reaper alone holds close (its own close-only
# role — reaper-ledger.yaml in agentforge-sandbox), so a compromised broker can never close a session
# out from under the reaper (§5 disjoint authority).
#
# Delivered as AF_BROKER_LEDGER_DSN (the code reads a single DSN that may carry a password, so it is
# Secret-sourced via secretKeyRef — deployment.yaml — and NEVER placed in the ConfigMap). The
# non-secret HOST/DB/USER coordinates are in configmap.yaml for reference.
#
# ⚠ ACTIVATION: the operator applies SCHEMA_SQL + BROKER_GRANTS_SQL to infra-pg (DB agentforge_broker,
# roles agentforge_broker + agentforge_reaper — design §5), and writes the agentforge_broker DSN to
# OpenBao at `af/data/operator/broker/anthropic/default/ledger` (key AF_BROKER_LEDGER_DSN). NotReady
# until then (broker Deployment gated + wait:false).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: broker-ledger
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: agentforge-broker-store
    kind: SecretStore
  target:
    name: broker-ledger
    creationPolicy: Owner
  data:
    # the open/reserve/reconcile-only agentforge_broker DSN -> AF_BROKER_LEDGER_DSN (carries the password;
    # NEVER exposed in the ConfigMap).
    - secretKey: AF_BROKER_LEDGER_DSN
      remoteRef:
        key: operator/broker/anthropic/default/ledger
        property: AF_BROKER_LEDGER_DSN
