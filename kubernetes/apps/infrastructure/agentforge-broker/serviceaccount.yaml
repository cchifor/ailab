# The broker's runtime identity. automountServiceAccountToken:false + NO RBAC Role (design §6): with
# the OAuth/kids/ledger creds delivered as file-mounted ESO Secrets (reloaded on change) and the ledger
# reached over the network, the broker needs ZERO kube-apiserver access. A Role is granted ONLY if a
# concrete future use appears — never pre-emptively. The broker also has NO OpenBao/ESO egress (the ESO
# CONTROLLER, out-of-band, writes the Secrets; the broker only READS the mounts) — see the CNP.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentforge-broker
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/component: broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
automountServiceAccountToken: false
