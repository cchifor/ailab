# The DIRECT ClusterIP the sandbox agent reaches (design §3): NO proxy in front, so the broker sees the
# pod's real source IP at L3 for the TOFU anti-replay binding (the composition root pins
# proxy_headers=False + empty forwarded_allow_ips — main.py _broker_uvicorn_config). The agent egress
# CNP (agentforge-sandbox/cilium-egress.yaml) restricts DNS L7 to this Service's exact name.
apiVersion: v1
kind: Service
metadata:
  name: agentforge-broker
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/component: broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentforge-broker
  ports:
    - name: http
      port: 8700
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9464
      targetPort: metrics
      protocol: TCP
