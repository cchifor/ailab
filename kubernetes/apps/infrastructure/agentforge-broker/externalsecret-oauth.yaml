# broker-oauth (design §6) — the durable subscription OAuth, on a DISTINCT operator OpenBao path
# `af/data/operator/broker/<provider>/<account>/oauth` behind a SEPARATE operator-owned SecretStore +
# auth role that NO `tenants/*` role can read (the tenant role is scoped to
# `af/data/tenants/<org>/<workspace>/*`, which cannot name any `af/data/operator/*` key — the
# reserved-prefix split that closes the R-1 ESO wildcard escape). Reconciled by the ESO CONTROLLER
# (out-of-band), NOT by the broker: the broker has token-automount off, NO OpenBao/ESO egress, and only
# READS the mounted Secret. Subscription-OAuth refresh is the operator refresh controller's job (§6);
# the broker's copy is READ-ONLY and every replica reloads on change.
#
# ⚠ ACTIVATION: the OpenBao role `af-operator-broker` (bound to ns agentforge-broker + SA af-broker-eso)
# and the KV data at `af/data/operator/broker/anthropic/default/oauth` are OPERATOR-provisioned (the
# isolated OpenBao provisioner, design §7 — the broker role is OPERATOR-FIXED, never synthesized from
# tenant inputs). Until then this ExternalSecret reports NotReady (harmless: the broker Deployment is
# gated + the Flux Kustomization is wait:false).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-broker-eso
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/component: eso-auth
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
# The ESO controller mints a short-TTL token for this SA (TokenRequest); no pod runs as it, so keep its
# token unmounted. OpenBao's `af-operator-broker` role is bound to exactly this ns + SA.
automountServiceAccountToken: false
---
# Operator-owned namespaced SecretStore (NOT ClusterSecretStore) — OpenBao/vault via kubernetes auth,
# authenticating as the af-broker-eso SA under the OPERATOR-FIXED role. Same provider shape the tenant
# SecretStore uses, but a DISJOINT role/path the tenant policy can never reach (§6).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: agentforge-broker-store
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: "af"        # KV v2 mount
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "af-operator-broker"   # operator-fixed; unreachable via any tenant SecretStore
          serviceAccountRef:
            name: af-broker-eso
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: broker-oauth
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: agentforge-broker-store
    kind: SecretStore
  target:
    name: broker-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: operator/broker/anthropic/default/oauth
