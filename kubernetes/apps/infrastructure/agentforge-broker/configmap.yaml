# NON-SECRET broker env (design §5) — the AF_BROKER_-prefixed knobs BrokerSettings reads (agentforge
# broker/config.py). NO secret material lives here: the ledger PASSWORD/DSN-with-auth comes from the
# ESO-synced broker-ledger Secret (AF_BROKER_LEDGER_DSN via secretKeyRef — see deployment.yaml), and the
# OAuth + kid public keys come from mounted ESO Secrets. Only the broker's identity, the bounds
# defaults, ports, and the (non-secret) ledger COORDINATES are here.
#
# SHARED across every per-account broker Deployment (broker-anthropic-max1 / broker-anthropic-max2 /
# broker-openai-codex): each Deployment `envFrom`s this ConfigMap for the account-INDEPENDENT knobs and
# then OVERRIDES the per-account identity `AF_BROKER_AUDIENCE` with an inline container `env:` (inline env
# wins over envFrom). AF_BROKER_AUDIENCE therefore lives per-Deployment, NOT here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentforge-broker-env
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/component: broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
data:
  # NB: AF_BROKER_AUDIENCE (this broker instance's identity = provider/account, design §3 — a capability is
  # accepted only if its `aud` == this) is set PER-DEPLOYMENT as an inline `env:` in each broker-*.yaml
  # (ONE broker Deployment per (provider, account)), NOT here, so this ConfigMap stays account-agnostic.
  # Upstream provider base — CONFIG ONLY (the gateway proxy is PREFLIGHT-gated, design §4/§10); the exact
  # enumerated host(s) land with the preflight. Left empty until then.
  AF_BROKER_UPSTREAM_BASE_URL: ""
  # Conservative per-request worst-case token reservation (design §5) — reserved BEFORE dispatch so the
  # budget bound is real even before the precise (validated-input + max-output + aux) figure lands.
  AF_BROKER_WORST_CASE_TOKENS: "200000"
  AF_BROKER_LEASE_TTL_S: "120"       # expiring-concurrency lease TTL (crash reclaim)
  AF_BROKER_SWEEP_INTERVAL_S: "30"   # supervised lease-sweep interval (< lease TTL)
  AF_BROKER_MAX_BODY_BYTES: "1048576"      # smuggling/DoS body cap (1 MiB)
  AF_BROKER_BODY_READ_TIMEOUT_S: "30"      # wall-clock deadline for the pre-admission body read
  AF_BROKER_PORT: "8700"             # HTTP API (the DIRECT ClusterIP the sandbox reaches, source-IP TOFU)
  AF_BROKER_METRICS_PORT: "9464"     # Prometheus metrics
  # The mounted operator kid-registry JSON (public verify keys + per-kid ceilings), synced by ESO from
  # OpenBao (externalsecret-kids.yaml) and mounted read-only. Public keys are non-secret, but syncing
  # via ESO matches the operator keypair-controller publish path (design §3/§7).
  AF_BROKER_KID_REGISTRY_PATH: "/var/run/broker/kids/registry.json"
  # The PATH to the mounted ledger DSN file (design §5/§B) — NON-secret. The DSN itself (with the
  # agentforge_broker password) is the read-only broker-ledger Secret mounted at this path; the DSN is
  # NEVER placed in this ConfigMap. (Follow-up: the merged broker/config.py reads AF_BROKER_LEDGER_DSN
  # from env; it must gain *_FILE reading before activation — see deployment.yaml.)
  AF_BROKER_LEDGER_DSN_FILE: "/var/run/broker/ledger/AF_BROKER_LEDGER_DSN"
  # NON-SECRET ledger coordinates (documentation + operational reference). The DB login is
  # agentforge_broker: open/reserve/reconcile ONLY, NEVER close (the reaper alone holds close, design §5).
  LEDGER_HOST: "infra-pg-rw.databases.svc.cluster.local"
  LEDGER_PORT: "5432"
  LEDGER_DB: "agentforge_broker"
  LEDGER_USER: "agentforge_broker"
