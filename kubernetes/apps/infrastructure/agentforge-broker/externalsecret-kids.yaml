# broker-kids (design §3/§7) — the broker's OPERATOR-owned kid registry: PUBLIC verify keys + per-kid
# ceilings (issuer/audience/allowed-tenants/workspaces/pools/models/routes/methods + max TTL/budget/rate/
# concurrency), the `{"kids": {...}}` JSON schema agentforge broker/config.py::parse_kid_registry reads.
# The broker holds ONLY public halves — it can VERIFY but never MINT (the private signing key stays in
# the orchestrator's orchestrator-creds). Published by the operator keypair controller to
# `af/data/operator/broker/<provider>/<account>/kids` and synced here into a single registry.json Secret
# key, mounted read-only at AF_BROKER_KID_REGISTRY_PATH. Public keys are non-secret, but the OpenBao
# publish path + ESO sync match the operator keypair-controller lifecycle (rotation overlap, retire).
#
# ⚠ ACTIVATION: same operator SecretStore/role as broker-oauth; the KV data at
# `af/data/operator/broker/anthropic/default/kids` (property `registry.json` = the kid registry JSON) is
# operator-provisioned. NotReady until then (broker Deployment gated + wait:false).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: broker-kids
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: agentforge-broker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: agentforge-broker-store
    kind: SecretStore
  target:
    name: broker-kids
    creationPolicy: Owner
  data:
    # the single kid-registry JSON document -> Secret key registry.json (mounted at the path above).
    - secretKey: registry.json
      remoteRef:
        key: operator/broker/anthropic/default/kids
        property: registry.json
