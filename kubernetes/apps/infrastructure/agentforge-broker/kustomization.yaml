apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# AgentForge v2 P2 R-2 — the OPERATOR-OWNED, CP-UNWRITABLE model-gateway broker (design §5/§6/§8). Its
# OWN directory + a dedicated Flux Kustomization (clusters/ai/agentforge-broker.yaml), mirroring the
# agentforge-sandbox precedent: self-contained so it never collides with the P1 agentforge admission
# (apps layer) or the concurrent P2 operators editing infrastructure/{security,autoscaling}. NO shared
# aggregator index (infrastructure/kustomization.yaml) is edited.
#
# FAN-OUT: the single `anthropic/default` broker is superseded by ONE Deployment per (provider, account) —
# anthropic/claude-max-1, anthropic/claude-max-2, openai/codex-pro — each with its own Service + PDB + 3
# ExternalSecrets + CiliumNetworkPolicy in a self-contained broker-*.yaml. The namespace, runtime SA,
# openbao-ca cert, ESO SecretStore/auth-SA, and the account-agnostic env ConfigMap are SHARED below.
resources:
  # -- SHARED (account-independent) --
  - openbao-ca-cert.yaml # per-ns openbao-tls ca.crt (ailab-ca) for the ESO caProvider
  - namespace.yaml # agentforge-broker ns (restricted PSA, pinned v1.31) + default-deny NetworkPolicy
  - serviceaccount.yaml # broker runtime SA (automount off, NO Role) — zero kube-apiserver access
  - secretstore.yaml # ESO auth SA (af-broker-eso) + operator SecretStore (agentforge-broker-store), shared
  - configmap.yaml # SHARED non-secret AF_BROKER_ env + ledger coordinates (audience is per-Deployment)
  - orchestrator-endpoints-rbac.yaml # orchestrator READ on broker Endpoints (Kata pod-IP resolution)
  # -- PER-ACCOUNT fan-out (Deployment + PDB + Service + 3 ExternalSecrets + CiliumNetworkPolicy each) --
  - broker-anthropic-max1.yaml # audience anthropic/claude-max-1 (upstream Anthropic)
  - broker-anthropic-max2.yaml # audience anthropic/claude-max-2 (upstream Anthropic)
  - broker-openai-codex.yaml   # audience openai/codex-pro (upstream OpenAI/ChatGPT)
