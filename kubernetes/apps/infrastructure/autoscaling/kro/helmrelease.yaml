# kro (kube-resource-orchestrator) — AgentForge v2 P2 (ADR 0019). Provides the ResourceGraphDefinition
# (RGD) CRD the CP uses to DRY the per-tenant expansion (in P1 the tenant manifests are plain
# hand-authored ns/SA/Deployment/RBAC/NetworkPolicy; P2 replaces that with a kro RGD — ADR 0019 §P2 /
# plan §0.2 option B). This installs ONLY the kro operator + CRD; RGD/instance CRs land in other streams.
#
# INSTALL METHOD: kro ships ONLY as an OCI Helm chart on the Kubernetes registry (no HTTP repo, no
# GitHub Release manifests) — pulled via the `type: oci` HelmRepository `kro` (sources/kro.yaml),
# resolving to oci://registry.k8s.io/kro/charts/kro. install/upgrade crds:CreateReplace so Flux keeps
# the RGD CRD current (Helm alone does not upgrade CRDs — kro's install docs call this out).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: kro-system
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: kro
      version: "0.9.2" # OCI chart; appVersion image registry.k8s.io/kro/kro:0.9.2 (alpha — API may change)
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    deployment:
      replicaCount: 1
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { memory: 512Mi }
    config:
      allowCRDDeletion: false # don't let kro GC CRDs
      enableLeaderElection: true
