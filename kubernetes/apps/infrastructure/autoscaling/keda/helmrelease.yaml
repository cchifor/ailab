# KEDA — event-driven autoscaling for AgentForge v2 P2 (ADR 0019). Scales the orchestrator/worker
# Deployments (scale-to-zero for non-interactive roles, minReplicaCount>=1 for warm interactive) and
# drives the ScaledJob k8s-native CI runners (one ephemeral Kata runner + DinD per queued job). Installs
# the operator + CRDs (ScaledObject/ScaledJob/TriggerAuthentication/...); the ScaledObjects/ScaledJobs
# themselves land in other streams. NOTE: the KEDA maxReplicaCount is a COARSE cap — the plan's
# per-account forge-backed lease is the true concurrency semaphore.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: keda
      version: "2.20.1" # appVersion 2.20.1
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
  values:
    crds:
      install: true # KEDA renders its CRDs as chart templates gated by this flag
    resources:
      operator:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { memory: 512Mi }
      metricServer:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { memory: 512Mi }
      webhooks:
        requests: { cpu: 25m, memory: 64Mi }
        limits: { memory: 256Mi }
    prometheus:
      operator:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
      metricServer:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
