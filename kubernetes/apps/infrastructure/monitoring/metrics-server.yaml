# metrics-server — the cluster Metrics API (kubectl top, HPA, the Homepage kubernetes widget).
# Talos kubelets serve metrics with self-signed certs, so --kubelet-insecure-tls is required.
# Deployed into kube-system (system component); priorityClassName stays the chart default
# (system-cluster-critical).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server
      version: "3.12.2"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  values:
    args:
      - --kubelet-insecure-tls # Talos kubelet serving certs are self-signed
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { memory: 192Mi }
