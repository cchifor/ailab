apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - limitrange.yaml
  - grafana-admin.sops.yaml
  - grafana-oauth.sops.yaml # Authelia OIDC client secret (env into Grafana)
  - metrics-server.yaml # Metrics API (kubectl top / HPA / Homepage k8s widget)
  - pve-exporter-secret.sops.yaml # SOPS: read-only PVE token (PVEAuditor) for pve-exporter
  - pve-exporter.yaml # Proxmox VE metrics (hypervisors + VMs/CTs + storage pools)
  - proxmox-node.yaml # host node_exporter on the 3 Proxmox hosts (scrape target)
  - ci-runners-node.yaml # host node_exporter on the 3 GitHub Actions runner VMs (scrape target)
  - dev-workers-node.yaml # host node_exporter on the 3 dev-worker VMs (scrape target)
  - kube-prometheus-stack.yaml
  - prometheus-lan.yaml # LAN NodePort :30090 — nightly k6 remote-write + baseline queries from the CI runner VMs (exposure trade-off in file header)
  - loki.yaml
  - alloy.yaml
  - flux-monitoring.yaml # PodMonitor for the 4 Flux controllers (gotk_reconcile_* metrics)
  - ai-llm-dashboard.yaml
  - reporting-dashboard.yaml # single infra reporting dashboard (hypervisors/instances/AI/storage)
  - loki-logs-dashboard.yaml # "Loki — Logs": most-used log queries (errors/volume/search) + Explore
  - k8s-releases-dashboard.yaml # "Kubernetes — Releases & Workloads": Flux status + workload usage + error/warn logs
  - trivy-dashboard.yaml # Trivy Operator security-scan dashboard (grafana.com ID 17813)
  - strive-red-dashboard.yaml # strive platform per-service RPS/error/p95 (OTLP RED metrics via alloy-otlp remote_write)
  - k6-nightly-dashboard.yaml # "k6 — Nightly load (strive)": nightly k6 runs (rw via prometheus-lan) + 30d trends over the k6:* recording rules
  - k6-load-rules.yaml # k6:* recording rules by (scenario, env) — the 7d baseline for the platform's nightly regression gate
  - soak-leak-rules.yaml # weekly-soak alerts: soak running (info), error rate >5%, container RSS-leak detection gated on an active soak
  - ntfy-auth.sops.yaml # SOPS: ntfy admin password (server seeding + Alertmanager receiver)
  - ntfy.yaml # self-hosted push notifications; Alertmanager routes all alerts here
  - storage-fabric-probe.yaml # per-node QNAP-fabric reachability (blackbox DaemonSet)
  - storage-fabric-rules.yaml # alerts on the probes
  - ci-runners-rules.yaml # alerts on the runner VMs (down / disk / memory / buildx self-heal beacon)
