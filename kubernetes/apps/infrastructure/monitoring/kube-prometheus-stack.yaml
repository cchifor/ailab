apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.2.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # kube-proxy is off (Cilium). etcd metrics deferred (needs a careful per-node etcd restart).
    # controller-manager + scheduler now bind 0.0.0.0 via the Talos machine-config, so scrape them.
    kubeProxy: { enabled: false }
    kubeEtcd: { enabled: false }
    kubeControllerManager:
      enabled: true
      endpoints: ["192.168.0.41", "192.168.0.42", "192.168.0.43"]
      service: { enabled: true, port: 10257, targetPort: 10257 }
      serviceMonitor: { https: true, insecureSkipVerify: true }
    kubeScheduler:
      enabled: true
      endpoints: ["192.168.0.41", "192.168.0.42", "192.168.0.43"]
      service: { enabled: true, port: 10259, targetPort: 10259 }
      serviceMonitor: { https: true, insecureSkipVerify: true }
    alertmanager:
      alertmanagerSpec:
        storage: {} # ephemeral
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: "8GB" # size cap (whichever hits first); ~80% of the 10Gi PVC
        # Durable TSDB on node-local NVMe (local-path SC) — survives pod restarts. NFS is unsafe
        # for the TSDB (mmap/file-locks); network block (QNAP iSCSI) is the documented alternative.
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        # local-path dirs are created root-owned 0755; chown the volume to the non-root
        # Prometheus uid/gid (1000/2000) so it can write the TSDB. ns is privileged.
        initContainers:
          - name: init-chown-data
            image: busybox:1.37
            command: ["sh", "-c", "id; chown -R 1000:2000 /prometheus 2>/dev/null || true; chmod -R 0777 /prometheus; ls -lna /prometheus"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              capabilities: { add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"], drop: ["ALL"] }
            volumeMounts:
              - name: prometheus-kube-prometheus-stack-prometheus-db
                mountPath: /prometheus
        resources:
          requests: { cpu: 200m, memory: 1Gi }
          limits: { memory: 2Gi }
    grafana:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: false # dashboards provisioned as code; no PVC needed
      defaultDashboardsTimezone: browser
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
