apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.2.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # kube-proxy is off (Cilium). etcd metrics deferred (needs a careful per-node etcd restart).
    # controller-manager + scheduler now bind 0.0.0.0 via the Talos machine-config, so scrape them.
    kubeProxy: { enabled: false }
    kubeEtcd: { enabled: false }
    kubeControllerManager:
      enabled: true
      endpoints: ["192.168.0.41", "192.168.0.42", "192.168.0.43"]
      service: { enabled: true, port: 10257, targetPort: 10257 }
      serviceMonitor: { https: true, insecureSkipVerify: true }
    kubeScheduler:
      enabled: true
      endpoints: ["192.168.0.41", "192.168.0.42", "192.168.0.43"]
      service: { enabled: true, port: 10259, targetPort: 10259 }
      serviceMonitor: { https: true, insecureSkipVerify: true }
    alertmanager:
      alertmanagerSpec:
        priorityClassName: platform-critical
        resources:
          requests: { cpu: 25m, memory: 64Mi }
          limits: { memory: 128Mi }
        storage: {} # ephemeral
        secrets:
          - ntfy-auth # mounted at /etc/alertmanager/secrets/ntfy-auth/ -> password_file for the ntfy receiver
      # Route every alert to the self-hosted ntfy (push to phone); drop the always-firing Watchdog.
      config:
        route:
          receiver: ntfy
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: "null"
              matchers: ['alertname = "Watchdog"']
        receivers:
          - name: "null"
          - name: ntfy
            webhook_configs:
              - url: http://ntfy.monitoring.svc.cluster.local/ailab-alerts
                send_resolved: true
                http_config:
                  basic_auth:
                    username: ailab
                    password_file: /etc/alertmanager/secrets/ntfy-auth/password
    prometheus:
      prometheusSpec:
        priorityClassName: platform-critical
        # Accept remote_write on /api/v1/write — the alloy-otlp collector
        # (apps/infrastructure/observability) pushes the strive platform's
        # OTLP RED metrics here.
        enableRemoteWriteReceiver: true
        # Prefer a Thunderbolt-fabric node (cp1/cp2) so the iSCSI TSDB rides ~1.1GB/s, not cp3's 2.5GbE USB.
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - { key: ailab.io/storage-tier, operator: In, values: ["thunderbolt"] }
        retention: 15d
        retentionSize: "8GB" # size cap (whichever hits first); ~80% of the 10Gi PVC
        # Durable, migratable TSDB on QNAP iSCSI block (csi.trident.qnap.io) — survives pod restarts
        # AND node loss (the LUN re-attaches wherever Prometheus reschedules). NFS is unsafe for the
        # TSDB (mmap/file-locks); local-path was the interim node-local backing before the iSCSI CSI.
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: qnap-iscsi
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        # Block volumes honour fsGroup (kubelet chowns the ext4 LUN to gid 2000), so this init is
        # belt-and-suspenders — it also chmods the operator's subPath=prometheus-db data dir.
        initContainers:
          - name: init-chown-data
            image: mirror.gcr.io/library/busybox:1.38 # registry mirror cache (like homepage), not Docker Hub anon (429)
            command: ["sh", "-c", "id; chown -R 1000:2000 /prometheus 2>/dev/null || true; chmod -R 0777 /prometheus; ls -lna /prometheus"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              capabilities: { add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"], drop: ["ALL"] }
            volumeMounts:
              - name: prometheus-kube-prometheus-stack-prometheus-db
                mountPath: /prometheus
                subPath: prometheus-db # operator mounts the data here via this subPath; chmod THIS dir
        resources:
          requests: { cpu: 200m, memory: 1Gi }
          limits: { memory: 2Gi }
        # Per-node storage-fabric reachability: scrape each storage-fabric-probe DaemonSet pod's /probe
        # against the QNAP NFS(2049)+iSCSI(3260) ports → probe_success{job=storage-fabric-*, node=...}.
        # (See storage-fabric-probe.yaml + storage-fabric-rules.yaml.)
        additionalScrapeConfigs:
          - job_name: storage-fabric-nfs
            metrics_path: /probe
            params: { module: ["tcp_connect"], target: ["10.55.0.254:2049"] }
            kubernetes_sd_configs:
              - { role: pod, namespaces: { names: ["monitoring"] } }
            relabel_configs:
              - { source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name], regex: storage-fabric-probe, action: keep }
              - { source_labels: [__meta_kubernetes_pod_container_port_number], regex: "9115", action: keep }
              - { source_labels: [__meta_kubernetes_pod_node_name], target_label: node }
              - { target_label: fabric, replacement: nfs }
          - job_name: storage-fabric-iscsi
            metrics_path: /probe
            params: { module: ["tcp_connect"], target: ["10.55.0.254:3260"] }
            kubernetes_sd_configs:
              - { role: pod, namespaces: { names: ["monitoring"] } }
            relabel_configs:
              - { source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name], regex: storage-fabric-probe, action: keep }
              - { source_labels: [__meta_kubernetes_pod_container_port_number], regex: "9115", action: keep }
              - { source_labels: [__meta_kubernetes_pod_node_name], target_label: node }
              - { target_label: fabric, replacement: iscsi }
    grafana:
      priorityClassName: platform-critical
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # ADR 0016 Tier A: Grafana's DB lives in infra-pg Postgres (databases ns) — no PVC, so 2
      # replicas share state and ride through a node drain. Dashboards/datasources are all
      # sidecar-provisioned; OIDC users recreate on login; the admin secret seeds on first init of
      # the empty DB (reset later via `grafana cli admin reset-admin-password`).
      # NOTE: no Grafana-MANAGED alert rules exist (alerting is PrometheusRule -> Alertmanager ->
      # ntfy). If any are ever added, 2 replicas need `headlessService: true` +
      # `[unified_alerting] ha_peers`, else they double-evaluate/notify.
      replicas: 2
      deploymentStrategy:
        type: RollingUpdate # no RWO PVC anymore (was Recreate for the iSCSI Multi-Attach guard)
      podDisruptionBudget:
        maxUnavailable: 1
        unhealthyPodEvictionPolicy: AlwaysAllow # crash-looping pods must never wedge a drain
      # ScheduleAnyway, not DoNotSchedule: a hard constraint deadlocks surge rollouts while a node
      # is drained (ADR 0016).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
              app.kubernetes.io/instance: kube-prometheus-stack
      # Stateless now -> evict fast off an unreachable node (default 300s; ADR 0016).
      tolerations:
        - { key: node.kubernetes.io/not-ready, operator: Exists, effect: NoExecute, tolerationSeconds: 60 }
        - { key: node.kubernetes.io/unreachable, operator: Exists, effect: NoExecute, tolerationSeconds: 60 }
      envValueFrom:
        GF_DATABASE_PASSWORD:
          secretKeyRef:
            name: grafana-db # SOPS twin of databases/infra-pg-grafana.sops.yaml
            key: password
      defaultDashboardsTimezone: browser
      # SSO via Authelia OIDC (ADR 0012). The client secret comes from the grafana-oauth SOPS secret as
      # GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET (env overrides grafana.ini). The local admin stays as
      # break-glass. role_attribute_path maps the Authelia 'admins' group to Grafana Admin.
      envFromSecret: grafana-oauth
      grafana.ini:
        server:
          root_url: https://grafana.chifor.me
        database:
          type: postgres
          host: infra-pg-rw.databases.svc.cluster.local:5432
          name: grafana
          user: grafana
          # password via GF_DATABASE_PASSWORD (envValueFrom above; env overrides grafana.ini).
          # In-cluster hop; verify-full would need the infra-pg CA mounted — consciously skipped.
          ssl_mode: disable
        dashboards:
          # "AI Lab Fleet" as the default home dashboard. The sidecar writes the reporting-dashboard
          # ConfigMap's data key to /tmp/dashboards/reporting.json.
          default_home_dashboard_path: /tmp/dashboards/reporting.json
        auth.generic_oauth:
          enabled: true
          name: Authelia
          client_id: grafana
          scopes: "openid profile email groups"
          auth_url: https://sso.chifor.me/api/oidc/authorization
          token_url: https://sso.chifor.me/api/oidc/token
          api_url: https://sso.chifor.me/api/oidc/userinfo
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          name_attribute_path: name
          use_pkce: true
          auth_style: InHeader
          # admins group -> Grafana Admin; any other SSO user -> Editor (NOT Viewer) so they get
          # Explore (logs/metrics ad-hoc queries) — Grafana hides Explore from Viewers. Single-operator
          # lab, so Editor-by-default is fine; the `groups` claim still elevates admins to full Admin.
          role_attribute_path: "contains(groups[*], 'admins') && 'Admin' || 'Editor'"
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          # Pinned uid (was Grafana-autogenerated): Tempo's tracesToLogsV2
          # below must reference Loki by uid. Provisioning upserts by name, so
          # the existing datasource's uid flips to `loki` on reconcile — repo
          # dashboards reference Loki via ${DS_LOKI} template variables (never
          # the raw uid), so they re-resolve; only hand-saved panels pinned to
          # the OLD random uid would need re-pointing.
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
        # Tempo (ns observability, tempo.yaml there) — strive platform traces,
        # head-sampled via the alloy-otlp collector. Field shapes follow the
        # platform's local-compose precedent (cchifor/platform
        # deploy/observability/grafana-datasources.yaml). `prometheus` is the
        # chart's default-datasource uid (grafana.sidecar.datasources.uid).
        # Tempo's NetworkPolicy admits exactly these Grafana pods on 3200.
        - name: Tempo
          type: tempo
          access: proxy
          uid: tempo
          url: http://tempo.observability.svc.cluster.local:3200
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
            tracesToMetrics:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            serviceMap:
              datasourceUid: prometheus
    kube-state-metrics:
      # Flux custom-resource-state → gotk_resource_info{customresource_kind, name, exported_namespace,
      # ready, suspended, revision}. Powers the "Kubernetes — Releases & Workloads" dashboard Row 1.
      # Default collectors stay ON (the k8s dashboard uses kube_pod_*/container_*/kube_namespace_*).
      rbac:
        extraRules:
          - apiGroups: ["kustomize.toolkit.fluxcd.io"]
            resources: ["kustomizations"]
            verbs: ["list", "watch"]
          - apiGroups: ["helm.toolkit.fluxcd.io"]
            resources: ["helmreleases"]
            verbs: ["list", "watch"]
          - apiGroups: ["source.toolkit.fluxcd.io"]
            resources: ["gitrepositories", "helmrepositories", "helmcharts", "ocirepositories", "buckets"]
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          kind: CustomResourceStateMetrics
          spec:
            resources:
              - groupVersionKind: { group: kustomize.toolkit.fluxcd.io, version: v1, kind: Kustomization }
                metricNamePrefix: gotk
                metrics:
                  - name: status_last_transition_timestamp
                    help: "Unix time of the resource's last condition transition (RFC3339 -> epoch)."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        valueFrom: [lastTransitionTime]
                        labelsFromPath:
                          type: [type]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      name: [metadata, name]
                  - name: resource_info
                    help: "The current state of a Flux Kustomization resource."
                    each:
                      type: Info
                      info: { labelsFromPath: { name: [metadata, name] } }
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]
              - groupVersionKind: { group: helm.toolkit.fluxcd.io, version: v2, kind: HelmRelease }
                metricNamePrefix: gotk
                metrics:
                  - name: status_last_transition_timestamp
                    help: "Unix time of the resource's last condition transition (RFC3339 -> epoch)."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        valueFrom: [lastTransitionTime]
                        labelsFromPath:
                          type: [type]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      name: [metadata, name]
                  - name: resource_info
                    help: "The current state of a Flux HelmRelease resource."
                    each:
                      type: Info
                      info: { labelsFromPath: { name: [metadata, name] } }
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, history, "0", chartVersion]  # deployed release (codex round1)
              - groupVersionKind: { group: source.toolkit.fluxcd.io, version: v1, kind: GitRepository }
                metricNamePrefix: gotk
                metrics:
                  - name: status_last_transition_timestamp
                    help: "Unix time of the resource's last condition transition (RFC3339 -> epoch)."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        valueFrom: [lastTransitionTime]
                        labelsFromPath:
                          type: [type]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      name: [metadata, name]
                  - name: resource_info
                    help: "The current state of a Flux GitRepository resource."
                    each:
                      type: Info
                      info: { labelsFromPath: { name: [metadata, name] } }
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
              - groupVersionKind: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository }
                metricNamePrefix: gotk
                metrics:
                  - name: status_last_transition_timestamp
                    help: "Unix time of the resource's last condition transition (RFC3339 -> epoch)."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        valueFrom: [lastTransitionTime]
                        labelsFromPath:
                          type: [type]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      name: [metadata, name]
                  - name: resource_info
                    help: "The current state of a Flux HelmRepository resource."
                    each:
                      type: Info
                      info: { labelsFromPath: { name: [metadata, name] } }
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
              - groupVersionKind: { group: source.toolkit.fluxcd.io, version: v1, kind: OCIRepository }
                metricNamePrefix: gotk
                metrics:
                  - name: status_last_transition_timestamp
                    help: "Unix time of the resource's last condition transition (RFC3339 -> epoch)."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        valueFrom: [lastTransitionTime]
                        labelsFromPath:
                          type: [type]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      name: [metadata, name]
                  - name: resource_info
                    help: "The current state of a Flux OCIRepository resource."
                    each:
                      type: Info
                      info: { labelsFromPath: { name: [metadata, name] } }
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
