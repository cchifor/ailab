apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.2.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # kube-proxy is off (Cilium). etcd metrics deferred (needs a careful per-node etcd restart).
    # controller-manager + scheduler now bind 0.0.0.0 via the Talos machine-config, so scrape them.
    kubeProxy: { enabled: false }
    kubeEtcd: { enabled: false }
    kubeControllerManager:
      enabled: true
      endpoints: ["192.168.0.41", "192.168.0.42", "192.168.0.43"]
      service: { enabled: true, port: 10257, targetPort: 10257 }
      serviceMonitor: { https: true, insecureSkipVerify: true }
    kubeScheduler:
      enabled: true
      endpoints: ["192.168.0.41", "192.168.0.42", "192.168.0.43"]
      service: { enabled: true, port: 10259, targetPort: 10259 }
      serviceMonitor: { https: true, insecureSkipVerify: true }
    alertmanager:
      alertmanagerSpec:
        storage: {} # ephemeral
    prometheus:
      prometheusSpec:
        retention: 7d
        retentionSize: "8GB"
        # Ephemeral (emptyDir) until block storage (iSCSI) is added -- NFS is unsafe for the TSDB.
        resources:
          requests: { cpu: 200m, memory: 1Gi }
          limits: { memory: 2Gi }
    grafana:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: false # dashboards provisioned as code; no PVC needed
      defaultDashboardsTimezone: browser
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
