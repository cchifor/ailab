# prometheus-pve-exporter — scrapes the Proxmox VE API (read-only PVEAuditor token) and exposes
# cluster-wide pve_* metrics: per-node (hypervisor), per-guest (qemu/lxc), and per-storage-pool.
# One target is enough — the PVE API returns CLUSTER-wide resources from any member. Auth + the
# token value come from the SOPS secret pve-exporter-auth (PVE_USER/PVE_TOKEN_NAME/PVE_TOKEN_VALUE).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pve-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pve-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:3.9.0
          envFrom:
            - secretRef: { name: pve-exporter-auth } # PVE_USER / PVE_TOKEN_NAME / PVE_TOKEN_VALUE
          env:
            - { name: PVE_VERIFY_SSL, value: "false" } # PVE uses a self-signed cert on the trusted LAN
          ports:
            - { name: metrics, containerPort: 9221 }
          readinessProbe:
            tcpSocket: { port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pve-exporter
spec:
  selector:
    app.kubernetes.io/name: pve-exporter
  ports:
    - { name: metrics, port: 9221, targetPort: metrics }
---
# Multi-target exporter: scrape /pve?target=<a cluster member>; the API returns cluster-wide resources.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [monitoring]
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  endpoints:
    - port: metrics
      path: /pve
      params:
        target: ["192.168.0.2"] # any Proxmox cluster member; returns cluster-wide pve_*
        cluster: ["1"]
        node: ["1"]
      interval: 60s
      scrapeTimeout: 30s
