# AgentForge worker metrics (ADR 0018): the 6 dev-worker VMs (.8–.13) run the agentforge
# orchestrator as a host systemd service (ansible role dev_worker, tasks/agentforge.yml), exporting
# forge_* metrics on :9464 (ufw-opened to the LAN by the role). Gives per-worker health, webhook
# HMAC failures, reconcile drift, needs-human backlog, and forge_build_info{version} for release
# skew during pin bumps. relabel forces job="agentforge". Mirror of dev-workers-node.yaml; alerts
# in agentforge-rules.yaml.
apiVersion: v1
kind: Service
metadata:
  name: agentforge
  namespace: monitoring
  labels:
    app.kubernetes.io/name: agentforge
spec:
  clusterIP: None
  ports:
    - { name: metrics, port: 9464, targetPort: 9464, protocol: TCP }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: agentforge
  namespace: monitoring
  labels:
    app.kubernetes.io/name: agentforge
subsets:
  - addresses:
      - { ip: 192.168.0.8 }  # dev-worker-1 (ai-node1)
      - { ip: 192.168.0.9 }  # dev-worker-2 (ai-node2)
      - { ip: 192.168.0.10 } # dev-worker-3 (ai-node3)
      - { ip: 192.168.0.11 } # dev-worker-4 (ai-node1)
      - { ip: 192.168.0.12 } # dev-worker-5 (ai-node2)
      - { ip: 192.168.0.13 } # dev-worker-6 (ai-node3)
    ports:
      - { name: metrics, port: 9464, protocol: TCP }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agentforge
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [monitoring]
  selector:
    matchLabels:
      app.kubernetes.io/name: agentforge
  endpoints:
    - port: metrics
      interval: 30s
      relabelings:
        - targetLabel: job
          replacement: agentforge
