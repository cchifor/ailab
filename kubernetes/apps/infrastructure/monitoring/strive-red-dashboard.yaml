# "Strive — RED overview": per-service RPS / error rate / p95 for the strive
# platform, from the OTLP RED metrics the services push through the alloy-otlp
# collector (apps/infrastructure/observability) into Prometheus via
# remote_write. Series come from weld-observability's MetricsMiddleware
# (http.server.request.duration, unit s → http_server_request_duration_seconds_*;
# service.name → the `job` label; http.route is sanitized to :id at the
# collector). Provisioned via the Grafana sidecar (grafana_dashboard label).
apiVersion: v1
kind: ConfigMap
metadata:
  name: strive-red-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  strive-red.json: |
    {
      "title": "Strive — RED overview",
      "uid": "strive-red",
      "tags": ["strive", "platform", "red"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "label": "Datasource",
            "current": {},
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Requests/s (per service)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (job) (rate(http_server_request_duration_seconds_count[$__rate_interval]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error rate — 5xx % (per service; no line = zero 5xx)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "100 * sum by (job) (rate(http_server_request_duration_seconds_count{http_status_code=~\"5..\"}[$__rate_interval])) / on (job) sum by (job) (rate(http_server_request_duration_seconds_count[$__rate_interval]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency p95 (per service)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.95, sum by (job, le) (rate(http_server_request_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "In-flight requests (per service)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (job) (http_server_active_requests)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Top 10 routes by RPS",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "topk(10, sum by (job, http_route) (rate(http_server_request_duration_seconds_count[$__rate_interval])))",
              "legendFormat": "{{job}} {{http_route}}"
            }
          ]
        }
      ]
    }
