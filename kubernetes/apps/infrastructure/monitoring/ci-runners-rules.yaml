# Alerts for the CI runner VMs (metrics via ci-runners-node.yaml, job=ci-runner-node). Closes the
# monitoring gap that let a 40%-of-fleet buildx-ownership outage run silently for hours (see ADR 0013).
# `release: kube-prometheus-stack` so the operator's ruleSelector picks it up.
# Node-level alerts (down/disk/mem/swap) are forge-agnostic. Maintenance/disk alerts now key off the
# GITEA runner beacons (gitea_runner_reclaim_* + gitea_runner_cleanup_*, emitted by the gitea_runner role
# on ALL 5 act_runners) — NOT the retiring GitHub agent's runner_reclaim_* (already retired on ci-runner-3,
# node3). CIRunnerDockerConfigRootOwned still reads the GitHub agent's buildx-perm beacon and applies only
# where that agent is co-located (metric absent => no data => no fire on retired runners); fold it into the
# gitea reclaim (heal ~/.docker/buildx) when the GitHub agent is fully retired.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ci-runners
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: ci-runners
      rules:
        - alert: CIRunnerNodeDown
          expr: up{job="ci-runner-node"} == 0
          for: 10m
          labels: { severity: critical }
          annotations:
            summary: "CI runner {{ $labels.instance }} is down (no node_exporter scrape)"
            description: >-
              node_exporter on runner {{ $labels.instance }} has been unscrapeable for >10m — the VM
              is likely down or unreachable, cutting CI capacity. node_exporter is independent of the
              ephemeral runner service, so this is NOT registration churn. Check the VM on Proxmox
              (`qm status <vmid>`) and `just ping-runners`.
        - alert: CIRunnerDiskFilling
          expr: |
            node_filesystem_avail_bytes{job="ci-runner-node",mountpoint="/"}
              / node_filesystem_size_bytes{job="ci-runner-node",mountpoint="/"} < 0.12
          for: 15m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} root filesystem <12% free"
            description: >-
              Runner {{ $labels.instance }} root fs is under 12% free for >15m. gitea-runner-cleanup.sh
              (15-min idle-guarded timer with disk-pressure escalation) should be pruning build cache +
              stale images; if it keeps climbing the cleanup is wedged or out-run — check
              `docker system df`, `journalctl -t gitea-runner-cleanup`, and the cleanup beacon
              (gitea_runner_cleanup_build_cache_bytes / _disk_freed_percent).
        - alert: CIRunnerDiskWillFillSoon
          expr: |
            predict_linear(node_filesystem_avail_bytes{job="ci-runner-node",mountpoint="/"}[6h], 4 * 3600) < 0
          for: 15m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} root filesystem projected to fill within 4h"
            description: >-
              The 6h trend for runner {{ $labels.instance }} projects the root filesystem reaching 0
              free within 4h — early warning before jobs fail on ENOSPC. Check `docker system df` and
              whether gitea-runner-cleanup.sh is keeping up (its escalation tightens the retention
              window to 6h at 75% disk and to a 1h window + actcache trim at 92%, and now runs even
              while a job is in flight).
        # A runner this close to full is about to fail EVERY job at actions/checkout with ENOSPC
        # (`copy_file_range: no space left on device`) and become a job-blackhole reding whole runs —
        # the exact fleet-wide outage of 2026-07-11. CRITICAL (paging), unlike the 12% warning above,
        # with a short window so it escalates before the runner starts eating jobs. Since
        # gitea-runner-cleanup now runs its window-safe pressure/critical prune EVEN WHILE BUSY, a
        # runner reaching 5% means the cleanup is genuinely out-run or wedged — act, don't wait.
        - alert: CIRunnerDiskCritical
          expr: |
            node_filesystem_avail_bytes{job="ci-runner-node",mountpoint="/"}
              / node_filesystem_size_bytes{job="ci-runner-node",mountpoint="/"} < 0.05
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: "CI runner {{ $labels.instance }} root filesystem <5% free — ENOSPC/CI-outage imminent"
            description: >-
              Runner {{ $labels.instance }} root fs is <5% free for >5m. Near 0% every job dies at
              actions/checkout (`copy_file_range: no space left on device`) and the runner reds whole
              runs. Reclaim NOW on the VM: `docker image prune -af && docker builder prune -af`
              (reaches the containerd moby-ns image store); then check `journalctl -t gitea-runner-cleanup`
              for why the timer's pressure prune isn't keeping up.
        - alert: CIRunnerLowMemory
          expr: node_memory_MemAvailable_bytes{job="ci-runner-node"} < 1.5e9
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} low available memory (<1.5 GiB)"
            description: >-
              Runner {{ $labels.instance }} has <1.5 GiB MemAvailable for >10m — the #620 precursor
              (host RAM pressure ballooning the guest below its 12 GiB floor → OOM-killed jobs / exit
              137). Check host RAM on the owning Proxmox node and the balloon target
              (`qm config <vmid>` → balloon 12288).
        - alert: CIRunnerSwapPressure
          expr: |
            node_memory_SwapTotal_bytes{job="ci-runner-node"} > 0
              and (node_memory_SwapTotal_bytes{job="ci-runner-node"} - node_memory_SwapFree_bytes{job="ci-runner-node"})
                  / node_memory_SwapTotal_bytes{job="ci-runner-node"} > 0.5
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} using >50% of its swap"
            description: >-
              Runner {{ $labels.instance }} is >50% into its 8 GiB safety-valve swap for >10m (the
              second line of #620 defense after the 12 GiB balloon floor). Sustained swap means jobs
              are near OOM — check host RAM headroom on the owning Proxmox node.
        - alert: CIRunnerDockerConfigRootOwned
          expr: runner_docker_config_root_owned{job="ci-runner-node"} == 1
          for: 5m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} has root-owned ~/.docker after self-heal"
            description: >-
              The reclaim self-heal on runner {{ $labels.instance }} did NOT restore runner ownership
              of ~/.docker — the buildx-permission regression (root-owned ~/.docker/buildx) is back
              and docker-build jobs will fail. Inspect: `sudo ls -la /home/runner/.docker/buildx` and
              confirm runner-reclaim.sh runs as root (20-reclaim.conf ExecStartPre=+).
        # Is the gitea_runner maintenance running at all? Uses ABSENCE of the reclaim beacon (the gauge
        # persists once written, so this does NOT false-fire on idle runners). `for: 30m` rides over the
        # first-boot window before the first reclaim writes the beacon. Migrated off the retiring GitHub
        # agent's runner_reclaim_* (gone on ci-runner-3) to the gitea beacon present on all 5.
        - alert: CIRunnerMaintenanceBeaconMissing
          expr: up{job="ci-runner-node"} == 1 unless on(instance) gitea_runner_reclaim_last_run_seconds
          for: 30m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} gitea maintenance beacon missing"
            description: >-
              Runner {{ $labels.instance }} is scraped but emits no gitea_runner_reclaim_last_run_seconds
              — the gitea_runner maintenance (workspace reclaim + docker cleanup) isn't writing its beacon
              (the reclaim/cleanup timers aren't running, or node_exporter's textfile collector is off).
              Check `systemctl status gitea-runner-reclaim.timer gitea-runner-cleanup.timer` and
              --collector.textfile.directory.
        # The docker/storage cleanup timer is TIME-triggered (every 15m — even while a job runs it fires
        # and writes a busy_skip beacon), so unlike the job-cycle reclaim a staleness check is reliable
        # and won't flap on idle nights. A stalled cleanup means build cache + images accumulate unbounded.
        - alert: CIRunnerCleanupStale
          expr: |
            up{job="ci-runner-node"} == 1
              and (time() - gitea_runner_cleanup_last_run_seconds) > 3600
          for: 15m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} docker cleanup hasn't run in >1h"
            description: >-
              gitea-runner-cleanup.timer (15-min) has not written its beacon on runner
              {{ $labels.instance }} for >1h — docker/storage reclamation is stalled, so build cache +
              images will accumulate toward a full disk. Check `systemctl status gitea-runner-cleanup.timer`
              + `journalctl -t gitea-runner-cleanup`.
        # Build cache is the runners' dominant disk consumer (10-33 GB/runner observed). The cleanup
        # beacon reports the POST-cleanup resting size, so a value that stays high means the retention
        # prune isn't clearing it (CI out-running the window, or a wedged cleanup) — a heads-up before
        # CIRunnerDiskFilling. Post-cleanup (not a mid-run peak) so a spike that was immediately pruned
        # can't false-fire. Migrated off the (now-absent) GitHub runner_docker_build_cache_bytes.
        - alert: CIRunnerBuildCacheHigh
          expr: gitea_runner_cleanup_build_cache_bytes{job="ci-runner-node"} > 25e9
          for: 30m
          labels: { severity: warning }
          annotations:
            summary: "CI runner {{ $labels.instance }} docker build cache >25 GB after cleanup"
            description: >-
              Runner {{ $labels.instance }} build cache is >25 GB even after gitea-runner-cleanup.sh
              (post-cleanup value from its beacon) — the dominant disk accumulator isn't being cleared:
              CI is out-running the 24h retention (the pressure escalation should tighten it at 75% disk,
              even while busy) or the cleanup is wedged. Inspect `docker system df`, `docker builder du`, and
              `journalctl -t gitea-runner-cleanup`. CIRunnerDiskFilling/WillFillSoon backstop actual
              disk exhaustion.
