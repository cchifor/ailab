# Per-node storage-fabric health check (WS2 follow-up). A blackbox-exporter DaemonSet runs one probe
# pod per node; Prometheus scrapes each pod's /probe against the QNAP NFS(2049)+iSCSI(3260) ports, so
# probe traffic leaves via THAT node's /32 route + its Proxmox host's SNAT — the exact path CSI uses.
# This catches the failure mode where a host's TB route/SNAT drops: the node stays Ready but its CSI
# I/O hangs. A single (non-DaemonSet) blackbox would land on one node and miss per-host failures.
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-fabric-probe
  namespace: monitoring
data:
  blackbox.yml: |
    modules:
      tcp_connect:
        prober: tcp
        timeout: 5s
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: storage-fabric-probe
  namespace: monitoring
  labels:
    app.kubernetes.io/name: storage-fabric-probe
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storage-fabric-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storage-fabric-probe
    spec:
      priorityClassName: platform-critical # storage observability — survive pressure
      containers:
        - name: blackbox
          image: quay.io/prometheus/blackbox-exporter:v0.28.0 # quay (not Docker Hub)
          args: ["--config.file=/etc/blackbox/blackbox.yml", "--web.listen-address=:9115"]
          ports:
            - { name: http, containerPort: 9115 }
          readinessProbe:
            httpGet: { path: /-/healthy, port: http }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          volumeMounts:
            - { name: config, mountPath: /etc/blackbox, readOnly: true }
      volumes:
        - name: config
          configMap: { name: storage-fabric-probe }
