# ntfy — self-hosted push notifications (phone/desktop). Alertmanager routes every alert here
# (kube-prometheus-stack.yaml receiver `ntfy`); subscribe in the ntfy app to ntfy.chifor.me topic
# `ailab-alerts` (login as user `ailab`). Auth is deny-all + the seeded `ailab` admin user.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: monitoring
data:
  server.yml: |
    base-url: "https://ntfy.chifor.me"
    listen-http: ":80"
    behind-proxy: true
    auth-file: "/var/lib/ntfy/user.db"
    auth-default-access: "deny-all"
    cache-file: "/var/cache/ntfy/cache.db"
    cache-duration: "12h"
    attachment-cache-dir: "/var/cache/ntfy/attachments"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data-iscsi # renamed: storageClassName is immutable, so a new PVC forces the migration
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  # qnap-iscsi block (ext4, real POSIX locking) — SQLite-on-NFS is unsafe (matches gitea/grafana) and
  # nfs-csi has no Velero VolumeSnapshotClass so the old PVC was never backed up. Migration: Flux creates
  # this fresh PVC, the Recreate-strategy Deployment switches to it, and the `ailab` admin auto-reseeds
  # via the postStart hook.
  # ⚠️ Flux prunes the now-removed `ntfy-data` PVC on reconcile, and nfs-csi is reclaimPolicy:Delete, so
  #    its data IS destroyed (the admin reseed makes that acceptable). For a rollback fallback, annotate
  #    the LIVE old PVC `kustomize.toolkit.fluxcd.io/prune: disabled` BEFORE merging.
  storageClassName: qnap-iscsi
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.26.0
          args: ["serve"]
          ports:
            - { name: http, containerPort: 80 }
          env:
            - name: NTFY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ntfy-auth
                  key: password
          # The auth db only exists AFTER the server's first start, so seed the `ailab` admin user via
          # a postStart hook that waits for the db (idempotent), not an initContainer.
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      if ntfy user list >/dev/null 2>&1; then
                        if ! ntfy user list 2>/dev/null | grep -qw ailab; then
                          printf '%s\n%s\n' "$NTFY_ADMIN_PASSWORD" "$NTFY_ADMIN_PASSWORD" \
                            | ntfy user add --role=admin ailab \
                            || { echo 'ntfy postStart: user add failed' >&2; exit 1; }
                        fi
                        exit 0
                      fi
                      sleep 1
                    done
                    # Loop exhausted: db never appeared. Fail loudly so the pod restarts instead of
                    # coming up Ready with deny-all auth and silently 401-ing every Alertmanager webhook.
                    echo 'ntfy postStart: auth db never appeared in 60s; ailab admin not seeded' >&2
                    exit 1
          volumeMounts:
            - { name: config, mountPath: /etc/ntfy/server.yml, subPath: server.yml }
            - { name: data, mountPath: /var/lib/ntfy }
            - { name: cache, mountPath: /var/cache/ntfy }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data-iscsi
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: ntfy
  ports:
    - { name: http, port: 80, targetPort: http }
