# ntfy — self-hosted push notifications (phone/desktop). Alertmanager routes every alert here
# (kube-prometheus-stack.yaml receiver `ntfy`); subscribe in the ntfy app to ntfy.chifor.me topic
# `ailab-alerts` (login as user `ailab`). Auth is deny-all + the seeded `ailab` admin user.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: monitoring
data:
  server.yml: |
    base-url: "https://ntfy.chifor.me"
    listen-http: ":80"
    behind-proxy: true
    auth-file: "/var/lib/ntfy/user.db"
    auth-default-access: "deny-all"
    cache-file: "/var/cache/ntfy/cache.db"
    cache-duration: "12h"
    attachment-cache-dir: "/var/cache/ntfy/attachments"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-csi
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.25.0
          args: ["serve"]
          ports:
            - { name: http, containerPort: 80 }
          env:
            - name: NTFY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ntfy-auth
                  key: password
          # The auth db only exists AFTER the server's first start, so seed the `ailab` admin user via
          # a postStart hook that waits for the db (idempotent), not an initContainer.
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      if ntfy user list >/dev/null 2>&1; then
                        ntfy user list 2>/dev/null | grep -qw ailab || \
                          printf '%s\n%s\n' "$NTFY_ADMIN_PASSWORD" "$NTFY_ADMIN_PASSWORD" | ntfy user add --role=admin ailab
                        exit 0
                      fi
                      sleep 1
                    done
          volumeMounts:
            - { name: config, mountPath: /etc/ntfy/server.yml, subPath: server.yml }
            - { name: data, mountPath: /var/lib/ntfy }
            - { name: cache, mountPath: /var/cache/ntfy }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: ntfy
  ports:
    - { name: http, port: 80, targetPort: http }
