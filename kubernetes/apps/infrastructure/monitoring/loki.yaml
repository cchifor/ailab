apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: loki
      version: "7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h
        reject_old_samples: false
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: nfs-csi
        size: 20Gi
    # single-binary only -- disable the scalable/cache components
    read: { replicas: 0 }
    write: { replicas: 0 }
    backend: { replicas: 0 }
    chunksCache: { enabled: false }
    resultsCache: { enabled: false }
    lokiCanary: { enabled: false }
    test: { enabled: false }
    gateway: { enabled: false }
    minio: { enabled: false }
