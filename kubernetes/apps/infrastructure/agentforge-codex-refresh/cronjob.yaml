# The wrapper the CronJob runs. Kept in a ConfigMap (mounted read-only) so the CronJob container can stay
# on the orchestrator image with a hardened, readOnlyRootFilesystem securityContext. It is a pure-stdlib
# python3 script (urllib) that talks to the OpenBao REST API directly — the orchestrator image ships NO
# `bao`/`vault` CLI, and every other OpenBao interaction in this codebase is Python/REST, never a CLI.
# Flow:
#   1. k8s-auth login (POST v1/auth/kubernetes/login) with the pod's projected af-codex-refresher SA JWT;
#   2. read the CURRENT auth.json field + its KV-v2 version (GET v1/af/data/...), for the check-and-set;
#   3. agentforge-codex-refresh --skew-seconds 172800 (refresh only if <2d to access_token expiry);
#   4. if a NEW auth.json was emitted, CAS-write it back (POST with options.cas=<ver>);
#   5. stamp the C2 STATUS RECORD as KV custom metadata on the same path:
#      {credential_version, expires_at, last_refresh, outcome, last_checked} — sanitized (a version
#      number + timestamps derived from the JWT exp, NEVER token material). The CP status surface
#      reads METADATA only; it treats record.credential_version != current KV version as
#      UNKNOWN/PENDING, so the stamp always names the exact version it describes.
# refresh_tokens are SINGLE-USE/rotated, so reading the FRESHEST value and CAS-writing (concurrencyPolicy
# Forbid + cas=<ver>) is what prevents a stale overwrite / a lost rotation.
apiVersion: v1
kind: ConfigMap
metadata:
  name: af-codex-refresh-script
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: af-codex-refresher
    app.kubernetes.io/component: codex-refresh
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
data:
  refresh.py: |
    #!/usr/bin/env python3
    """codex-refresh wrapper — pure-stdlib OpenBao REST client (no `bao`/`vault` CLI, no hvac needed).

    Fail CLOSED: any step (login, read, refresh, CAS-write, status stamp) that errors aborts the run
    non-zero and NEVER prints token/secret material. A failure AFTER a successful CAS write is safe
    to retry (backoffLimit): the retry run sees the fresh token, takes the no-op path, and re-stamps
    the status record at the same credential_version — the record self-heals.
    """
    import base64
    import binascii
    import datetime
    import json
    import os
    import ssl
    import subprocess
    import sys
    import urllib.error
    import urllib.request

    BAO_ADDR = os.environ.get("BAO_ADDR", "https://openbao.openbao.svc:8200")
    CA_CERT = os.environ.get("BAO_CACERT", "/tls/ca.crt")
    ROLE = "af-codex-refresher"
    KV_MOUNT = "af"
    KV_KEY = "operator/broker/openai/codex-pro/oauth"
    # NB: the KV field is `auth.json` — it MUST match the broker-openai-codex-oauth ExternalSecret's
    # remoteRef property (the broker mounts that field verbatim).
    FIELD = "auth.json"
    SA_TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"

    _CTX = ssl.create_default_context(cafile=CA_CERT)


    def _api(method, path, token=None, body=None):
        data = json.dumps(body).encode() if body is not None else None
        req = urllib.request.Request(f"{BAO_ADDR}/v1/{path}", data=data, method=method)
        req.add_header("Content-Type", "application/json")
        if token:
            req.add_header("X-Vault-Token", token)
        with urllib.request.urlopen(req, context=_CTX, timeout=30) as resp:
            raw = resp.read()
        return json.loads(raw) if raw else {}


    def _iso_z(dt):
        return dt.astimezone(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")


    def _jwt_exp_iso(access_token):
        """ISO-8601 UTC of the access_token JWT `exp` claim (payload decode only, no verify).

        Same decode the refresh CLI's needs_refresh does, so by the time we stamp, a malformed
        JWT would already have failed the run. Fails CLOSED (ValueError) rather than stamping a
        blank/undefined expiry — the record's expires_at is what the CP shows operators.
        """
        try:
            seg = access_token.split(".")[1]
            payload = json.loads(base64.urlsafe_b64decode(seg + "=" * (-len(seg) % 4)))
            exp = int(payload["exp"])
        except (IndexError, KeyError, ValueError, binascii.Error, json.JSONDecodeError):
            raise ValueError("access_token JWT has no decodable exp claim") from None
        return _iso_z(datetime.datetime.fromtimestamp(exp, tz=datetime.timezone.utc))


    def _norm_ts(value):
        """Strictly parse a timestamp and RE-EMIT it normalized — never pass a raw string through.

        auth.json is SECRET data; custom metadata is a lower-trust display surface, so nothing may
        flow between them un-reconstructed (a malformed auth.json must not be able to declassify
        arbitrary bytes). Absent/unparsable => "" (the record stays honest, the run keeps going).
        """
        try:
            s = str(value).strip()
            if not s:
                return ""
            return _iso_z(datetime.datetime.fromisoformat(s.replace("Z", "+00:00")))
        except ValueError:
            return ""


    def _status_record(auth_doc, credential_version, outcome):
        """Build the C2 status record — SANITIZED by construction, and BUILT BEFORE any write.

        Every field is reconstructed, never copied raw: a KV version number, the expiry re-derived
        from the JWT exp claim (raises ValueError on a non-decodable token — the caller decides
        what that means per arm), last_refresh strictly re-parsed as a timestamp, an outcome word,
        and a fresh last_checked stamp. Token material can never reach the record.
        """
        return {
            "credential_version": str(credential_version),
            "expires_at": _jwt_exp_iso(auth_doc["tokens"]["access_token"]),
            "last_refresh": _norm_ts(auth_doc.get("last_refresh", "")),
            "outcome": outcome,
            "last_checked": _iso_z(datetime.datetime.now(datetime.timezone.utc)),
        }


    def _stamp_status(token, record):
        """(5) Write the pre-built C2 record as CUSTOM METADATA on the oauth path (fail closed).

        POST v1/af/metadata/... replaces the custom_metadata map wholesale, so the record is
        always internally consistent; cas_required (a settings field) is untouched because the
        request carries ONLY custom_metadata. Requires create/update on the metadata path — part
        of the af-codex-refresher role since the Stage-0 provisioner change.
        """
        _api(
            "POST",
            f"{KV_MOUNT}/metadata/{KV_KEY}",
            token=token,
            body={"custom_metadata": record},
        )
        print(
            f"status record stamped (version {record['credential_version']}, "
            f"outcome {record['outcome']}, expires_at {record['expires_at']})"
        )


    def main():
        # (1) Authenticate as the projected af-codex-refresher SA token under the af-codex-refresher role.
        with open(SA_TOKEN_PATH, encoding="utf-8") as fh:
            jwt = fh.read().strip()
        login = _api("POST", "auth/kubernetes/login", body={"role": ROLE, "jwt": jwt})
        token = login["auth"]["client_token"]

        # (2) Read the current auth.json + its KV-v2 version (for the check-and-set).
        read = _api("GET", f"{KV_MOUNT}/data/{KV_KEY}", token=token)
        current = read["data"]["data"][FIELD]
        version = read["data"]["metadata"]["version"]
        with open("/work/in.json", "w", encoding="utf-8") as fh:
            fh.write(current)

        # (3) Refresh (file-in/file-out, atomic). --skew-seconds 172800 => refresh iff <2 days to expiry;
        #     the CLI writes /work/out.json ONLY when it actually rotated, so a still-fresh token is a
        #     clean no-op. Clear any stale out.json first so step (4)'s existence check is meaningful.
        try:
            os.remove("/work/out.json")
        except FileNotFoundError:
            pass
        subprocess.run(
            [
                "agentforge-codex-refresh",
                "--in", "/work/in.json",
                "--out", "/work/out.json",
                "--skew-seconds", "172800",
            ],
            check=True,
        )

        # (4) CAS-write the rotated auth.json back at the EXACT version read in (2). A racing writer bumps
        #     the version and the cas put FAILS (fail closed) rather than clobbering a newer rotation.
        #     (Since Stage 0 the key carries cas_required=true, so a cas-less write is impossible anyway.)
        # (5) then stamp the C2 status record — ALWAYS, on both arms, so last_checked/outcome move every
        #     run while credential_version keeps naming the version actually in OpenBao: <ver>+1 after a
        #     rotation (a successful cas=<ver> put lands exactly there), <ver> untouched on the no-op arm
        #     (last_refresh likewise stays auth.json's own prior stamp — semantics unchanged by a check).
        #     The record is BUILT (incl. the JWT exp decode) BEFORE the CAS write, so a malformed rotated
        #     token is detected pre-persist. It is still persisted: out.json holds the freshly ROTATED
        #     single-use refresh_token, and dropping it would strand the account into a manual browser
        #     re-auth — a strictly worse failure than a stored-but-unusable access token. The run then
        #     exits non-zero WITHOUT stamping, so the record keeps naming the old version and the CP
        #     status surface shows UNKNOWN/PENDING (version mismatch) until an operator intervenes.
        if os.path.exists("/work/out.json") and os.path.getsize("/work/out.json") > 0:
            with open("/work/out.json", encoding="utf-8") as fh:
                rotated = fh.read()
            try:
                record = _status_record(json.loads(rotated), version + 1, "rotated")
            except ValueError:
                record = None  # malformed exp in the ROTATED token — persist anyway, then fail
            _api(
                "POST",
                f"{KV_MOUNT}/data/{KV_KEY}",
                token=token,
                body={"options": {"cas": version}, "data": {FIELD: rotated}},
            )
            print(f"codex {FIELD} rotated + CAS-written (version {version} -> {version + 1})")
            if record is None:
                print(
                    "codex-refresh FAILED: rotated access_token has no decodable exp; "
                    "rotation persisted (single-use refresh_token), status NOT stamped",
                    file=sys.stderr,
                )
                sys.exit(1)
            _stamp_status(token, record)
        else:
            print(f"codex {FIELD} still fresh (> skew); no refresh performed")
            _stamp_status(token, _status_record(json.loads(current), version, "fresh"))


    if __name__ == "__main__":
        try:
            main()
        except urllib.error.HTTPError as exc:
            # Surface the status (401 auth/policy, 403 denied, 400 cas-mismatch) WITHOUT the response body
            # (which can echo request material).
            print(f"codex-refresh FAILED: HTTP {exc.code} {exc.reason}", file=sys.stderr)
            sys.exit(1)
        except Exception as exc:
            print(f"codex-refresh FAILED: {type(exc).__name__}", file=sys.stderr)
            sys.exit(1)
---
# Nightly codex OAuth refresh. concurrencyPolicy Forbid is LOAD-BEARING: refresh_tokens are single-use, so
# two overlapping runs could each consume a different generation and desync the stored auth.json — Forbid +
# the KV check-and-set guarantee a single serialized rotation. startingDeadlineSeconds 300 skips a run that
# could not start within 5m (rather than piling up missed runs); the tight activeDeadlineSeconds 120 +
# backoffLimit 2 keep a wedged run from lingering.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: af-codex-refresh
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: af-codex-refresher
    app.kubernetes.io/component: codex-refresh
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  schedule: "0 3 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: af-codex-refresher
            app.kubernetes.io/component: codex-refresh
            app.kubernetes.io/part-of: agentforge
        spec:
          serviceAccountName: af-codex-refresher
          # The token is REQUIRED here (unlike the broker runtime SA): the k8s-auth login reads the
          # projected SA JWT (at the standard mount path) to authenticate to OpenBao.
          automountServiceAccountToken: true
          enableServiceLinks: false
          restartPolicy: Never
          # Co-schedule on the dedicated agent pool alongside the broker it serves.
          nodeSelector:
            ailab.io/agent-pool: "true"
          tolerations:
            - { key: dedicated, operator: Equal, value: agent, effect: NoSchedule }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532            # so the mounted openbao-tls ca.crt is group-readable by uid 65532
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: refresh
              # SAME orchestrator image as the broker (carries agentforge-codex-refresh + python3). Pinned
              # by digest for parity with broker-openai-codex.yaml / the bootstrap Jobs.
              # 2026-07-21: was 20e55c58, which PREDATES the agentforge-codex-refresh console script — the
              # binary is simply absent from it, so refresh.py's subprocess.run() died with FileNotFoundError
              # on every run (surfaced only as "codex-refresh FAILED: FileNotFoundError" because the wrapper
              # redacts to the exception TYPE). The comment above already claimed broker parity, but the
              # digest had drifted away from it. Repinned to the broker digest, restoring the stated
              # invariant. Verified in-cluster: 8c379d6a has /app/.venv/bin/agentforge-codex-refresh AND
              # python3; 20e55c58 has only agentforge + agentforge-bootstrap.
              image: registry.chifor.me/agentforge/orchestrator@sha256:8c379d6a79ef358b9705431a732ed4dc33ce09a38b5922a1ee3c54f0efff3b73
              command: ["python3", "/scripts/refresh.py"]
              volumeMounts:
                - { name: work, mountPath: /work }
                - { name: tls, mountPath: /tls, readOnly: true }
                - { name: script, mountPath: /scripts, readOnly: true }
              resources:
                requests: { cpu: 25m, memory: 64Mi, ephemeral-storage: 16Mi }
                limits: { cpu: 500m, memory: 256Mi, ephemeral-storage: 64Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                seccompProfile: { type: RuntimeDefault }
          volumes:
            # in-memory scratch: the plaintext auth.json (in + rotated out) NEVER touches a disk-backed volume.
            - name: work
              emptyDir:
                medium: Memory
                sizeLimit: 16Mi
            - name: tls
              secret:
                secretName: openbao-tls   # ns-local ailab-ca ca.crt, provisioned by the agentforge-broker tree
                items:
                  - { key: ca.crt, path: ca.crt }
            - name: script
              configMap:
                name: af-codex-refresh-script
                defaultMode: 0555
