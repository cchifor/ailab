# The codex-refresh CronJob's identity. It authenticates to OpenBao via the kubernetes-auth method using
# THIS SA's projected token (role af-codex-refresher is bound to exactly this SA + namespace), so the
# token MUST be automounted on the CronJob pod (unlike the broker runtime SA, which has automount off and
# no OpenBao reach). It holds ZERO kube-apiserver RBAC — no Role/RoleBinding — its only privilege is the
# OpenBao role, whose policy is narrowly scoped to the single codex-pro oauth KV path.
#
# The bound OpenBao role/policy (af-codex-refresher) is created by the agentforge provisioner bootstrap at
# provision time (DEFAULT_OPERATOR_ROLES in src/agentforge/provisioner/bootstrap.py), NOT from this repo.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-codex-refresher
  namespace: agentforge-broker
  labels:
    app.kubernetes.io/name: af-codex-refresher
    app.kubernetes.io/component: codex-refresh
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
