# tenant-zero worker ESO auth (plan §BUG) — the missing half of the worker credential path. The
# worker Deployment (worker-deployment.yaml) envFrom's the Secret `af-creds-playground-planner`, but the
# CP-rendered tenant namespace `af-tenant-tenant-zero-playground` shipped WITHOUT any ESO to materialize it,
# so the worker could never receive AF_CAPABILITY_SIGNING_KEY (+ forge PATs/HMAC/litellm key) from OpenBao
# `af/data/tenants/tenant-zero/playground/orchestrator`. This file adds the per-workspace eso-auth SA + the
# namespaced OpenBao SecretStore; worker-externalsecret.yaml adds the ExternalSecret that fills the Secret.
#
# Shape is the EXACT one the CP renderer emits (agentforge-platform gitops/renderer.py §eso-auth SA +
# namespaced SecretStore): a dedicated per-workspace eso-auth SA (eso_auth_sa_prefix `af-eso-` + workspace
# slug `playground` => `af-eso-playground`), and a NAMESPACED SecretStore (name == the eso-auth SA) using
# OpenBao/vault kubernetes auth under the per-tenant role `af-tenant-tenant-zero-playground` (openbao_role =
# `af-tenant` + `-tenant-zero` + `-playground`), KV v2 mount `af`. The TLS bits mirror the live operator
# broker/dispatcher SecretStores (secretstore.yaml / dispatcher-externalsecret.yaml).
#
# ⚠ ACTIVATION: the OpenBao role `af-tenant-tenant-zero-playground` (bound to ns
# af-tenant-tenant-zero-playground + SA af-eso-playground) is OPERATOR/PROVISIONER-owned — a SIBLING PR wires
# the isolated OpenBao provisioner to create it + the KV subtree at
# `af/data/tenants/tenant-zero/playground/orchestrator`. Until then the ExternalSecret reports NotReady
# (harmless: the worker Deployment is scaled-to-zero via KEDA and the Flux Kustomization is wait:false).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-eso-playground
  namespace: af-tenant-tenant-zero-playground
  labels:
    app.kubernetes.io/name: agentforge-worker
    app.kubernetes.io/component: eso-auth
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
# ESO mints a short-TTL token for this SA (TokenRequest); no pod runs as it, so keep its token unmounted.
# OpenBao's `af-tenant-tenant-zero-playground` role is bound to exactly this ns + SA.
automountServiceAccountToken: false
---
# Namespaced SecretStore (NOT ClusterSecretStore) — OpenBao/vault via kubernetes auth, authenticating as the
# af-eso-playground SA under the per-tenant role. KV v2 mount `af`. The tenant role is scoped to
# `af/data/tenants/tenant-zero/playground/*`, which cannot name any `af/data/operator/*` key (the R-2
# reserved-prefix split), so this store can read ONLY this workspace's own subtree.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: af-eso-playground
  namespace: af-tenant-tenant-zero-playground
  labels:
    app.kubernetes.io/name: agentforge-worker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: "af"        # KV v2 mount
      version: "v2"
      # caProvider sweep — verify OpenBao's cert-manager TLS cert (openbao-tls, ailab-ca) instead of failing
      # TLS. NOTE: a NAMESPACED SecretStore resolves caProvider IN ITS OWN namespace
      # (af-tenant-tenant-zero-playground) — ESO ignores a cross-ns `namespace:` here — so Secret
      # `openbao-tls` (ca.crt) MUST be present in THIS namespace. worker-openbao-ca-cert.yaml issues it via a
      # per-ns cert-manager Certificate off the ailab-ca ClusterIssuer (mirrors the broker openbao-ca-cert).
      caProvider:
        type: Secret
        name: openbao-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "af-tenant-tenant-zero-playground"   # per-tenant; bound to this ns + af-eso-playground SA
          serviceAccountRef:
            name: af-eso-playground
