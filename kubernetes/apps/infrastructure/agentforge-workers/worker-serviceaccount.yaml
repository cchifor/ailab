# The per-pool orchestrator ServiceAccount the worker Deployment runs as. Referenced by
# worker-deployment.yaml (serviceAccountName) AND by the cross-ns RoleBinding subject in
# agentforge-sandbox/orchestrator-rbac.yaml (agentforge-orchestrator-sandbox). It was previously
# ASSUMED to exist ("do NOT create a new one") but was never rendered here, so the ReplicaSet got
# `serviceaccount "af-orch-playground-planner" not found` and no pod was ever created. The token IS
# mounted (default automount) because the orchestrator creates/reaps the sandbox Kata Jobs + Leases
# via the k8s API using this SA's RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-orch-playground-planner
  namespace: af-tenant-tenant-zero-playground
  labels:
    app.kubernetes.io/part-of: agentforge
    app.kubernetes.io/component: orchestrator
    agentforge.io/org: tenant-zero
    agentforge.io/workspace: playground
    agentforge.io/pool: planner
