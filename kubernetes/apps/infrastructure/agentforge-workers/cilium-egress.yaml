# Per-worker Cilium egress boundary (plan §4) — the ORCHESTRATOR process's COMPLETE allowed egress. Cilium
# is the CNI; selecting the worker endpoint for egress puts it into egress default-deny, so this is the
# whole allow-list. It selects ONLY the orchestrator pod (by pool label), mirroring the sandbox
# cilium-egress.yaml structure.
#
# The orchestrator ONLY (a) reaches the FORGE (in-cluster Gitea — config fetch + issue/PR ops), (b) reaches
# the kube-apiserver to create/watch sandbox Jobs, read pod logs, and CAS the owner-lease, and (c) resolves
# DNS. It does NOT talk to OpenBao/ESO (that sync is controller-side), and NOT directly to the broker/
# litellm — the SANDBOX JOBS are the broker/litellm clients (their egress is locked by the Wave B-ii
# sandbox CNP); the orchestrator only stages the capability + creates the Job. world/metadata/IPv6 denied.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: agentforge-orchestrator-egress
  namespace: af-tenant-tenant-zero-playground
  labels:
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: agentforge-orchestrator
      agentforge.io/pool: planner
  egress:
    # (1) DNS -> kube-dns (resolve the in-cluster Gitea service name; the apiserver path uses
    #     KUBERNETES_SERVICE_HOST by IP, but DNS is cheap defense-in-depth).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    # (2) kube-apiserver — the Talos control-plane VIP; Cilium resolves the `kube-apiserver` entity.
    #     REQUIRED to create/watch sandbox Jobs, read pod logs, and CAS the coordination.k8s.io Lease
    #     (safe under the narrow cross-ns Jobs-only RBAC in agentforge-sandbox/orchestrator-rbac.yaml).
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
    # (3) the FORGE — in-cluster Gitea (gitea-http.gitea.svc:3000). Matched by ENDPOINT identity so the
    #     world/private-range egressDeny below never blocks it. NO public git.chifor.me / FQDN egress.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gitea
            app.kubernetes.io/name: gitea
      toPorts:
        - ports:
            - { port: "3000", protocol: TCP }
  egressDeny:
    # No direct internet / node-local / metadata-via-node. Pod-to-pod (gitea/kube-dns) + the apiserver
    # entity are identity-based, so these never block (1)/(2)/(3). Mirrors the sandbox agent egressDeny.
    - toEntities:
        - world
        - host
        - remote-node
    # metadata (169.254.169.254), link-local, and ALL IPv6 — explicit direct-IP belt.
    - toCIDR:
        - 169.254.169.254/32
        - 169.254.0.0/16
        - ::/0
