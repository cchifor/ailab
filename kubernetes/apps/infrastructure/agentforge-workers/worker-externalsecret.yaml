# tenant-zero worker credential (plan §BUG) — materializes the Secret `af-creds-playground-planner` the
# worker Deployment (worker-deployment.yaml) consumes via envFrom. dataFrom.extract pulls the WHOLE
# orchestrator subtree `af/data/tenants/tenant-zero/playground/orchestrator`, so the forge PATs/HMAC/git-push
# token/litellm key PLUS the orchestrator-only AF_CAPABILITY_SIGNING_KEY + AF_CAPABILITY_KID all surface as
# Secret keys automatically once provisioned (the private signing key stays orchestrator-side — NEVER a
# sandbox Job). Synced via the namespaced af-eso-playground SecretStore (worker-secretstore.yaml).
#
# Shape is the EXACT one the CP renderer emits (agentforge-platform gitops/renderer.py §ExternalSecret):
# creds_secret_name = `af-creds-<workspace>-<pool>` = af-creds-playground-planner; secretStoreRef the
# per-workspace SecretStore; dataFrom.extract key openbao_orchestrator_key = tenants/<org>/<workspace>/
# orchestrator. Reconciled by the ESO CONTROLLER (out-of-band); the worker only READS the mounted env.
#
# ⚠ ACTIVATION: NotReady until the sibling provisioner PR creates the OpenBao role
# `af-tenant-tenant-zero-playground` + the KV data at `af/data/tenants/tenant-zero/playground/orchestrator`
# (harmless: the worker Deployment is KEDA scaled-to-zero + the Flux Kustomization is wait:false).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: af-creds-playground-planner
  namespace: af-tenant-tenant-zero-playground
  labels:
    app.kubernetes.io/name: agentforge-worker
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: af-eso-playground
    kind: SecretStore
  target:
    name: af-creds-playground-planner
    creationPolicy: Owner
  dataFrom:
    # extract the WHOLE orchestrator subtree -> every KV key becomes a Secret key (forge PATs/HMAC/litellm
    # key + AF_CAPABILITY_SIGNING_KEY + AF_CAPABILITY_KID). Orchestrator-only; NEVER delivered to a sandbox.
    - extract:
        key: tenants/tenant-zero/playground/orchestrator
