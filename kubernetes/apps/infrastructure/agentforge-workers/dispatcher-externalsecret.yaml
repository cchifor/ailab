# af-dispatcher forge credential (plan §1) — the dispatcher's ONLY secret: a READ-ONLY forge PAT so
# GiteaClient(bot_tokens()) can list open issues for the forge_pending scale oracle. Delivered as
# AF_BOT_TOKEN_PLANNER into the `agentforge-dispatcher-forge` Secret the Deployment consumes via envFrom.
#
# ESO-synced (READ-ONLY to the dispatcher) from a DISTINCT operator OpenBao path
# `af/data/operator/dispatcher/forge` behind an operator-owned SecretStore/role (`af-operator-dispatcher`)
# that NO tenant/broker/reaper role can read. This carries a forge PAT ONLY — by construction it can never
# hold AF_CAPABILITY_* signing material, sandbox, or broker creds (a disjoint operator KV subtree). Mirrors
# the reaper-ledger.yaml operator-ESO pattern (dedicated eso-auth SA + namespaced vault SecretStore).
#
# ⚠ ACTIVATION: the operator provisions the OpenBao role `af-operator-dispatcher` (bound to ns agentforge +
# SA af-dispatcher-eso) + the KV data at `af/data/operator/dispatcher/forge` (key AF_BOT_TOKEN_PLANNER =
# a READ-ONLY issues:read PAT). NotReady until then (harmless: the dispatcher Deployment is gated + the
# Flux Kustomization is wait:false).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-dispatcher-eso
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-dispatcher
    app.kubernetes.io/component: eso-auth
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
# ESO mints a short-TTL token for this SA (TokenRequest); no pod runs as it, so keep its token unmounted.
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: agentforge-dispatcher-store
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-dispatcher
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: "af"        # KV v2 mount
      version: "v2"
      # caProvider sweep (plan §B): verify OpenBao's cert-manager TLS cert (openbao-tls, ailab-ca). NOTE: a
      # NAMESPACED SecretStore resolves caProvider IN ITS OWN namespace (agentforge) — ESO ignores a cross-ns
      # `namespace:` — so Secret `openbao-tls` (ca.crt) MUST be present in THIS namespace (per-ns cert-manager
      # Certificate or trust-manager). Until then NotReady (harmless: dispatcher gated + wait:false).
      caProvider:
        type: Secret
        name: openbao-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "af-operator-dispatcher"   # operator-fixed; disjoint from the broker + tenant + reaper roles
          serviceAccountRef:
            name: af-dispatcher-eso
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentforge-dispatcher-forge
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-dispatcher
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: agentforge-dispatcher-store
    kind: SecretStore
  target:
    name: agentforge-dispatcher-forge
    creationPolicy: Owner
  data:
    # the READ-ONLY forge PAT -> AF_BOT_TOKEN_PLANNER (issues:read only). NO capability/sandbox/broker keys.
    - secretKey: AF_BOT_TOKEN_PLANNER
      remoteRef:
        key: operator/dispatcher/forge
        property: AF_BOT_TOKEN_PLANNER
