# The dispatcher's runtime ServiceAccount — automount OFF and NO Role bound anywhere, so it has ZERO
# kube-apiserver access (the dispatcher is a read-only forge poller; it never touches the k8s API). The
# forge PAT arrives via the ESO-synced Secret (dispatcher-externalsecret.yaml), not this SA's token.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentforge-dispatcher
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-dispatcher
    app.kubernetes.io/component: dispatcher
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
automountServiceAccountToken: false
