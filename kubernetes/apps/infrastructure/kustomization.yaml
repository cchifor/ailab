apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Infrastructure layer (sync wave before apps): CSI, observability, then cert-manager,
# ingress, cloudflared, tailscale. Populated per sub-phase.
resources:
  - core # PriorityClasses first — workloads below reference them
  - sources
  - cert-manager # TLS cert automation (ClusterIssuers applied separately via clusters/ai/cert-manager-config.yaml)
  - storage
  - monitoring
  - observability # OTLP metrics collector (alloy-otlp) for the strive platform — remote-writes into monitoring's Prometheus
  - security # Trivy Operator (vulnerability + misconfig scanning)
