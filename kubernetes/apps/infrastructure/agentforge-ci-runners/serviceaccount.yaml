# The TOKENLESS identity every CI runner pod runs as (pinned by ci-guard.yaml validation 2). It has NO
# RoleBinding of its own anywhere — a CI runner must never talk to the kube-apiserver.
# automountServiceAccountToken:false here AND on the pod (VAP-pinned) means no projected token volume is
# ever injected, so arbitrary repo CI + the privileged dind get ZERO cluster-API reach. The runner's
# only credential is the reg-token file (ESO-synced, mounted read-only into `runner` alone).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentforge-ci-runner
  namespace: agentforge-ci
  labels:
    app.kubernetes.io/name: agentforge-ci-runner
    app.kubernetes.io/component: ci-runner
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
automountServiceAccountToken: false
