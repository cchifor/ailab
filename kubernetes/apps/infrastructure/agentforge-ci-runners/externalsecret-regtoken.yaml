# CI runner registration token (plan §B) — the ONLY credential a CI runner pod carries: the gitea org
# runner-registration token that `act_runner register` consumes to enroll the ephemeral runner. Delivered
# as a FILE-mounted Secret into the `runner` container ALONE (never `dind` — ci-guard.yaml pins this).
#
# ESO-synced (READ-ONLY to the runner) from a DISTINCT operator OpenBao path
# `af/data/operator/ci/runner-registration` behind an operator-owned SecretStore/role (`af-operator-ci`)
# that NO tenant/broker/dispatcher/reaper role can read (the reserved `operator/*` prefix — a tenant role
# is scoped to `af/data/tenants/<org>/<workspace>/*` and cannot name any `af/data/operator/*` key). This
# carries the runner-registration token ONLY — a disjoint operator KV subtree. Mirrors the
# externalsecret-oauth.yaml / dispatcher-externalsecret.yaml operator-ESO shape (dedicated eso-auth SA +
# namespaced vault SecretStore).
#
# ⚠ PREFLIGHT #3 (activation): a plain gitea registration token is REUSABLE until reset. Prefer a startup
# wrapper that MINTS a fresh SINGLE-USE token via the admin/runner API if available; the per-workflow
# GITEA_TOKEN the job receives is gitea-issued (do NOT add any PAT to the runner pod). The reg token is
# the ONLY secret here and never reaches a job/dind container.
#
# ⚠ ACTIVATION: the operator provisions the OpenBao role `af-operator-ci` (bound to ns agentforge-ci + SA
# af-ci-eso) + the KV data at `af/data/operator/ci/runner-registration` (key `token` = the org runner
# token from git.chifor.me/org/<org>/settings/actions/runners). NotReady until then (harmless: the
# ScaledJob is gated + PAUSED and the Flux Kustomization is wait:false).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-ci-eso
  namespace: agentforge-ci
  labels:
    app.kubernetes.io/name: agentforge-ci-runner
    app.kubernetes.io/component: eso-auth
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
# ESO mints a short-TTL token for this SA (TokenRequest); no pod runs as it, so keep its token unmounted.
automountServiceAccountToken: false
---
# Operator-owned namespaced SecretStore (NOT ClusterSecretStore) — OpenBao/vault via kubernetes auth,
# authenticating as af-ci-eso under the OPERATOR-FIXED role. Same provider shape as the tenant SecretStore
# but a DISJOINT role/path the tenant policy can never reach.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: agentforge-ci-store
  namespace: agentforge-ci
  labels:
    app.kubernetes.io/name: agentforge-ci-runner
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: "af"        # KV v2 mount
      version: "v2"
      # caProvider sweep (plan §B): verify OpenBao's cert-manager TLS cert (openbao-tls, ailab-ca). NOTE: a
      # NAMESPACED SecretStore resolves caProvider IN ITS OWN namespace (agentforge-ci) — ESO ignores a
      # cross-ns `namespace:` — so Secret `openbao-tls` (ca.crt) MUST be present in THIS namespace
      # (per-ns cert-manager Certificate or trust-manager). Until then NotReady (harmless: gated + wait:false).
      caProvider:
        type: Secret
        name: openbao-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "af-operator-ci"   # operator-fixed; disjoint from broker/dispatcher/tenant/reaper roles
          serviceAccountRef:
            name: af-ci-eso
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ci-runner-registration
  namespace: agentforge-ci
  labels:
    app.kubernetes.io/name: agentforge-ci-runner
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: agentforge-ci-store
    kind: SecretStore
  target:
    # This is the Secret the ci-guard-pinned 'reg-token' volume mounts (secretName ci-runner-registration),
    # read-only, into the `runner` container ONLY.
    name: ci-runner-registration
    creationPolicy: Owner
  data:
    # the gitea org runner-registration token -> file key `token`. NO PAT / capability / broker keys.
    - secretKey: token
      remoteRef:
        key: operator/ci/runner-registration
        property: token
