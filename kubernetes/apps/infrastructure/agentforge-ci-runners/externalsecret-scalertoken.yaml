# CI SCALE-trigger token (codex Phase B #4) — the KEDA forgejo-runner scaler's gitea token: a READ-ONLY
# credential scoped to the MINIMUM needed for queued-job visibility (PREFLIGHT #1). Consumed by the
# scaledjob.yaml TriggerAuthentication `agentforge-ci-scaler-auth` (KEDA reads it; NO pod mounts it — in
# particular it NEVER reaches a runner/dind container).
#
# ESO-synced from a DISJOINT operator OpenBao path `af/data/operator/ci/scaler-token` — a DIFFERENT key
# from the runner-registration token (`operator/ci/runner-registration`), so the scaler's query token and
# the runner's registration token cannot be conflated. Reuses the operator-owned eso-auth SA (af-ci-eso) +
# SecretStore (agentforge-ci-store, role af-operator-ci) defined in externalsecret-regtoken.yaml — that
# role reads `operator/ci/*`, which covers both keys and is unreachable by any tenant role.
#
# LISTED in kustomization.yaml (unlike the gated ScaledJob) so the target Secret EXISTS at activation and
# KEDA auth does not fail when the ScaledJob is un-gated. NotReady until the operator provisions OpenBao —
# harmless: nothing consumes it while the ScaledJob/TriggerAuthentication are gated, and the Flux
# Kustomization is wait:false.
#
# ⚠ ACTIVATION: the operator provisions the KV data at `af/data/operator/ci/scaler-token` (key `token` =
# a READ-ONLY, queued-job-visibility-scoped gitea token, DISJOINT from the reg/admin-write creds).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentforge-ci-scaler-token
  namespace: agentforge-ci
  labels:
    app.kubernetes.io/name: agentforge-ci-runner
    app.kubernetes.io/component: keda-scaler-auth
    app.kubernetes.io/managed-by: agentforge-operator
    app.kubernetes.io/part-of: agentforge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: agentforge-ci-store   # reuses the operator SecretStore from externalsecret-regtoken.yaml
    kind: SecretStore
  target:
    # The Secret the scaledjob.yaml TriggerAuthentication reads (secretTargetRef key `token`).
    name: agentforge-ci-scaler-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: operator/ci/scaler-token
        property: token
