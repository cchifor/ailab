# infra-pg — shared 2-instance CloudNativePG cluster for the platform's own stateful apps
# (ADR 0016 Tier A). Hosts the `grafana`, `authelia`, and `openwebui` databases so those apps can shed
# their SQLite singletons and run 2 replicas. (open-webui also uses pgvector here for RAG.)
#
# Operator: cnpg-system (v1.24.x), installed by the external cchifor/platform repo — consumed
# dependency, documented in ADR 0016. Notes pinned to operator 1.24:
#   - No `Database` CRD yet (CNPG >=1.25), so the second database is created via initdb postInitSQL
#     (runs ONCE at first bootstrap, as superuser). On an already-bootstrapped cluster, create the
#     role/DB manually before pointing an app at it.
#   - The operator auto-creates the primary PDB (`infra-pg-primary`, allowed-disruptions 0 — BY
#     DESIGN: it relocates the primary via switchover ahead of a drain; see
#     docs/runbooks/node-maintenance.md). A replicas PDB only appears at instances >= 3.
#   - `managed.roles` reconciles the authelia password from its secret AFTER bootstrap (seconds).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: infra-pg
  namespace: databases
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10
  primaryUpdateStrategy: unsupervised
  priorityClassName: platform-critical
  storage:
    # 5Gi -> 10Gi for the AgentForge v2 platform DB (ADR 0019). Live expansion is safe: qnap-iscsi
    # has allowVolumeExpansion=true (verified live 2026-07-11). CNPG expands the instance PVCs in
    # place; shrinking is impossible.
    size: 10Gi
    storageClass: qnap-iscsi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    # req=lim on memory (predictable QoS). No cpu limit — and the databases LimitRange deliberately
    # sets no default cpu LIMIT either (LimitRange defaulting is per-resource: it would silently
    # inject one into any container omitting it, as strive-ailab's LimitRange does to strive-pg today).
    limits: { memory: 512Mi }
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    # `required` (vs strive-pg's `preferred`): 2 pods on 3 nodes is still satisfiable with one node
    # down, and colocating primary+standby would void the whole point. (3-instance clusters must use
    # preferred — required would pin an evicted instance Pending during drains.)
    podAntiAffinityType: required
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: infra-pg-grafana # our password (SOPS), not an operator-generated one
      postInitSQL:
        - CREATE ROLE authelia LOGIN;
        - CREATE DATABASE authelia OWNER authelia;
        # open-webui: relational store + pgvector RAG (lets OWUI run 2 replicas off Postgres, ADR 0016).
        # NB: on an already-bootstrapped cluster this block does NOT run — the role/DB were created by hand,
        # and pgvector needs a manual `\c openwebui; CREATE EXTENSION vector; ALTER SCHEMA public OWNER TO
        # openwebui;` as superuser (postInitSQL can't switch DBs). Documented in docs/runbooks (ai-host-setup).
        - CREATE ROLE openwebui LOGIN;
        - CREATE DATABASE openwebui OWNER openwebui;
        # litellm: DB-backed virtual-key + per-tenant budget store for the litellm-local gateway (P3,
        # plan Risk 3 — kubernetes/apps/apps/ai/litellm-local.yaml). Own role+DB so the key store is
        # isolated; the litellm proxy runs its own schema migrations against it at boot (needs to own the
        # DB). NB: on an already-bootstrapped cluster this block does NOT run — create the role/DB via the
        # committed one-shot bootstrap artifact (databases/litellm-db-bootstrap.yaml), then managed.roles
        # below sets the password.
        - CREATE ROLE litellm LOGIN;
        - CREATE DATABASE litellm OWNER litellm;
        # AgentForge v2 platform DB (ADR 0019). Two roles on purpose — the RLS boundary the CP relies on
        # (agentforge_platform Settings): afp_admin owns the DB + BYPASSRLS (migrations + audited service
        # paths); afp_app is a NON-owner, NOBYPASSRLS login used for the RLS-enforced request path. NB: on
        # an already-bootstrapped cluster this block does NOT run — the roles/DB are created as superuser by
        # the one-shot migration Job's bootstrap SQL (kubernetes/apps/apps/agentforge/db-migrate.yaml) or by
        # hand (kubectl exec ... psql). managed.roles below then reconciles each password from its secret.
        # Kept here to document intent for a DR rebuild.
        - CREATE ROLE afp_admin LOGIN BYPASSRLS;
        - CREATE ROLE afp_app LOGIN NOBYPASSRLS;
        - CREATE DATABASE agentforge_platform OWNER afp_admin;
        # AgentForge v2 R-2 broker LEDGER (design §5) — a DEDICATED database + the THREE-role DISJOINT
        # authority split, materialized declaratively (the split must be real, not a comment). Roles:
        #   * agentforge_broker_admin — OWNS the DB + tables + the close_session() SECURITY DEFINER fn;
        #     runs the ledger migration (operator, activation-time).
        #   * agentforge_broker — the broker's NARROW login: open/reserve/reconcile ONLY (SELECT/INSERT/
        #     UPDATE on sessions/requests/rate_buckets), NEVER close. ESO cred (broker-ledger).
        #   * agentforge_reaper — the reaper's CLOSE-ONLY login: EXECUTE on close_session() ONLY, NO table
        #     privilege. ESO cred (agentforge-reaper-ledger).
        # The DISJOINT GRANTs themselves are NOT here (they need the tables + fn to exist first): they live
        # in agentforge broker/ledger.py — SCHEMA_SQL + BROKER_GRANTS_SQL + REAPER_GRANTS_SQL — and are
        # applied by agentforge_broker_admin AT ACTIVATION. Passwords are set at activation from the
        # OpenBao DSNs (ESO), NOT a CNPG-managed SOPS secret (so no passwordSecret below). NB: on an
        # already-bootstrapped cluster this postInitSQL block does NOT run — managed.roles (below)
        # reconciles the roles into existence on the live cluster; kept here as the DR-rebuild source of
        # truth (mirrors the afp_* pattern above).
        - CREATE ROLE agentforge_broker_admin LOGIN;
        - CREATE ROLE agentforge_broker LOGIN;
        - CREATE ROLE agentforge_reaper LOGIN;
        - CREATE DATABASE agentforge_broker OWNER agentforge_broker_admin;
  managed:
    roles:
      - name: authelia
        ensure: present
        login: true
        passwordSecret:
          name: infra-pg-authelia
      - name: openwebui
        ensure: present
        login: true
        passwordSecret:
          name: infra-pg-openwebui
      # litellm virtual-key/budget store role — reconciled into existence on the LIVE cluster (postInitSQL
      # only runs at first bootstrap); password from infra-pg-litellm (must match litellm-local-db's DSN).
      # The DATABASE itself is created by databases/litellm-db-bootstrap.yaml (managed.roles makes the ROLE
      # but never a DB).
      - name: litellm
        ensure: present
        login: true
        passwordSecret:
          name: infra-pg-litellm
      # AgentForge v2 RLS boundary (ADR 0019): two roles, one password secret each. bypassrls is set
      # explicitly on both — afp_admin BYPASSRLS (owner/migrations), afp_app NOBYPASSRLS (request path).
      - name: afp_admin
        ensure: present
        login: true
        bypassrls: true
        passwordSecret:
          name: infra-pg-afp-admin
      - name: afp_app
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: infra-pg-afp-app
      # AgentForge v2 R-2 broker ledger DISJOINT roles (design §5) — reconciled into existence on the
      # LIVE cluster (postInitSQL only runs at first bootstrap). NO passwordSecret: their passwords live
      # in OpenBao (ESO DSNs), set at activation — CNPG ensures the roles EXIST; the operator ALTER ROLE
      # ... PASSWORD from the OpenBao DSN at activation. The DISJOINT grants (open/reserve/reconcile for
      # agentforge_broker vs EXECUTE close_session ONLY for agentforge_reaper) are applied by the ledger
      # migration (agentforge broker/ledger.py) after SCHEMA_SQL, since they require the tables + fn.
      - name: agentforge_broker_admin
        ensure: present
        login: true
      - name: agentforge_broker
        ensure: present
        login: true
      - name: agentforge_reaper
        ensure: present
        login: true
  # NB: monitoring.enablePodMonitor stays OFF — the CNPG-generated PodMonitor carries only cnpg.io
  # labels, and the kps Prometheus only selects PodMonitors labeled `release: kube-prometheus-stack`
  # (verified live: strive-pg's operator-generated PodMonitor has produced zero cnpg_* series). The
  # hand-written PodMonitor below (flux-monitoring.yaml precedent) carries the right label; the
  # instance pods expose the metrics port (9187) regardless.
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  # NOT named `infra-pg`: CNPG treats a PodMonitor with the CLUSTER'S OWN NAME as its managed object
  # and, with enablePodMonitor off, actively deletes it every reconcile (observed live — Flux applied
  # it, the operator removed it, and the Kustomization health check hung on the missing object).
  name: infra-pg-metrics
  namespace: databases
  labels:
    release: kube-prometheus-stack # kps Prometheus podMonitorSelector — without this it is ignored
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: infra-pg
  podMetricsEndpoints:
    - port: metrics # CNPG instance-pod exporter :9187 (cnpg_* series)
