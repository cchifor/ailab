# Declarative CNPG database for the litellm virtual-key/budget store (P3, plan Risk 3 —
# kubernetes/apps/apps/ai/litellm-local.yaml). CNPG `managed.roles` (infra-pg.yaml) creates the
# `litellm` ROLE but never a DATABASE, and `postInitSQL` runs ONLY at first cluster bootstrap — so on
# the already-bootstrapped infra-pg the DB would otherwise have to be created by a MANUAL operator
# step before litellm-local (a LIVE Deployment in the wait:true `apps` layer) can resolve its
# DATABASE_URL. This `Database` resource creates it declaratively instead, so the DB exists as soon as
# Flux reconciles `databases` — no manual pre-merge step, and no risk of the never-created-DB wedging
# the apps layer via litellm-local's CrashLoop.
#
# Requires CNPG >= 1.24 (the operator that serves postgresql.cnpg.io/v1 Database; the estate runs
# cloudnative-pg chart 0.22.1 = operator 1.24.x). databaseReclaimPolicy: retain (default) so removing
# this resource NEVER drops the tenant key/budget/spend data — deletion is deliberate + manual.
# litellm-local then runs its OWN schema migrations into this DB at boot (it owns it).
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: litellm
  namespace: databases
spec:
  cluster:
    name: infra-pg
  name: litellm
  owner: litellm # the managed role reconciled from infra-pg-litellm (infra-pg.yaml)
  ensure: present
  databaseReclaimPolicy: retain
