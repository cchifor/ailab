apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# infra-pg: shared CNPG Postgres for platform apps (grafana, authelia) — ADR 0016. Reconciled by the
# dedicated `databases` Flux Kustomization (clusters/ai/databases.yaml) because the CNPG CRDs come
# from the external platform repo's operator.
resources:
  - namespace.yaml
  - limitrange.yaml
  - infra-pg-grafana.sops.yaml # basic-auth creds for the grafana DB (initdb owner)
  - infra-pg-authelia.sops.yaml # basic-auth creds for the authelia DB (managed role)
  - infra-pg-openwebui.sops.yaml # basic-auth creds for the openwebui DB (managed role)
  - infra-pg-agentforge.sops.yaml # basic-auth creds for the agentforge_platform DB (managed role, ADR 0019)
  - infra-pg.yaml
