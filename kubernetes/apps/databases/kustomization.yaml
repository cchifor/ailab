apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# infra-pg: shared CNPG Postgres for platform apps (grafana, authelia) — ADR 0016. Reconciled by the
# dedicated `databases` Flux Kustomization (clusters/ai/databases.yaml) because the CNPG CRDs come
# from the external platform repo's operator.
resources:
  - namespace.yaml
  - limitrange.yaml
  - infra-pg-grafana.sops.yaml # basic-auth creds for the grafana DB (initdb owner)
  - infra-pg-authelia.sops.yaml # basic-auth creds for the authelia DB (managed role)
  - infra-pg-openwebui.sops.yaml # basic-auth creds for the openwebui DB (managed role)
  - infra-pg-litellm.sops.yaml # basic-auth creds for the litellm virtual-key/budget store (managed role)
  # AgentForge v2 RLS boundary (ADR 0019): two managed roles, one basic-auth secret each. Each password
  # MUST stay in sync with the matching DSN in apps/agentforge/agentforge-db.sops.yaml (see those headers).
  - infra-pg-afp-admin.sops.yaml # basic-auth creds for afp_admin (DB owner, BYPASSRLS — admin_dsn)
  - infra-pg-afp-app.sops.yaml # basic-auth creds for afp_app (non-owner, NOBYPASSRLS — app_dsn)
  - infra-pg.yaml
