apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# infra-pg: shared CNPG Postgres for platform apps (grafana, authelia) — ADR 0016. Reconciled by the
# dedicated `databases` Flux Kustomization (clusters/ai/databases.yaml) because the CNPG CRDs come
# from the external platform repo's operator.
resources:
  - namespace.yaml
  - limitrange.yaml
  - infra-pg-grafana.sops.yaml # basic-auth creds for the grafana DB (initdb owner)
  - infra-pg-authelia.sops.yaml # basic-auth creds for the authelia DB (managed role)
  - infra-pg-openwebui.sops.yaml # basic-auth creds for the openwebui DB (managed role)
  - infra-pg-litellm.sops.yaml # basic-auth creds for the litellm virtual-key/budget store (managed role)
  # gitea DB (SQLite->Postgres migration). Password MUST stay in sync with gitea-db in the gitea ns
  # (apps/gitea/gitea-db.sops.yaml). The DATABASE itself comes from the gitea-db-bootstrap.yaml one-shot,
  # which is deliberately NOT listed here (see the CNPG >= 1.25 note below).
  - infra-pg-gitea.sops.yaml # basic-auth creds for the gitea DB (managed role)
  # AgentForge v2 RLS boundary (ADR 0019): two managed roles, one basic-auth secret each. Each password
  # MUST stay in sync with the matching DSN in apps/agentforge/agentforge-db.sops.yaml (see those headers).
  - infra-pg-afp-admin.sops.yaml # basic-auth creds for afp_admin (DB owner, BYPASSRLS — admin_dsn)
  - infra-pg-afp-app.sops.yaml # basic-auth creds for afp_app (non-owner, NOBYPASSRLS — app_dsn)
  - infra-pg.yaml
  # NB: do NOT add a `postgresql.cnpg.io/v1 Database` resource here. That CRD ships in CNPG >= 1.25 and
  # the estate operator is 1.24.1, so it fails dry-run — which fails the apply of this ENTIRE layer, not
  # just that one resource. That happened (00dd55a, 2026-07-16): `databases` wedged for 5 days, 27
  # commits unapplied, and the resulting missing litellm DB then wedged the `apps` layer too. Databases
  # on an already-bootstrapped infra-pg are created by the one-shot bootstrap SQL pattern instead
  # (litellm-db-bootstrap.yaml / gitea-db-bootstrap.yaml — deliberately NOT listed here).
