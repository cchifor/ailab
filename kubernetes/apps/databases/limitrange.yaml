apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: databases
spec:
  limits:
    - type: Container
      # Memory-only default LIMIT: LimitRange defaulting is per-resource, so a default cpu limit here
      # would be silently injected into the infra-pg postgres containers (they set a memory limit but
      # deliberately no cpu limit — that default would throttle the DB). Strays still get a memory cap
      # and request defaults.
      default: { memory: 512Mi }
      defaultRequest: { cpu: 50m, memory: 128Mi }
