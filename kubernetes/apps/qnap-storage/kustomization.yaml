apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# QNAP iSCSI backend + StorageClass — applied by the `qnap-storage` Flux Kustomization
# (dependsOn infrastructure) so the TridentBackendConfig CRD (from the qnap-trident HelmRelease)
# exists first.
resources:
  - backend-secret.sops.yaml
  - backend.yaml
  - storageclass.yaml
