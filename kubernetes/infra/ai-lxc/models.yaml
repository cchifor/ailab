# AI-LXC model catalog — the human source of truth for which node serves which model(s) and whether a
# model is PINNED (always resident) or MANAGED (idle-unloaded on demand via llama-swap).
#
# This file is documentation + a deploy checklist, NOT auto-applied: the appliance is provisioned by
# `scripts/lxc-exec.py <host> <ctid> --env ... bash provision.sh`. Each entry maps to a provision command
# in docs/runbooks/ai-model-swap.md. Keep the max_input_tokens in kubernetes/apps/apps/ai/litellm.yaml in
# sync with `ctx`.
#
# Topology (2026-07-08):
#   node1 + node2 : qwen3.6-35b-a3b PINNED on BOTH (the daily driver) -> redundancy + LiteLLM
#                   load-balancing across the two `llm` Service endpoints (.44 + .45).
#   node3         : llama-swap serves ONLY qwen3.5-122b on demand (loads on first request, idle-unloads
#                   after ttl). gpt-oss-120b was RETIRED from node3 on 2026-07-08 — see below.
# This replaced the earlier "gpt-oss pinned on node2" layout, which over-subscribed node2 (59 GiB model
# + 2 runners + 2 dev-workers -> OOM). qwen3.6 (~24 GiB) frees ~35 GiB on node2 for its runners/workers.
#
# Why node3 is SINGLE-MODEL (2026-07-08): qwen3.5-122b (~71 GiB) and gpt-oss-120b (~59 GiB) cannot
# co-reside in node3's 96 GiB iGPU LXC, so llama-swap could hold only one at a time. With interactive
# traffic hitting qwen3.5-122b and the deepagent platform hitting gpt-oss, the two demand streams
# interleaved and forced a full evict+cold-reload on nearly every crossover (measured ~55-82s PER
# request, 4/4). Serving a single heavyweight ends the thrash. gpt-oss's LiteLLM model_name is shimmed
# to the pinned qwen3.6 (kubernetes/apps/apps/ai/litellm.yaml) so callers still work. To bring gpt-oss
# back you must give up qwen3.5-122b (they cannot share node3) — do NOT re-add it here as a 2nd model.
#
# ttl semantics (llama-swap): 0 = pinned (load once, never idle-unload); >0 = idle seconds before unload
# (returning GTT to the host). swap:false => direct llama-server.service (no llama-swap). Managed models
# are STAGED on local NVMe (/models-local — an out-of-band `pct set` mount) so cold reload is ~2-4 GB/s
# (~30-60s) vs ~300 MB/s over NFS; `gguf` = local copy, `stage_from` = NFS source (provision.sh rsyncs it).

models:
  # ---- Daily driver: PINNED on node1 AND node2 (coding + image/video vision; the always-warm chat path) ----
  qwen3.6-35b-a3b:
    nodes: [ai-node1, ai-node2]   # ctid 5001/.44 (NFS) + ctid 5002/.45 (local NVMe); both direct/pinned
    alias: qwen3.6-35b-a3b
    gguf: /models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf         # node1 serves from NFS
    gguf_node2: /models-local/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf  # node2 serves from local NVMe
    stage_from: /models/qwen3.6-35b-a3b   # node2 stages the GGUF + mmproj to /models-local once
    mmproj: /models/qwen3.6-35b-a3b/mmproj-F16.gguf   # node1 (NFS); node2 uses /models-local/.../mmproj-F16.gguf
    ctx: 262144
    parallel: 2               # 2 concurrent slots/node (per-slot n_ctx = ctx/parallel = 131072) for interactive
                              # concurrency; keep litellm max_input_tokens (114688 = 131072 - 16K headroom) in sync
    cache_type: q8_0          # K + V
    swap: false               # PINNED (direct llama-server.service) on both nodes
    ttl: 0

  # ---- node3 llama-swap SINGLE-MODEL — qwen3.5-122b on demand (ctid 5003 / .46) ----
  # Deploy via a single-MODEL provision call (SWAP=true, no MODELS_JSON) — see docs/runbooks/ai-model-swap.md.
  qwen3.5-122b:
    node: ai-node3
    alias: qwen3.5-122b
    gguf: /models-local/qwen3.5-122b-a10b/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf
    stage_from: /models/qwen3.5-122b-a10b
    ctx: 8192
    parallel: 1
    cache_type: q8_0          # q8_0 K/V (needs flash-attn, which --flash-attn auto engages) — ~halves KV GTT
                              # and a few % faster decode at ctx 8192; near-lossless. (2026-07-09 perf tuning)
    extra: "--no-mmap"
    swap: true                # MANAGED on node3's llama-swap (sole model; loads on request, idle-unloads)
    ttl: 1800                 # 30 min idle (raised from 900 to keep a Q&A session warm)

  # gpt-oss-120b: RETIRED from node3 on 2026-07-08 to end the two-heavyweight swap-thrash (see the
  # "Why node3 is SINGLE-MODEL" note above). The GGUF stays staged on node3's /models-local for a fast
  # bring-back, but it is intentionally NOT registered here or in llama-swap: node3 cannot serve both.
