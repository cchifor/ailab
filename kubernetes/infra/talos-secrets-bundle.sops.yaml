# ============================================================================================
# DR-ONLY ARTIFACT -- DO NOT APPLY TO THE CLUSTER. Stored here SOPS+age-encrypted because the
# Talos machine secrets bundle (cluster/etcd/k8s CA + SA signing key + tokens) otherwise lives
# ONLY in the gitignored kubernetes/infra/terraform.tfstate. Without an off-site copy a total
# cluster loss is UNRECOVERABLE: 'talosctl bootstrap --recover-from' on fresh nodes regenerates a
# NEW secrets bundle -> CA/PKI mismatch -> the recovered etcd certs + SA tokens are invalid ->
# the control plane never converges. This file closes that gap (it lives in GitHub = off-machine).
# NOT in any Flux kustomization, so Flux never applies it (keeps the master CA out of a live
# cluster Secret). git history IS its off-site home; the decrypting age key MUST be kept OFFLINE
# (a copy of kubernetes/infra/_out/age.agekey) or this ciphertext is useless in a real loss.
#
# RECOVERY (total loss): sops -d kubernetes/infra/talos-secrets-bundle.sops.yaml, take
# .stringData."secrets.yaml" -> secrets.yaml ; talosctl gen config --with-secrets secrets.yaml
# <cluster> https://<vip>:6443 (reuses THIS PKI) ; apply to fresh nodes ; talosctl bootstrap
# --recover-from=<age-decrypted etcd snapshot>. Validated 2026-06-18: gen config reused the live
# machine/k8s/etcd CAs (sha256 match).
# ============================================================================================
