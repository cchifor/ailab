---
# Single TB-net device per node (link to the QNAP) -> native name `thunderbolt0`, no rename.
# TB interfaces appear late at boot (after the QNAP XDomain handshake) and need an explicit
# link-up, so a small systemd timer reconciles the link at boot + every 30s.

- name: Load Thunderbolt modules at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/thunderbolt.conf
    mode: "0644"
    content: |
      thunderbolt
      thunderbolt-net
  notify: update initramfs

- name: Load Thunderbolt modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ tb_modules }}"
  failed_when: false

- name: Install TB link-up reconciler
  ansible.builtin.template:
    src: tb-link-up.sh.j2
    dest: /usr/local/sbin/tb-link-up.sh
    mode: "0755"

- name: Install tb-link systemd unit + timer
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - tb-link.service
    - tb-link.timer

- name: Enable + start tb-link.timer
  ansible.builtin.systemd:
    name: tb-link.timer
    enabled: true
    state: started
    daemon_reload: true
