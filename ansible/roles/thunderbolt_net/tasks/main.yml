---
# Single TB-net device per node (link to the QNAP) -> use the native name `thunderbolt0`,
# no systemd .link rename needed (avoids a reboot). Modules + a udev bring-up rule suffice.

- name: Load Thunderbolt modules at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/thunderbolt.conf
    mode: "0644"
    content: |
      thunderbolt
      thunderbolt-net
  notify: update initramfs

- name: Load Thunderbolt modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ tb_modules }}"
  failed_when: false

- name: Install TB link-up helper
  ansible.builtin.template:
    src: tb-link-up.sh.j2
    dest: /usr/local/sbin/tb-link-up.sh
    mode: "0755"

- name: Install udev rule (bring link up when the TB-net device appears)
  ansible.builtin.template:
    src: 10-tb-up.rules.j2
    dest: /etc/udev/rules.d/10-tb-up.rules
    mode: "0644"
  notify: reload udev
