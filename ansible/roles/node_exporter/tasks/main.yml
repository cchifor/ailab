---
# Install + run node_exporter on each Proxmox host. Idempotent; safe to re-run on a rebuild.
- name: Install prometheus-node-exporter
  ansible.builtin.apt:
    name: "{{ node_exporter_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: node_exporter_enabled | bool

# Textfile-collector dir. Created unconditionally (safe/empty where no .prom files are written) so
# enabling --collector.textfile.directory via node_exporter_extra_args (e.g. the runner group) never
# points at a missing dir. Root-owned 0755 is world-readable, so the prometheus service user can read
# the .prom beacons that root-run scripts (e.g. runner-reclaim.sh) drop here.
- name: Ensure node_exporter textfile-collector dir exists
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    mode: "0755"
  when: node_exporter_enabled | bool

- name: Configure node_exporter listen address
  ansible.builtin.copy:
    dest: "/etc/default/{{ node_exporter_service }}"
    mode: "0644"
    content: |
      # Managed by ansible (role: node_exporter). Scraped by the cluster's monitoring/proxmox-node
      # ServiceMonitor (job=proxmox-node) for the AI Lab Fleet dashboard.
      ARGS="--web.listen-address={{ node_exporter_listen_address }} {{ node_exporter_extra_args }}"
  when: node_exporter_enabled | bool
  notify: Restart node_exporter

- name: Ensure node_exporter is enabled and running
  ansible.builtin.systemd:
    name: "{{ node_exporter_service }}"
    enabled: true
    state: started
  when: node_exporter_enabled | bool
