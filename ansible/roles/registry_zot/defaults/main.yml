---
# Zot OCI registry (native binary + systemd) on the registry LXC. registry.chifor.me:443.
registry_zot_version: "v2.1.2"          # pin to a project-zot release; matches docker-compose.yml
registry_zot_arch: "amd64"
registry_zot_hostname: "registry.chifor.me"
registry_zot_port: 443                  # bind 443 directly (systemd grants CAP_NET_BIND_SERVICE)

registry_zot_user: "zot"
registry_zot_group: "zot"
registry_zot_config_dir: "/etc/zot"
# The tofu mp0 data disk mounts at registry_zot_mount_dir; zot's rootDirectory is a SUBDIR of it
# (registry_zot_data_dir). zot scans its rootDirectory for repos, and the ext4 `lost+found` at the
# mount root is root:0700 -> the scan fails "permission denied". Using a subdir avoids it entirely.
registry_zot_mount_dir: "/var/lib/registry"
registry_zot_data_dir: "/var/lib/registry/store"

# Push identity (authenticated). The password comes from SOPS (registry_ci_password); anonymous
# clients get read-only (pull) per config.json.
registry_zot_ci_user: "ci"

# Web-UI SSO via Authelia (zot-native OIDC). Docker push (ci/htpasswd) + anonymous pull are
# UNAFFECTED — only the browser UI gains a "Login with Authelia" button. The plaintext client
# secret (registry_oidc_client_secret) comes from SOPS (registry.sops.yaml); the Authelia client +
# secret HASH live in kubernetes/apps/apps/auth/authelia-config.yaml. The provider key MUST equal
# the Authelia redirect_uri path segment: https://<host>/zot/auth/callback/<key>.
registry_zot_oidc_enabled: true
registry_zot_oidc_issuer: "https://sso.chifor.me"
registry_zot_oidc_client_id: "registry"
registry_zot_oidc_provider_key: "oidc"

# Let's Encrypt (DNS-01 via Cloudflare). The token (cloudflare_dns_api_token) comes from SOPS and
# needs Zone:DNS:Edit on chifor.me — the SAME scoped token the cloudflare tofu module uses.
registry_zot_acme_email: "chifor@gmail.com"
registry_zot_acme_staging: false        # set true to test against LE staging (untrusted cert)

# ufw (the LXC is on the mgmt LAN; only 22 + 443 need to be open)
registry_zot_manage_ufw: true
