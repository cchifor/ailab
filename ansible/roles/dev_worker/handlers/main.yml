---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Restart ttyd
  ansible.builtin.systemd:
    name: ttyd
    state: restarted

- name: Reload caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded

- name: Reload sshd
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

- name: Restart cloudflared
  ansible.builtin.systemd:
    name: cloudflared
    state: restarted

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false
