---
# Sections 5 + 9 (homelab): kubectl / helm / k9s + the claude-grant-write helper + ~/.kube dirs.
# Distributing scoped kubeconfigs into ~/.kube/config is operator/tofu work and OUT OF SCOPE for
# this role (the dashboard's k9s window degrades gracefully when no kubeconfig is present).

- name: Add Kubernetes apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ dev_worker_kubectl_minor }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes.asc
    mode: "0644"

- name: Add Kubernetes apt repository (flat repo)
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: [deb]
    uris: "https://pkgs.k8s.io/core:/stable:/v{{ dev_worker_kubectl_minor }}/deb/"
    suites: ["/"]
    signed_by: /etc/apt/keyrings/kubernetes.asc
    enabled: true

- name: Install kubectl
  ansible.builtin.apt:
    name: kubectl
    state: present
    update_cache: true

- name: Install helm {{ dev_worker_helm_version }}
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-{{ dev_worker_helm_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["--strip-components=1", "--wildcards", "*/helm"]
    creates: "/usr/local/bin/.helm-{{ dev_worker_helm_version }}"

- name: Mark installed helm version
  ansible.builtin.copy:
    content: "{{ dev_worker_helm_version }}\n"
    dest: "/usr/local/bin/.helm-{{ dev_worker_helm_version }}"
    mode: "0644"
    force: false

- name: Install k9s {{ dev_worker_k9s_version }}
  ansible.builtin.unarchive:
    src: "https://github.com/derailed/k9s/releases/download/{{ dev_worker_k9s_version }}/k9s_Linux_amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["k9s"]
    creates: "/usr/local/bin/.k9s-{{ dev_worker_k9s_version }}"

- name: Mark installed k9s version
  ansible.builtin.copy:
    content: "{{ dev_worker_k9s_version }}\n"
    dest: "/usr/local/bin/.k9s-{{ dev_worker_k9s_version }}"
    mode: "0644"
    force: false

- name: Install claude-grant-write helper (opt-in RW kubeconfig escalation)
  ansible.builtin.copy:
    dest: /usr/local/bin/claude-grant-write
    mode: "0755"
    content: |
      #!/bin/bash
      # Managed by ansible (role: dev_worker). Opt-in escalation: switch the current shell's
      # KUBECONFIG to a root-readable RW config (requires sudo, so the operator must type a password).
      set -euo pipefail
      RW=/etc/claude-agent/kube-rw-config
      if [ ! -r "$RW" ]; then
        if ! sudo test -r "$RW"; then
          echo "claude-grant-write: $RW does not exist yet (RW kubeconfig not provisioned)." >&2
          exit 1
        fi
        STAGED="/run/user/$(id -u)/kube-rw-config"
        install -d -m 0700 "$(dirname "$STAGED")"
        sudo install -m 0400 -o "$(id -u)" -g "$(id -g)" "$RW" "$STAGED"
      else
        STAGED="$RW"
      fi
      echo "claude-grant-write: KUBECONFIG=$STAGED exported for this shell (edit-level RBAC)."
      exec env KUBECONFIG="$STAGED" "$SHELL"

- name: Ensure /etc/skel/.kube placeholder
  ansible.builtin.file:
    path: /etc/skel/.kube
    state: directory
    mode: "0755"

- name: Ensure per-user ~/.kube dirs
  ansible.builtin.file:
    path: "{{ item.home }}/.kube"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ dev_worker_users }}"
  loop_control:
    label: "{{ item.name }}"
