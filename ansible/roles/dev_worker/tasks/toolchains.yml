---
# Section 4 (homelab): language toolchains. Python + Go from apt; Rust to a shared /opt/rust via
# rustup, both users PATH'd to /opt/rust/cargo/bin through profile.d.
- name: Install Python + Go toolchains
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - pipx
      - golang-go
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure /opt/rust exists
  ansible.builtin.file:
    path: /opt/rust
    state: directory
    mode: "0755"

- name: Install the Rust toolchain to /opt/rust (shared)
  ansible.builtin.shell: |
    set -o pipefail
    curl -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --default-toolchain stable
  environment:
    RUSTUP_HOME: /opt/rust/rustup
    CARGO_HOME: /opt/rust/cargo
  args:
    executable: /bin/bash
    creates: /opt/rust/cargo/bin/cargo
  register: dev_worker_rust_install

- name: Make /opt/rust group/other readable + traversable
  ansible.builtin.command: chmod -R go+rX /opt/rust
  when: dev_worker_rust_install is changed
  changed_when: true

- name: Install the Rust PATH profile.d hook
  ansible.builtin.copy:
    dest: /etc/profile.d/02-rust-path.sh
    mode: "0755"
    content: |
      # Managed by ansible (role: dev_worker). Shared Rust toolchain under /opt/rust.
      export RUSTUP_HOME=/opt/rust/rustup
      export CARGO_HOME=/opt/rust/cargo
      export PATH="$CARGO_HOME/bin:$PATH"
