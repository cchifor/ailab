---
# Section 1 (homelab): base packages + yq + qemu-guest-agent. gh + gh-dash live in tooling_extras.yml.
- name: Install base packages
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - wget
      - git
      - jq
      - ripgrep
      - fzf
      - bat
      - tmux
      - htop
      - ncdu
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - ufw
      - acl # lets ansible `become` an unprivileged user (per-user npm + ACL tasks)
      - qemu-guest-agent # not in the minimal cloud image; gives PVE graceful shutdown + guest info
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable + start qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Ensure apt keyrings dir
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# yq is the mikefarah Go binary (the distro 'yq' is the unrelated Python jq-wrapper). Versioned
# dest + stable symlink: get_url is a no-op once the versioned file exists, and a version bump
# pulls the new binary and re-points the symlink — idempotent without re-downloading every run.
- name: Install yq {{ dev_worker_yq_version }}
  ansible.builtin.get_url:
    url: "https://github.com/mikefarah/yq/releases/download/v{{ dev_worker_yq_version }}/yq_linux_amd64"
    dest: "/usr/local/bin/yq-{{ dev_worker_yq_version }}"
    mode: "0755"

- name: Link /usr/local/bin/yq -> yq-{{ dev_worker_yq_version }}
  ansible.builtin.file:
    src: "/usr/local/bin/yq-{{ dev_worker_yq_version }}"
    dest: /usr/local/bin/yq
    state: link
