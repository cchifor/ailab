---
# Section 3 (homelab) + Codex: shared subscription-OAuth credentials. Auth is interactive (the
# operator runs `claude` / `codex login` once as the agent user — see docs/runbooks/dev-workers.md);
# this role injects NO keys. It only creates the credential homes owned by the agent user and grants
# the admin user (c4) read access via ACLs, so c4's interactive shells reuse the same tokens.
#
# IDEMPOTENCY NOTE: OAuth tokens are written AFTER provisioning (by the manual login). POSIX default
# ACLs apply only to files created after they are set, so `recursive: true` re-asserts read on the
# already-written token files on every run — which is exactly why the runbook says to re-run the
# playbook once after the first login.

- name: Ensure shared credential dirs owned by the agent user
  ansible.builtin.file:
    path: "/home/{{ dev_worker_agent_user }}/{{ item }}"
    state: directory
    owner: "{{ dev_worker_agent_user }}"
    group: "{{ dev_worker_agent_user }}"
    mode: "0750"
  loop:
    - .claude
    - .codex

# c4 must be able to traverse the agent's home to reach .claude/.codex. Grant the c4 group execute
# (traverse) on the home dir itself — narrower than read, enough to descend to the known subpaths.
- name: Grant the admin user traverse (x) on the agent home dir
  ansible.posix.acl:
    path: "/home/{{ dev_worker_agent_user }}"
    entity: "{{ dev_worker_admin_user }}"
    etype: group
    permissions: x
    state: present

- name: Grant the admin user rx on the shared cred dirs (live + default ACL, recursive)
  ansible.posix.acl:
    path: "/home/{{ dev_worker_agent_user }}/{{ item.0 }}"
    entity: "{{ dev_worker_admin_user }}"
    etype: group
    permissions: rx
    recursive: true
    default: "{{ item.1 }}"
    state: present
  loop: "{{ ['.claude', '.codex'] | product([false, true]) | list }}"
  loop_control:
    label: "{{ item.0 }} (default={{ item.1 }})"

- name: Export CLAUDE_HOME + CODEX_HOME for the admin user's shells
  ansible.builtin.template:
    src: profile.d-01-claude-shared-oauth.sh.j2
    dest: /etc/profile.d/01-claude-shared-oauth.sh
    mode: "0755"
