---
# Claude Code + Codex credentials.
#
# UNIFIED (default, agent == admin): each user simply OWNS its own ~/.claude + ~/.codex (full
# read/write → token refresh works). One `claude` / `codex login` as c4 serves BOTH the SSH console
# and the ttyd web UI, because both run as c4. No cross-user ACLs, no CLAUDE_HOME/CODEX_HOME override.
#
# SEPARATE AGENT (opt-in, agent != admin): the homelab read-only shared store — the agent owns the
# credentials and c4 gets read-only access via ACL + CLAUDE_HOME/CODEX_HOME. NOTE: read-only sharing
# breaks token refresh for c4 (see docs/runbooks/dev-workers.md); prefer the unified default.

- name: Ensure each user owns its Claude + Codex credential dirs
  ansible.builtin.file:
    path: "{{ item.0.home }}/{{ item.1 }}"
    state: directory
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
    mode: "0700"
  loop: "{{ dev_worker_users | product(['.claude', '.codex']) | list }}"
  loop_control:
    label: "{{ item.0.name }} {{ item.1 }}"

# Drop any stale shared-OAuth override (e.g. from a previous separate-agent deploy) so the unified
# model doesn't leave c4's shells pointed at someone else's store.
- name: Remove the shared-OAuth profile.d hook (unified model)
  ansible.builtin.file:
    path: /etc/profile.d/01-claude-shared-oauth.sh
    state: absent
  when: dev_worker_agent_user == dev_worker_admin_user

# ---- opt-in separate-agent: homelab-style shared read-only store ----
- name: Configure shared read-only credential access (separate agent only)
  when: dev_worker_agent_user != dev_worker_admin_user
  block:
    - name: Grant the admin user traverse (x) on the agent home dir
      ansible.posix.acl:
        path: "/home/{{ dev_worker_agent_user }}"
        entity: "{{ dev_worker_admin_user }}"
        etype: group
        permissions: x
        state: present

    - name: Grant the admin user rx on the shared cred dirs (live + default ACL, recursive)
      ansible.posix.acl:
        path: "/home/{{ dev_worker_agent_user }}/{{ item.0 }}"
        entity: "{{ dev_worker_admin_user }}"
        etype: group
        permissions: rx
        recursive: true
        default: "{{ item.1 }}"
        state: present
      loop: "{{ ['.claude', '.codex'] | product([false, true]) | list }}"
      loop_control:
        label: "{{ item.0 }} (default={{ item.1 }})"

    - name: Export CLAUDE_HOME + CODEX_HOME for the admin user's shells
      ansible.builtin.template:
        src: profile.d-01-claude-shared-oauth.sh.j2
        dest: /etc/profile.d/01-claude-shared-oauth.sh
        mode: "0755"
