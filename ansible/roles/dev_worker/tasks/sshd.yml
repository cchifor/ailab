---
# Section 13 (homelab): optional SSH password auth for the admin user (for clients that don't
# auto-load the key, e.g. KiTTY). Off by default; the password comes from SOPS (dev_worker_admin_password).
- name: Assert an admin password is configured
  ansible.builtin.assert:
    that:
      - dev_worker_admin_password | length > 0
    fail_msg: >-
      dev_worker_enable_password_auth is true but dev_worker_admin_password is empty.
      Set it in ansible/secrets/dev-worker.sops.yaml (see docs/runbooks/dev-workers.md).
  no_log: true

- name: Set the admin user's password
  ansible.builtin.shell: "echo '{{ dev_worker_admin_user }}:{{ dev_worker_admin_password }}' | chpasswd"
  no_log: true
  changed_when: true

- name: Enable PasswordAuthentication via an sshd drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-dev-worker-passwordauth.conf
    mode: "0644"
    content: |
      # Managed by ansible (role: dev_worker). Allow password auth alongside pubkey.
      PasswordAuthentication yes
  notify: Reload sshd
