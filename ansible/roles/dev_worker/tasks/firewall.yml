---
# Sections 8 + 8.5 (homelab): ufw — LAN-only inbound. SSH (22), Caddy HTTP/HTTPS (80/443), and
# node_exporter (9100) are reachable from the LAN; everything else inbound is denied. Allow rules are
# declared BEFORE enabling so we never lock out the (LAN-side) Ansible SSH connection.
- name: Allow LAN inbound on the dev-worker service ports
  community.general.ufw:
    rule: allow
    from_ip: "{{ dev_worker_lan_cidr }}"
    to_port: "{{ item.port }}"
    proto: tcp
    comment: "{{ item.comment }}"
  loop:
    - { port: "22", comment: "SSH from LAN" }
    - { port: "80", comment: "Caddy HTTP redirect from LAN" }
    - { port: "443", comment: "Caddy HTTPS from LAN" }
    - { port: "9100", comment: "node_exporter scrape from LAN" }
  loop_control:
    label: "{{ item.port }} ({{ item.comment }})"

- name: Default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable ufw
  community.general.ufw:
    state: enabled
