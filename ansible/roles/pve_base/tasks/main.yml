---
- name: Show host context
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} — Debian {{ ansible_distribution_release }}, kernel {{ ansible_kernel }}"

# ---- APT repositories (homelab: no enterprise subscription) ----
- name: Disable PVE enterprise repo (list format / PVE 8 bookworm)
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^(deb\s+.*enterprise.*)$'
    replace: '# \1'
  when: pve_disable_enterprise_repo | bool
  failed_when: false

- name: Disable PVE/Ceph enterprise repos (deb822 / PVE 9 trixie)
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^(Enabled:\s*).*$'
    replace: '\1false'
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.sources
    - /etc/apt/sources.list.d/ceph.sources
  when: pve_disable_enterprise_repo | bool
  failed_when: false

- name: Add PVE no-subscription repo (bookworm / PVE 8)
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription"
    filename: pve-no-subscription
    state: present
  when:
    - pve_use_no_subscription_repo | bool
    - ansible_distribution_release == 'bookworm'

- name: Add PVE no-subscription repo (trixie / PVE 9, deb822)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_distribution_release }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  when:
    - pve_use_no_subscription_repo | bool
    - ansible_distribution_release == 'trixie'

- name: APT update
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

# ---- base packages + time sync ----
- name: Install base packages
  ansible.builtin.apt:
    name: "{{ pve_base_packages }}"
    state: present

- name: Ensure chrony is running
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

# Spread NIC RX interrupts across cores. Without it the AQC113/atlantic 10G NIC on node3 (PCIe-tunnelled
# over USB4) lands all RX softirq on a single core, which saturates and caps NFS reads ~300 MB/s. Helps
# multi-flow reads; the per-flow / per-packet ceiling is addressed by jumbo frames (storage_mtu).
- name: Ensure irqbalance is running
  ansible.builtin.service:
    name: irqbalance
    state: started
    enabled: true

# ---- kernel cmdline (legacy GRUB) ----
# All ai nodes boot via GRUB (proxmox-boot-tool manages no ESPs here), so the kernel cmdline lives in
# /etc/default/grub + `update-grub`. Declarative + idempotent: node1/2 keep stock "quiet"; node3 adds
# the Thunderbolt/USB4 PCIe-tunnel params (thunderbolt.host_reset=false pcie_aspm=off thunderbolt.clx=0)
# — without them its TB->10G storage NIC won't enumerate (retimer-disconnect loop). See ai-node3 host_vars.
- name: Set GRUB kernel cmdline (GRUB_CMDLINE_LINUX_DEFAULT)
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="{{ pve_grub_cmdline_linux_default }}"'
    state: present
  notify: pve_base update-grub

# ---- AMD nested virtualization (AgentForge v2 Kata agent-node pool prereq, ADR 0019) ----
# Kata's QEMU microVM needs /dev/kvm INSIDE the Talos worker VM, which requires `kvm_amd nested=1` on
# the host (+ cpu:host on the VM — set in kubernetes/infra/agent-nodes/main.tf). Declarative: write the
# modprobe option. It takes effect on the NEXT kvm_amd load — a host REBOOT, or `modprobe -r kvm_amd &&
# modprobe kvm_amd` only when NO VMs are running on this host (a live reload fails while guests use it).
# We do NOT hot-reload here (disruptive on a host with running guests). See docs/runbooks/agent-nodes.md.
- name: Enable AMD nested virtualization (kvm_amd nested=1)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/kvm-nested.conf
    mode: "0644"
    content: |
      options kvm_amd nested=1
  register: kvm_nested_conf
  when: pve_enable_nested_virt | bool

- name: Read current nested-virt runtime state
  ansible.builtin.slurp:
    src: /sys/module/kvm_amd/parameters/nested
  register: kvm_nested_now
  changed_when: false
  failed_when: false
  when: pve_enable_nested_virt | bool

- name: Warn if nested virt is not yet active at runtime (needs module reload or host reboot)
  ansible.builtin.debug:
    msg: >-
      kvm_amd nested=1 written to /etc/modprobe.d/kvm-nested.conf but runtime nested=
      '{{ (kvm_nested_now.content | b64decode | trim) if kvm_nested_now.content is defined else "unknown" }}'.
      Reload with `modprobe -r kvm_amd && modprobe kvm_amd` (ONLY when no VMs run on this host) or reboot.
  when:
    - pve_enable_nested_virt | bool
    - (kvm_nested_now.content is not defined) or ((kvm_nested_now.content | b64decode | trim) != 'Y')

# ---- kernel pin (after discovery; guards against silent upgrades) ----
- name: Pin Proxmox kernel
  ansible.builtin.command: "proxmox-boot-tool kernel pin {{ pve_pinned_kernel }}"
  register: kpin
  changed_when: kpin.rc == 0
  failed_when: kpin.rc != 0 and 'already' not in (kpin.stderr | default(''))
  when:
    - pve_pin_kernel | bool
    - pve_pinned_kernel | length > 0
