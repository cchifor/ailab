---
# Most pve_base settings live in group_vars/all.yml; defaults here are fallbacks.
pve_use_no_subscription_repo: true
pve_disable_enterprise_repo: true
pve_pin_kernel: false
pve_pinned_kernel: ""
pve_base_packages: [bolt, iperf3, ethtool, fio, nfs-common, chrony, curl, jq, irqbalance]

# Kernel cmdline (legacy GRUB — all ai nodes boot via update-grub; proxmox-boot-tool manages no ESPs
# here). Default matches node1/2 stock. node3 overrides in host_vars to add the Thunderbolt/USB4
# PCIe-tunnel boot params its TB->10G storage NIC needs to enumerate (see host_vars/ai-node3.yml).
pve_grub_cmdline_linux_default: "quiet"
