---
# Proxmox itself mounts the NFS datastore via OpenTofu (proxmox_storage_nfs). This role only
# does an optional client-side TEST mount for validation. Enable with manage_nfs_mount=true.
manage_nfs_mount: false
qnap_nfs_server: "{{ storage_service_ip }}"
qnap_nfs_export: "/share/pve-nfs"
qnap_nfs_mountpoint: "/mnt/qnap-nfs-test"
qnap_nfs_options: "vers=4.1,_netdev,hard,nconnect=4"
