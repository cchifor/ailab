---
# Provision a Gitea Actions runner (act_runner daemon, HOST mode) on a runner VM. Idempotent; safe to
# re-run. Gated as a whole by gitea-runners.yml (when: gitea_runner_enabled), so no per-task guards.
# Assumes the base toolchain (Docker + the `runner` user) is already installed by the github_runner role
# — run `just runners` before `just gitea-runners`. Day-2: a re-run restarts the daemon (handler),
# interrupting at most the in-flight job (Gitea re-queues it); run when the pool is mostly idle.

# ── 0. preflight ─────────────────────────────────────────────────────────────
- name: Assert the Gitea org runner-registration token is configured
  ansible.builtin.assert:
    that:
      - gitea_runner_registration_token is defined
      - gitea_runner_registration_token | length > 0
    fail_msg: >-
      Provide gitea_runner_registration_token via ansible/secrets/gitea-runner.sops.yaml (loaded by
      gitea-runners.yml's pre_task). Get an ORG runner token from
      {{ gitea_runner_instance_url }}/org/<org>/settings/actions/runners → "Create new Runner".
      See docs/runbooks/ci-runners.md.
  no_log: true

- name: Assert the base host toolchain (Docker) is present
  ansible.builtin.command: docker --version
  register: _gitea_runner_docker
  changed_when: false
  failed_when: _gitea_runner_docker.rc != 0
  # gitea_runner intentionally does NOT install Docker/uv/k6/Node — that is github_runner's job. Run
  # `just runners` on these hosts first. (Post-cutover, a shared runner_common role will own the base.)

# ── 1. runner user (idempotent; normally already created by github_runner) ───
- name: Ensure runner group
  ansible.builtin.group:
    name: "{{ gitea_runner_group }}"
    system: true

- name: Ensure runner user (in the docker group, so host-mode jobs can use the Docker socket)
  ansible.builtin.user:
    name: "{{ gitea_runner_user }}"
    group: "{{ gitea_runner_group }}"
    groups: [docker]
    append: true
    home: "{{ gitea_runner_home }}"
    shell: /bin/bash
    system: true

# ── 1b. host network: prefer IPv4 (the LAN has no IPv6 egress) ───────────────
# git.chifor.me (Cloudflare) is dual-stack, but the runner mgmt LAN is IPv4-only — the AAAA route is
# dead. getaddrinfo clients that try IPv6 first then hang/fail reaching Gitea. Give IPv4-mapped
# addresses higher precedence so curl/python/etc. resolve IPv4-first. NOTE: node/undici's Happy-Eyeballs
# still races to IPv6 despite this, so github-script/octokit steps ALSO need the workflow-side
# `NODE_OPTIONS: --dns-result-order=ipv4first --no-network-family-autoselection` (see the platform
# eval-nightly.yml reporting step). Root cause + evidence: docs/runbooks/ci-runners.md.
- name: Prefer IPv4 in getaddrinfo (Cloudflare is dual-stack; the LAN has no IPv6 egress)
  ansible.builtin.lineinfile:
    path: /etc/gai.conf
    line: "precedence ::ffff:0:0/96  100"
    regexp: '^\s*precedence\s+::ffff:0:0/96'
    create: true
    owner: root
    group: root
    mode: "0644"

# ── 2. act_runner binary ─────────────────────────────────────────────────────
- name: Install act_runner {{ gitea_runner_version }}
  ansible.builtin.get_url:
    # dl.gitea.com is the documented release mirror; the binary is a single file (no archive).
    url: "https://dl.gitea.com/act_runner/{{ gitea_runner_version }}/act_runner-{{ gitea_runner_version }}-linux-{{ gitea_runner_arch }}"
    dest: "{{ gitea_runner_bin }}"
    mode: "0755"
    owner: root
    group: root

# ── 3. config dir + workspace + cache ────────────────────────────────────────
- name: Ensure act_runner config + work + cache dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ gitea_runner_user }}"
    group: "{{ gitea_runner_group }}"
    mode: "0755"
  loop:
    - "{{ gitea_runner_config_dir }}"
    - "{{ gitea_runner_workdir_parent }}"
    - "{{ gitea_runner_cache_dir }}"

- name: Lay down act_runner config.yaml (labels, capacity, host-mode, cache)
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ gitea_runner_config_dir }}/config.yaml"
    owner: "{{ gitea_runner_user }}"
    group: "{{ gitea_runner_group }}"
    mode: "0644"
  notify: Restart gitea-act-runner

# ── 4. register (one-time; creates .runner) ──────────────────────────────────
# The org token registers a runner scoped to the whole org. `creates:` makes this idempotent — a
# re-run does NOT re-register (which would orphan the old entry in the Gitea UI). To force a fresh
# registration (e.g. token reset / label change), delete {{ gitea_runner_config_dir }}/.runner first.
- name: Register act_runner against Gitea (org scope, host label)
  become: true
  become_user: "{{ gitea_runner_user }}"
  ansible.builtin.command:
    argv:
      - "{{ gitea_runner_bin }}"
      - register
      - --no-interactive
      - --instance
      - "{{ gitea_runner_instance_url }}"
      - --token
      - "{{ gitea_runner_registration_token }}"
      - --name
      - "{{ gitea_runner_name }}"
      - --labels
      - "{{ gitea_runner_label }}:{{ gitea_runner_label_schema }}"
    chdir: "{{ gitea_runner_config_dir }}"
    creates: "{{ gitea_runner_config_dir }}/.runner"
  no_log: true
  notify: Restart gitea-act-runner

# ── 4b. workspace reclaim (act_runner has NO per-job hook) ───────────────────
# Reclaim the REUSED host-mode workspace out-of-band as root: root-owned artifact leftovers otherwise
# accumulate until a new job can't enter its cwd (`fork/exec /usr/bin/bash: no such file or directory`).
# Two triggers: ExecStartPre (clean slate on daemon (re)start, wired in the unit template) + an
# idle-guarded timer (between-jobs sweep). Installed BEFORE the daemon unit so ExecStartPre finds the
# script on first start. NB: changing these does NOT restart the daemon (only the timer) — safe day-2.
- name: Install the workspace-reclaim config (env sourced by the reclaim script)
  ansible.builtin.template:
    src: gitea-runner-reclaim.env.j2
    dest: "{{ gitea_runner_reclaim_env }}"
    mode: "0644"
  when: gitea_runner_reclaim_enabled | bool

- name: Install the workspace-reclaim script
  ansible.builtin.copy:
    src: gitea-runner-reclaim.sh
    dest: "{{ gitea_runner_reclaim_bin }}"
    mode: "0755"
  when: gitea_runner_reclaim_enabled | bool

- name: Install the workspace-reclaim oneshot service
  ansible.builtin.template:
    src: gitea-runner-reclaim.service.j2
    dest: "/etc/systemd/system/{{ gitea_runner_reclaim_service }}"
    mode: "0644"
  notify: Reload systemd for gitea reclaim
  when: gitea_runner_reclaim_enabled | bool

- name: Install the workspace-reclaim timer
  ansible.builtin.template:
    src: gitea-runner-reclaim.timer.j2
    dest: "/etc/systemd/system/{{ gitea_runner_reclaim_timer }}"
    mode: "0644"
  notify: Restart gitea reclaim timer
  when: gitea_runner_reclaim_enabled | bool

# ── 4c. docker + storage cleanup (bounds disk; the reclaim above only handles workspace artifact dirs) ─
# The shared Docker daemon accumulates build cache (unbounded) + stale images across CI runs until the
# root disk fills and CI breaks. gitea-runner-cleanup.sh reclaims them on an idle-guarded timer (NEVER
# mid-job) with disk-pressure escalation. Timer-only (no ExecStartPre, no daemon restart) — safe day-2.
- name: Install the docker/storage cleanup config (env sourced by the cleanup script)
  ansible.builtin.template:
    src: gitea-runner-cleanup.env.j2
    dest: "{{ gitea_runner_cleanup_env }}"
    mode: "0644"
  when: gitea_runner_cleanup_enabled | bool

- name: Install the docker/storage cleanup script
  ansible.builtin.copy:
    src: gitea-runner-cleanup.sh
    dest: "{{ gitea_runner_cleanup_bin }}"
    mode: "0755"
  when: gitea_runner_cleanup_enabled | bool

- name: Install the docker/storage cleanup oneshot service
  ansible.builtin.template:
    src: gitea-runner-cleanup.service.j2
    dest: "/etc/systemd/system/{{ gitea_runner_cleanup_service }}"
    mode: "0644"
  notify: Reload systemd for gitea reclaim
  when: gitea_runner_cleanup_enabled | bool

- name: Install the docker/storage cleanup timer
  ansible.builtin.template:
    src: gitea-runner-cleanup.timer.j2
    dest: "/etc/systemd/system/{{ gitea_runner_cleanup_timer }}"
    mode: "0644"
  notify: Restart gitea cleanup timer
  when: gitea_runner_cleanup_enabled | bool

# ── 4d. resilient DNS (act_runner clones actions/* from github.com every job) ─
- name: Install resilient DNS drop-in for CI runners
  ansible.builtin.copy:
    src: 20-ci-resilient-dns.conf
    dest: /etc/systemd/resolved.conf.d/20-ci-resilient-dns.conf
    mode: "0644"
  notify: Restart systemd-resolved
  when: gitea_runner_enabled | bool

# ── 5. systemd unit ──────────────────────────────────────────────────────────
- name: Install the act_runner systemd unit
  ansible.builtin.template:
    src: gitea-act-runner.service.j2
    dest: "/etc/systemd/system/{{ gitea_runner_service }}"
    mode: "0644"
  notify: Restart gitea-act-runner

# ── 6. enable + start ────────────────────────────────────────────────────────
- name: Enable + start the act_runner daemon
  ansible.builtin.systemd:
    name: "{{ gitea_runner_service }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Enable + start the workspace-reclaim timer
  ansible.builtin.systemd:
    name: "{{ gitea_runner_reclaim_timer }}"
    enabled: true
    state: started
    daemon_reload: true
  when: gitea_runner_reclaim_enabled | bool

- name: Enable + start the docker/storage cleanup timer
  ansible.builtin.systemd:
    name: "{{ gitea_runner_cleanup_timer }}"
    enabled: true
    state: started
    daemon_reload: true
  when: gitea_runner_cleanup_enabled | bool
