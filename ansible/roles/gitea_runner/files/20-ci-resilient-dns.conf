# MANAGED BY ANSIBLE (role: gitea_runner). Resilient DNS for the CI runner VMs.
#
# act_runner (HOST mode) git-clones actions/* (checkout, setup-python, upload-artifact, ...) from
# github.com on EVERY job. A single transient resolver timeout then reds the job at its first step with
#   `dial tcp: lookup github.com on 127.0.0.53:53: read udp ...: i/o timeout`
# (seen on ci-runner-1, 2026-07-11). The stub had only the DHCP-provided servers with no fast failover.
# Give systemd-resolved several fast public resolvers + a distinct FallbackDNS set + caching, so one slow
# server can't time out a lookup. github.com resolutions then stay cached across the back-to-back job
# clones. Drop-in (resolved.conf.d) so it merges with, and overrides, the DHCP link config.
[Resolve]
DNS=1.1.1.1 9.9.9.9 8.8.8.8
FallbackDNS=1.0.0.1 149.112.112.112 8.8.4.4
Cache=yes
DNSStubListener=yes
