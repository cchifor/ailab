---
# Host-level configuration for the Proxmox nodes.
# Run order matters: base -> thunderbolt -> storage_net -> (QNAP runbook) -> mounts -> validate.
#
#   just net           # base + net  (tags: base,net)
#   just node-exporter # host node_exporter for the AI Lab Fleet dashboard (tags: monitoring)
#   just perf          # pin CPU governor to performance (tags: performance)
#   just mounts        # NFS test mount (tags: mounts)  -- after QNAP export exists
#   just validate      # link/throughput checks (tags: validate)

- name: Configure Proxmox nodes — base, Thunderbolt/USB4, storage network
  hosts: pve_nodes
  become: true
  gather_facts: true
  roles:
    - role: pve_base
      tags: [base]

    # Host metrics for the "AI Lab Fleet" Grafana dashboard (scraped by monitoring/proxmox-node).
    - role: node_exporter
      tags: [monitoring]
      when: node_exporter_enabled | default(true)

    # Pin the CPU scaling governor to 'performance' (AI hosts; amd-pstate-epp) — persists on boot.
    - role: cpu_performance
      tags: [performance]
      when: cpu_performance_enabled | default(true)

    - role: thunderbolt_net
      tags: [net, tb]
      when: storage_role == 'tb'

    - role: storage_net
      tags: [net]

    # WS2 (Thunderbolt CSI): host router+SNAT so Talos VMs reach the QNAP over the TB fabric.
    # OFF until storage_router_enabled=true (the deferred CSI cutover). `just router`.
    - role: storage_router
      tags: [net, router]
      when: storage_router_enabled | default(false)

    - role: qnap_mounts
      tags: [mounts]

    - role: validate_links
      tags: [validate]

# Self-hosted GitHub Actions runner VMs (Ubuntu). Provisioned by tofu (kubernetes/infra/runners);
# this play installs the runner agent + Docker toolchain + the ported ephemeral contract.
# Run it scoped to the runner hosts so a full untagged `just net` isn't required:
#   just runners       # provision/refresh the runners (--limit github_runners --tags runners)
#   just ping-runners  # connectivity check
# These hosts must exist first (run `tofu -chdir=kubernetes/infra/runners apply`).
- name: Configure GitHub Actions runner VMs
  hosts: github_runners
  become: true
  gather_facts: true
  pre_tasks:
    - name: Load GitHub App private key (SOPS)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/secrets/github-runner.sops.yaml"
      no_log: true
      tags: [runners]
      when: github_runner_enabled | default(false)
  roles:
    # Fleet observability — the same node_exporter the hypervisors run (the lab scrapes everything).
    - role: node_exporter
      tags: [runners, monitoring]
      when: github_runner_enabled | default(false)

    - role: github_runner
      tags: [runners]
      when: github_runner_enabled | default(false)
