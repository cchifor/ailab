---
# Interactive dev-worker VMs (Ubuntu 24.04): Claude Code + Codex inside tmux, with the homelab
# claude-worker feature set. A dedicated playbook (NOT part of site.yml) so a full `just net` never
# touches these hosts — they're a different host class and must be created first
# (tofu -chdir=kubernetes/infra/dev-workers apply).
#   just dev-workers       # provision/refresh the dev workers
#   just ping-dev-workers  # connectivity check
# See docs/runbooks/dev-workers.md.
- name: Configure dev-worker VMs
  hosts: dev_workers
  become: true
  gather_facts: true
  pre_tasks:
    # Load the SOPS secrets whenever the (optional, gitignored-until-created) secrets file EXISTS —
    # not only when a toggled feature needs it. git_forge.yml consumes dev_worker_gitea_token
    # UNCONDITIONALLY (it has no feature toggle; the token itself is the on/off switch), so gating
    # the load on the restic/cloudflared/password/agentforge toggles silently skipped the token and
    # left the workers without forge credentials. File presence is the operator's signal; the two
    # tasks stay safe on a fresh clone where only the .example exists.
    - name: Check for the dev-worker secrets file (control node)
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/secrets/dev-worker.sops.yaml"
      delegate_to: localhost
      become: false
      run_once: true
      register: dev_worker_secrets_stat
      tags: [dev_workers]

    - name: Load dev-worker secrets (SOPS)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/secrets/dev-worker.sops.yaml"
      no_log: true
      tags: [dev_workers]
      when:
        - dev_worker_enabled | default(false)
        - dev_worker_secrets_stat.stat.exists
  roles:
    # Fleet observability — the same node_exporter the hypervisors + runners emit (scraped at :9100).
    - role: node_exporter
      tags: [dev_workers, monitoring]
      when: dev_worker_enabled | default(false)

    - role: dev_worker
      tags: [dev_workers]
      when: dev_worker_enabled | default(false)
