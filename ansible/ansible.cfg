[defaults]
inventory = ../inventory/hosts.yml
roles_path = roles
collections_path = collections
host_key_checking = True
retry_files_enabled = False
# YAML-formatted task output. The standalone `yaml` stdout callback was removed in community.general
# 12; the supported replacement is the built-in default callback with its result_format option set to
# yaml (ini key `callback_result_format` in [defaults]; available on ansible.builtin.default since
# ansible-core 2.13).
stdout_callback = default
callback_result_format = yaml
bin_ansible_callbacks = True
interpreter_python = auto_silent
fact_caching = jsonfile
fact_caching_connection = .facts_cache
fact_caching_timeout = 7200
nocows = True

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
